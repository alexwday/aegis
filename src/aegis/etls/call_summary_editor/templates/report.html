      ${titleText ? `<div class="rpt-cover-title">${esc(titleText)}</div>` : ''}
    </div>
  </div>`;
}

function sanitizeId(s) { return String(s).toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, ''); }

// Editorial TOC — renders L1 report-section headings with nested L2 bucket
// titles. Each anchor points at a `#sec_…` or `#bs_…` fragment; `target-counter`
// resolves the page number at print time, and on screen we hide the leader +
// page span so the rows read as clean clickable navigation.
function renderTableOfContents(orderedSections) {
  if (!orderedSections.length) return '';
  let html = `<nav class="rpt-toc" aria-label="Table of contents">
    <div class="rpt-toc-title">Contents</div>
    <ul class="rpt-toc-list">`;
  orderedSections.forEach(({name: secName, buckets}) => {
    const secId = 'sec_' + sanitizeId(secName);
    html += `<li class="rpt-toc-l1"><a href="#${secId}">
      <span class="rpt-toc-label">${esc(secName)}</span>
      <span class="rpt-toc-leader" aria-hidden="true"></span>
      <span class="rpt-toc-page" data-target="#${secId}"></span>
    </a>`;
    if (buckets.length) {
      html += `<ul class="rpt-toc-sublist">`;
      buckets.forEach(bucket => {
        const title = (state.bucket_user_titles || {})[bucket.id] || bucket.name;
        html += `<li class="rpt-toc-l2"><a href="#bs_${bucket.id}">
          <span class="rpt-toc-label">${esc(title)}</span>
          <span class="rpt-toc-leader" aria-hidden="true"></span>
          <span class="rpt-toc-page" data-target="#bs_${bucket.id}"></span>
        </a></li>`;
      });
      html += `</ul>`;
    }
    html += `</li>`;
  });
  html += `</ul></nav>`;
  return html;
}

function renderReportSections() {
  destroySortables();
  const orderedSections = getOrderedSections(state.current_bank);

  let html = renderBannerCover();
  html += renderTableOfContents(orderedSections);

  orderedSections.forEach(({name: secName, buckets: sectionBuckets}) => {
    const secId = 'sec_' + sanitizeId(secName);
    html += `<div class="rpt-l1" id="${secId}">${secName}</div>`;

    sectionBuckets.forEach(bucket => {
      const quotes = getReportSubquotes(state.current_bank, bucket.id);
      if (quotes.length === 0) return;

      const userTitle = (state.bucket_user_titles || {})[bucket.id];
      const titleVal  = userTitle != null ? userTitle : bucket.name;

      // The bucket name takes its own row; the generated subtitle wraps freely
      // on the line beneath so long titles never get truncated by the headline.
      // The finding-count badge was removed — the count is implicit from the
      // bullet list, and dropping it keeps the header lean. The highlight
      // affordance now uses a highlighter-pen SVG so the action is visually
      // unmistakable (vs the previous abstract glyph).
      const isHighlighted = state.highlighted_bucket_id === bucket.id;
      html += `
<div class="bkt-section" id="bs_${bucket.id}">
  <div class="bkt-header" onclick="toggleBucket('${bucket.id}')">
    <div class="bkt-bar" style="background:${bucket.color_accent}"></div>
    <div class="bkt-info">
      <div class="bkt-name-row">
        <input class="bkt-name-input" value="${escAttr(titleVal)}" readonly
               onmousedown="if(this.hasAttribute('readonly'))event.preventDefault()"
               onclick="if(!this.hasAttribute('readonly'))event.stopPropagation()"
               ondblclick="event.stopPropagation();this.removeAttribute('readonly');this.focus();this.select()"
               onblur="this.setAttribute('readonly','');saveBucketTitle('${bucket.id}',this.value)"
               onkeydown="if(event.key==='Enter')this.blur()">
        <button class="bkt-focus ${isHighlighted ? 'active' : ''}"
                onclick="event.stopPropagation();toggleCategoryHighlight('${bucket.id}')"
                title="Highlight this category's findings in the transcript">${HIGHLIGHTER_SVG}</button>
      </div>
      ${bucket.generated_headline ? `<span class="bkt-headline">${esc(bucket.generated_headline)}</span>` : ''}
    </div>
    <svg class="bkt-chevron open" id="bkv_${bucket.id}" viewBox="0 0 10 10"><path d="M2 4l3 3 3-3"/></svg>
  </div>
  <div class="bkt-quotes" id="bq_${bucket.id}" data-bucket-id="${bucket.id}">
    ${quotes.map(sq => renderSubquoteCard(sq, bucket)).join('')}
  </div>
</div>`;
    });
  });

  document.getElementById('report-page').innerHTML = html;
  initSortables();
}

function renderSubquoteCard(sq, bucket) {
  const bankId = state.current_bank;
  const bank   = state.banks[bankId];
  const bs     = getBankState(bankId);
  // fmt is now a 2-value toggle: 'verbatim' (off) or 'condensed' (on = summarize).
  const fmt    = (bs.subquote_formats && bs.subquote_formats[sq.id]) || 'verbatim';
  const summarizeOn = fmt === 'condensed';
  const isMD   = sq.type === 'md';
  const isEdited = !!getSubquoteTextOverride(sq.id, bs);

  const textContent = renderSubquoteText(sq, fmt, bs);
  // When edited, the text is custom — "Show more" truncation is based on
  // the override length, not the original verbatim length.
  const measureLen = isEdited
    ? getSubquoteTextOverride(sq.id, bs).length
    : getSubquoteFormats(sq, 'verbatim').length;
  const isLong = measureLen > 600;
  const expandBtn = isLong
    ? `<button class="q-expand-btn" onclick="expandCard(this)">Show more &#9662;</button>`
    : '';

  // Attribution line
  const attribName = isMD ? sq.speaker : (sq.executive_name || 'Executive');
  const attribTitle = isMD ? (sq.speaker_title || '') : (sq.executive_title || '');
  const attribLine = attribTitle ? `${attribName}, ${attribTitle}` : attribName;

  // QA card shows the analyst question as context above the executive
  // answer text. Prefer the model-generated `analyst_question_summary` (a
  // single short clause) over the raw verbatim question, which can run on
  // for paragraphs and bury the actual context. The verbatim text is kept
  // as the title attribute so the user can hover to see the original.
  let qaContextHtml = '';
  if (!isMD) {
    const verbatim = (sq.question_sentences || []).map(s => s.text).join(' ');
    const summary = (sq.analyst_question_summary || '').trim();
    const contextLine = summary
      ? `In response to the analyst question: ${esc(summary)}`
      : `In response to the analyst question: ${esc(verbatim)}`;
    const verbatimTitle = summary ? ` title="${escAttr(verbatim)}"` : '';
    qaContextHtml = `
    <div class="qa-card-q">
      <span class="qa-lbl q">Q</span>
      <strong>${esc(sq.analyst_name||'Analyst')}</strong>
      ${sq.analyst_affiliation ? `<span style="color:#65676B"> (${esc(sq.analyst_affiliation)})</span>` : ''}
      <div class="qa-card-q-text"${verbatimTitle}>${contextLine}</div>
    </div>`;
  }

  // When the user has edited the finding, the Summarize toggle no longer
  // applies (the text is custom) — hide it and surface a "Revert" affordance
  // instead. Revert deletes the override, restoring the sentence-derived view.
  const summarizeToggleHtml = isEdited ? '' : `
    <label class="fmt-toggle" onclick="event.stopPropagation()">
      <input type="checkbox" ${summarizeOn ? 'checked' : ''}
             onchange="switchFmt('${sq.id}', this.checked ? 'condensed' : 'verbatim')">
      <span>Summarize</span>
    </label>`;
  const editedBadgeHtml = isEdited
    ? `<span class="q-edited-badge" title="Text has been manually edited">edited</span>`
    : '';
  const revertBtnHtml = isEdited
    ? `<button class="q-revert" onclick="revertSubquoteEdit('${sq.id}')" title="Revert to original text">${REVERT_SVG}</button>`
    : '';
  const editBtnHtml = `<button class="q-edit" onclick="editSubquote('${sq.id}')" title="Edit text">${EDIT_SVG}</button>`;

  // Card-level state classes. Category highlight (blue fill + border) wins
  // over the single-finding border when both would apply — the box-shadow is
  // identical either way, so we just add both without concern for layering.
  const cardStateCls = [];
  if (state.highlighted_bucket_id && state.highlighted_bucket_id === bucket.id) {
    cardStateCls.push('q-card-cat-highlighted');
  }
  if (state.selected_subquote_id === sq.id) {
    cardStateCls.push('q-card-selected');
  }
  const cardClsAttr = cardStateCls.length ? ' ' + cardStateCls.join(' ') : '';

  return `
<div class="q-card${cardClsAttr}" data-subquote-id="${sq.id}">
  <div class="q-card-header">
    <span class="drag-handle">&#8942;</span>
    ${summarizeToggleHtml}
    ${editedBadgeHtml}
    <span class="q-hdr-spacer"></span>
    ${editBtnHtml}
    ${revertBtnHtml}
    <button class="q-del" onclick="deleteSubquote('${sq.id}')" title="Remove from report">&#215;</button>
  </div>
  ${qaContextHtml}
  <div class="q-text">${textContent}</div>
  ${expandBtn}
  <div class="q-attrib">&mdash; ${esc(attribLine)}</div>
</div>`;
}

function getSubquoteTextOverride(sqid, bs) {
  if (!bs || !bs.subquote_text_overrides) return null;
  const v = bs.subquote_text_overrides[sqid];
  return (typeof v === 'string' && v.length) ? v : null;
}

function renderSubquoteText(sq, fmt, bs) {
  // User-edited override: render as plain paragraphs, no sentence spans.
  // The original remains derivable from sq.sentences/sq.answer_sentences,
  // so "revert" is just deleting this override key.
  const override = getSubquoteTextOverride(sq.id, bs);
  if (override) {
    return override.split(/\n\n+/).filter(Boolean)
      .map(p => `<p>${esc(p.trim())}</p>`).join('') || `<p>${esc(override)}</p>`;
  }

  const useSpans = fmt === 'verbatim' || fmt === 'condensed';
  const sents = sq.type === 'md' ? sq.sentences : sq.answer_sentences;
  const isQA = sq.type === 'qa';

  if (!sents) return '';

  if (useSpans) {
    // Report-panel sentence spans are read-only. Classification is reachable
    // only from the transcript side — clicks here bubble up to the delegated
    // handler on #report-body, which scrolls the transcript to this finding.
    return `<p>${sents.map(s => {
      const bid = effectivePrimary(s.sid);
      const bkt = getBucket(bid);
      const text = fmt === 'condensed' ? (s.condensed || s.text) : s.text;
      return `<span class="s-tok${isQA?' qa-sent':''}"
        data-sid="${s.sid}" data-btype="${isQA?'qa':'md'}"
        data-primary="${bid}"
        style="background:${bkt.color_bg};border-bottom-color:${bkt.color_accent}">${esc(text)}</span>`;
    }).join(' ')}</p>`;
  }

  // Non-span formats — plain text, no spans
  const text = sents.map(s => s[fmt] || s.text || '').join(' ').trim();
  return text.split(/\n\n+/).filter(Boolean).map(p => `<p>${esc(p.trim())}</p>`).join('');
}

function expandCard(btn) {
  btn.closest('.q-card').querySelector('.q-text').style.maxHeight = 'none';
  btn.remove();
}

// ============================================================
// DRAG & DROP (Sortable.js — subquote level)
// ============================================================
function destroySortables() {
  sortableInstances.forEach(s => s.destroy());
  sortableInstances = [];
}
function initSortables() {
  if (typeof Sortable === 'undefined') return;
  document.querySelectorAll('.bkt-quotes').forEach(container => {
    sortableInstances.push(Sortable.create(container, {
      group: 'report-subquotes',
      animation: 150,
      handle: '.drag-handle',
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      onEnd(evt) {
        const sqid = evt.item.dataset.subquoteId;
        const from = evt.from.dataset.bucketId;
        const to   = evt.to.dataset.bucketId;
        handleSubquoteDrop(sqid, from, to);
      },
    }));
  });
}

function handleSubquoteDrop(sqid, fromBid, toBid) {
  const bs = getBankState(state.current_bank);
  const sq = getAllSubquotes(state.current_bank).find(x => x.id === sqid);
  const targetBucket = getBucket(toBid);
  const transcriptSection = sq && sq.type === 'md' ? 'MD' : 'QA';

  if (!sq || !bucketAppliesTo(targetBucket, transcriptSection)) {
    renderCurrentBank();
    return;
  }

  if (fromBid !== toBid) {
    if (!bs.subquote_bucket_overrides) bs.subquote_bucket_overrides = {};
    bs.subquote_bucket_overrides[sqid] = toBid;
    if (!bs.sentence_user_primary) bs.sentence_user_primary = {};
    const sents = sq.type === 'md' ? sq.sentences : sq.answer_sentences;
    (sents || []).forEach(s => {
      bs.sentence_user_primary[s.sid] = toBid;
      setSentenceReviewStatus(s.sid, 'selected');
    });
  }

  const targetEl = document.getElementById(`bq_${toBid}`);
  if (targetEl) {
    const ids = [...targetEl.querySelectorAll('[data-subquote-id]')].map(el => el.dataset.subquoteId);
    if (!bs.bucket_subquote_order) bs.bucket_subquote_order = {};
    bs.bucket_subquote_order[toBid] = ids;
  }
  if (fromBid !== toBid) {
    const fromEl = document.getElementById(`bq_${fromBid}`);
    if (fromEl) {
      const ids = [...fromEl.querySelectorAll('[data-subquote-id]')].map(el => el.dataset.subquoteId);
      if (!bs.bucket_subquote_order) bs.bucket_subquote_order = {};
      bs.bucket_subquote_order[fromBid] = ids;
    }
  }
  renderCurrentBank();
}

// ============================================================
// QUOTE CARD ACTIONS
// ============================================================
function switchFmt(sqid, fmt) {
  const bs = getBankState(state.current_bank);
  if (!bs.subquote_formats) bs.subquote_formats = {};
  bs.subquote_formats[sqid] = fmt;

  const card = document.querySelector(`[data-subquote-id="${sqid}"]`);
  if (!card) return;
  const sq  = getAllSubquotes(state.current_bank).find(x => x.id === sqid);
  if (!sq) return;

  const textDiv = card.querySelector('.q-text');
  textDiv.innerHTML = renderSubquoteText(sq, fmt, bs);
}

function deleteSubquote(sqid) {
  const sq = getAllSubquotes(state.current_bank).find(x => x.id === sqid);
  if (!sq) return;

  const sents = sq.type === 'md' ? sq.sentences : sq.answer_sentences;
  setSentenceReviewStatus((sents || []).map(s => s.sid), 'rejected');

  // Surgical DOM removal to avoid full re-render
  const card = document.querySelector(`[data-subquote-id="${sqid}"]`);
  if (card) card.remove();
  // Update transcript block colors
  renderTranscriptBody();
}

// ------------------------------------------------------------
// MANUAL FINDING EDITS
// ------------------------------------------------------------
// A user-edited finding stores its override plain text on the bank state
// (bs.subquote_text_overrides[sqid]). The original is always derivable from
// the sentence data, so "revert" is implemented as simply deleting the key.
// The sentence-level spans/highlighting are dropped while an override is in
// effect — custom text has no 1:1 mapping back to source sentences.
function getSubquotePlainText(sq, fmt, bs) {
  // Seed the edit textarea with whatever text the user is currently seeing.
  // If already edited, seed with the override so further edits compound.
  const override = getSubquoteTextOverride(sq.id, bs);
  if (override) return override;
  return subquoteTextForDocx(sq, fmt);
}

function editSubquote(sqid) {
  const sq = getAllSubquotes(state.current_bank).find(x => x.id === sqid);
  if (!sq) return;
  const bs = getBankState(state.current_bank);
  const fmt = (bs.subquote_formats && bs.subquote_formats[sqid]) || 'verbatim';
  const seedText = getSubquotePlainText(sq, fmt, bs);

  const card = document.querySelector(`[data-subquote-id="${sqid}"]`);
  if (!card) return;
  // If a textarea is already open (double-click), don't re-open.
  if (card.querySelector('.q-edit-area')) return;

  const textDiv = card.querySelector('.q-text');
  if (!textDiv) return;

  // Stash the pre-edit HTML so Cancel can restore without a full re-render.
  textDiv.dataset.preEditHtml = textDiv.innerHTML;
  textDiv.classList.add('q-text-editing');

  const rowsGuess = Math.min(20, Math.max(4, (seedText.match(/\n/g) || []).length + Math.ceil(seedText.length / 90)));
  textDiv.innerHTML = `
    <textarea class="q-edit-area" rows="${rowsGuess}" aria-label="Edit finding text">${esc(seedText)}</textarea>
    <div class="q-edit-actions">
      <button class="q-edit-cancel" onclick="cancelSubquoteEdit('${sqid}')">Cancel</button>
      <button class="q-edit-save" onclick="saveSubquoteEdit('${sqid}')">Save</button>
    </div>
  `;
  const ta = textDiv.querySelector('textarea');
  if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }

  // Expand any truncated region so the full text is visible while editing.
  textDiv.style.maxHeight = 'none';
  const existingExpand = card.querySelector('.q-expand-btn');
  if (existingExpand) existingExpand.style.display = 'none';
}

function cancelSubquoteEdit(sqid) {
  const card = document.querySelector(`[data-subquote-id="${sqid}"]`);
  if (!card) return;
  const textDiv = card.querySelector('.q-text');
  if (!textDiv) return;
  if (textDiv.dataset.preEditHtml !== undefined) {
    textDiv.innerHTML = textDiv.dataset.preEditHtml;
    delete textDiv.dataset.preEditHtml;
  }
  textDiv.classList.remove('q-text-editing');
  textDiv.style.maxHeight = '';
  const existingExpand = card.querySelector('.q-expand-btn');
  if (existingExpand) existingExpand.style.display = '';
}

function saveSubquoteEdit(sqid) {
  const card = document.querySelector(`[data-subquote-id="${sqid}"]`);
  if (!card) return;
  const ta = card.querySelector('.q-edit-area');
  if (!ta) return;
  const newText = (ta.value || '').trim();
  if (!newText) {
    // Empty text is treated as cancel — deleting the finding has its own
    // affordance (the × button) and shouldn't happen by accident here.
    cancelSubquoteEdit(sqid);
    return;
  }

  const bs = getBankState(state.current_bank);
  if (!bs.subquote_text_overrides) bs.subquote_text_overrides = {};
  bs.subquote_text_overrides[sqid] = newText;

  // Full re-render of the card so header toggles/badges reflect edited state.
  renderCurrentBank();
}

function revertSubquoteEdit(sqid) {
  const bs = getBankState(state.current_bank);
  if (!bs.subquote_text_overrides) return;
  if (!(sqid in bs.subquote_text_overrides)) return;
  delete bs.subquote_text_overrides[sqid];
  renderCurrentBank();
}

function showAddMenu(convId, anchor) {
  document.querySelectorAll('.atr-menu').forEach(m => m.remove());
  const menu = document.createElement('div');
  menu.className = 'atr-menu';
  state.buckets.forEach(b => {
    const item = document.createElement('div');
    item.className = 'atr-item';
    item.innerHTML = `<span class="atr-dot" style="background:${b.color_accent}"></span>${esc(bucketLabel(b))}`;
    item.onclick = () => { addConvToReport(convId, b.id); menu.remove(); };
    menu.appendChild(item);
  });

  const rect = anchor.getBoundingClientRect();
  menu.style.top  = (rect.bottom + 4) + 'px';
  menu.style.left = Math.min(rect.left, window.innerWidth - 220) + 'px';
  document.body.appendChild(menu);
  setTimeout(() => {
    const close = e => { if (!menu.contains(e.target)) { menu.remove(); document.removeEventListener('mousedown', close); } };
    document.addEventListener('mousedown', close);
  }, 50);
}

function addConvToReport(convId, bucketId) {
  const bs = getBankState(state.current_bank);
  const bank = state.banks[state.current_bank];
  const conv = (bank.qa_conversations || []).find(c => c.id === convId);
  if (!conv) return;

  if (!bs.sentence_user_primary) bs.sentence_user_primary = {};
  conv.answer_sentences.forEach(s => {
    bs.sentence_user_primary[s.sid] = bucketId;
    setSentenceReviewStatus(s.sid, 'selected');
  });

  renderReportSections();
  renderTranscriptBody();
}

// ============================================================
// BUCKET ACTIONS
// ============================================================
function toggleBucket(id) {
  const el   = document.getElementById(`bq_${id}`);
  const chev = document.getElementById(`bkv_${id}`);
  if (!el) return;
  const hidden = el.style.display === 'none';
  el.style.display = hidden ? '' : 'none';
  if (chev) {
    chev.classList.remove('open', 'closed');
    chev.classList.add(hidden ? 'open' : 'closed');
  }
}
function saveBucketTitle(id, val) {
  if (!state.bucket_user_titles) state.bucket_user_titles = {};
  state.bucket_user_titles[id] = val.trim();
}

// ============================================================
// STATE HELPERS
// ============================================================
function getBankState(bankId) {
  if (!state.bank_states) state.bank_states = {};
  if (!state.bank_states[bankId]) {
    state.bank_states[bankId] = {
      sentence_user_primary: {},
      sentence_status_overrides: {},
      subquote_bucket_overrides: {}, bucket_subquote_order: {}, subquote_formats: {},
      subquote_text_overrides: {},
    };
  }
  return state.bank_states[bankId];
}

function findSentence(sid) {
  for (const bank of Object.values(state.banks)) {
    for (const blk of (bank.md_blocks || [])) {
      const s = blk.sentences.find(x => x.sid === sid);
      if (s) return s;
    }
    for (const conv of (bank.qa_conversations || [])) {
      const s = [...conv.question_sentences, ...conv.answer_sentences].find(x => x.sid === sid);
      if (s) return s;
    }
  }
  return null;
}

// ============================================================
// SAVE
// ============================================================
function saveReport() {
  const ts = new Date().toISOString().replace(/[:.]/g,'').slice(0,15);
  const stateJson = JSON.stringify(state, null, 2).replace(/<\/script>/gi, '<\\/script>');
  const newHtml = __HTML_TPL__.replace(
    /\/\* __BEGIN_STATE__ \*\/[\s\S]*?\/\* __END_STATE__ \*\//,
    `/* __BEGIN_STATE__ */\n${stateJson}\n/* __END_STATE__ */`
  );
  const blob = new Blob([newHtml], {type:'text/html;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `call_summary_${ts}.html`; a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
// PDF / DOCX EXPORT
// ============================================================
// Export happens fully client-side from the saved HTML so the user can refine
// the draft first, then download a clean PDF or DOCX that matches the edited
// state rather than the original ETL output.
function ensurePdfLibrary() {
  if (window.jspdf && window.jspdf.jsPDF) return Promise.resolve(window.jspdf);
  if (window._jspdfLibPromise) return window._jspdfLibPromise;
  window._jspdfLibPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js';
    s.crossOrigin = 'anonymous';
    s.onload = () => (
      window.jspdf && window.jspdf.jsPDF
        ? resolve(window.jspdf)
        : reject(new Error('jsPDF loaded but window.jspdf.jsPDF is unavailable'))
    );
    s.onerror = () => reject(new Error('Failed to load jsPDF from unpkg'));
    document.head.appendChild(s);
  });
  return window._jspdfLibPromise;
}

function ensureDocxLibrary() {
  if (window.docx) return Promise.resolve(window.docx);
  if (window._docxLibPromise) return window._docxLibPromise;
  window._docxLibPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/docx@8.5.0/build/index.umd.js';
    s.crossOrigin = 'anonymous';
    s.onload = () => (
      window.docx
        ? resolve(window.docx)
        : reject(new Error('docx library loaded but window.docx is undefined'))
    );
    s.onerror = () => reject(new Error('Failed to load docx library from unpkg'));
    document.head.appendChild(s);
  });
  return window._docxLibPromise;
}

// Rasterise SVG/PNG/JPEG banners to PNG bytes + data URL so both jsPDF and
// DOCX ImageRun can share the same in-browser asset preparation path.
function rasterizeImageForExport(src, maxWidth = 1600) {
  return new Promise((resolve) => {
    if (!src) return resolve(null);
    const img = new Image();
    img.onload = () => {
      try {
        const scale = Math.min(1, maxWidth / Math.max(1, img.naturalWidth || img.width));
        const w = Math.round((img.naturalWidth || img.width) * scale) || maxWidth;
        const h = Math.round((img.naturalHeight || img.height) * scale) || 200;
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/png');
        canvas.toBlob(async (blob) => {
          if (!blob) return resolve(null);
          const ab = await blob.arrayBuffer();
          resolve({ data: new Uint8Array(ab), dataUrl, width: w, height: h });
        }, 'image/png');
      } catch (e) {
        console.warn('rasterizeImageForExport failed:', e);
        resolve(null);
      }
    };
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

// Extract plain text for exports — mirrors the screen-format toggle but strips
// browser-only highlighting spans. User text overrides win over sentence data.
function subquoteTextForDocx(sq, fmt, bs) {
  const bankState = bs || (state && state.current_bank ? getBankState(state.current_bank) : null);
  const override = bankState ? getSubquoteTextOverride(sq.id, bankState) : null;
  if (override) return override;
  const sents = sq.type === 'md' ? sq.sentences : sq.answer_sentences;
  if (!sents || !sents.length) return '';
  const key = fmt === 'verbatim' ? 'text' : (fmt || 'text');
  return sents.map(s => (s[key] || s.text || '').trim()).filter(Boolean).join(' ');
}

function getQaContextText(sq) {
  if (!sq || sq.type !== 'qa') return '';
  const verbatim = (sq.question_sentences || []).map(s => s.text).join(' ').trim();
  const summary = (sq.analyst_question_summary || '').trim();
  const context = summary || verbatim;
  return context ? `In response to the analyst question: ${context}` : '';
}

function getFindingAttribution(sq) {
  const isMD = sq.type === 'md';
  const name = isMD ? sq.speaker : (sq.executive_name || 'Executive');
  const title = isMD ? (sq.speaker_title || '') : (sq.executive_title || '');
  return title ? `${name}, ${title}` : name;
}

function slugifyFilePart(value, fallback = 'report') {
  const cleaned = String(value || '')
    .trim()
    .replace(/[^a-z0-9]+/gi, '_')
    .replace(/^_+|_+$/g, '');
  return cleaned || fallback;
}

function pdfWrapText(doc, text, maxWidth, fontName, fontStyle, fontSize) {
  const blocks = String(text || '')
    .replace(/\r\n/g, '\n')
    .split(/\n+/)
    .map(part => part.trim())
    .filter(Boolean);
  if (!blocks.length) return [];
  doc.setFont(fontName, fontStyle);
  doc.setFontSize(fontSize);
  return blocks.flatMap(part => doc.splitTextToSize(part, maxWidth)).filter(Boolean);
}

function drawPdfLines(doc, lines, x, y, lineHeight, options = {}) {
  if (!lines.length) return y;
  lines.forEach((line, idx) => {
    doc.text(line, x, y + (idx * lineHeight), options);
  });
  return y + (lines.length * lineHeight);
}

function getPdfLayout(doc) {
  const pageWidth = doc.internal.pageSize.getWidth();
  const pageHeight = doc.internal.pageSize.getHeight();
  // Use narrower export margins than the screen preview so PDF lines carry
  // more text across the page without changing the on-screen editing layout.
  const marginLeft = 28;
  const marginRight = 28;
  const contentTop = 42;
  const contentBottom = pageHeight - 42;
  return {
    pageWidth,
    pageHeight,
    marginLeft,
    marginRight,
    contentTop,
    contentBottom,
    contentWidth: pageWidth - marginLeft - marginRight,
    footerY: pageHeight - 18,
    cover: {
      bannerMaxHeight: 150,
      bannerGap: 18,
      metaFontSize: 11,
      metaLineHeight: 14,
      titleFontSize: 26,
      titleLineHeight: 28,
      dividerBefore: 14,
      dividerAfter: 18,
    },
    toc: {
      headingFontSize: 16,
      headingLineHeight: 20,
      headingGapAfter: 10,
      level1FontSize: 13,
      level1LineHeight: 16,
      level2FontSize: 11.5,
      level2LineHeight: 14,
      level2Indent: 18,
      pageNumberWidth: 26,
      entryGap: 4,
    },
    section: {
      fontSize: 18,
      lineHeight: 22,
      gapAfter: 12,
    },
    bucket: {
      titleFontSize: 14,
      titleLineHeight: 17,
      headlineFontSize: 11,
      headlineLineHeight: 14,
      gapAfter: 10,
    },
    finding: {
      textIndent: 18,
      bodyFontSize: 11.5,
      bodyLineHeight: 15,
      contextFontSize: 10.5,
      contextLineHeight: 13,
      attribFontSize: 9.5,
      attribLineHeight: 12,
      gapAfter: 8,
    },
  };
}

function getPdfBannerMetrics(raster, layout) {
  if (!raster) return null;
  const scale = Math.min(
    layout.contentWidth / Math.max(1, raster.width),
    layout.cover.bannerMaxHeight / Math.max(1, raster.height)
  );
  return {
    width: Math.max(1, raster.width * scale),
    height: Math.max(1, raster.height * scale),
  };
}

function getPdfCoverMetrics(doc, layout, raster) {
  const banner = getPdfBannerMetrics(raster, layout);
  const metaLines = pdfWrapText(
    doc,
    getReportCoverMeta(),
    layout.contentWidth,
    'helvetica',
    'bold',
    layout.cover.metaFontSize
  );
  const titleLines = pdfWrapText(
    doc,
    getReportCoverTitle(),
    layout.contentWidth,
    'times',
    'bold',
    layout.cover.titleFontSize
  );
  let height = 0;
  if (banner) height += banner.height + layout.cover.bannerGap;
  if (metaLines.length) height += metaLines.length * layout.cover.metaLineHeight;
  if (metaLines.length && titleLines.length) height += 6;
  if (titleLines.length) height += titleLines.length * layout.cover.titleLineHeight;
  if (banner || metaLines.length || titleLines.length) {
    height += layout.cover.dividerBefore + 1 + layout.cover.dividerAfter;
  }
  return { banner, metaLines, titleLines, height };
}

function getPdfTocEntries(orderedSections) {
  const entries = [];
  orderedSections.forEach(({ name, buckets }) => {
    entries.push({ level: 1, label: name, targetId: 'sec_' + sanitizeId(name) });
    buckets.forEach(bucket => {
      entries.push({
        level: 2,
        label: (state.bucket_user_titles || {})[bucket.id] || bucket.name,
        targetId: `bs_${bucket.id}`,
      });
    });
  });
  return entries;
}

function measurePdfTocEntry(doc, entry, layout) {
  const indent = entry.level === 2 ? layout.toc.level2Indent : 0;
  const fontSize = entry.level === 1 ? layout.toc.level1FontSize : layout.toc.level2FontSize;
  const fontStyle = entry.level === 1 ? 'bold' : 'normal';
  const lineHeight = entry.level === 1 ? layout.toc.level1LineHeight : layout.toc.level2LineHeight;
  const lines = pdfWrapText(
    doc,
    entry.label,
    layout.contentWidth - indent - layout.toc.pageNumberWidth - 10,
    'times',
    fontStyle,
    fontSize
  );
  return { lines, lineHeight, height: (lines.length * lineHeight) + layout.toc.entryGap };
}

function measurePdfSectionHeading(doc, sectionName, layout) {
  const lines = pdfWrapText(
    doc,
    sectionName,
    layout.contentWidth,
    'times',
    'bold',
    layout.section.fontSize
  );
  return { lines, height: (lines.length * layout.section.lineHeight) + layout.section.gapAfter };
}

function measurePdfBucketHeader(doc, bucket, layout) {
  const title = (state.bucket_user_titles || {})[bucket.id] || bucket.name;
  const titleLines = pdfWrapText(
    doc,
    title,
    layout.contentWidth,
    'times',
    'bold',
    layout.bucket.titleFontSize
  );
  const headlineLines = bucket.generated_headline
    ? pdfWrapText(
        doc,
        bucket.generated_headline,
        layout.contentWidth,
        'times',
        'italic',
        layout.bucket.headlineFontSize
      )
    : [];
  let height = titleLines.length * layout.bucket.titleLineHeight;
  if (headlineLines.length) height += 4 + (headlineLines.length * layout.bucket.headlineLineHeight);
  height += layout.bucket.gapAfter;
  return { titleLines, headlineLines, height };
}

function measurePdfFinding(doc, sq, bs, layout) {
  const fmt = (bs.subquote_formats && bs.subquote_formats[sq.id]) || 'verbatim';
  const text = subquoteTextForDocx(sq, fmt, bs);
  const contentWidth = layout.contentWidth - layout.finding.textIndent;
  const contextLines = pdfWrapText(
    doc,
    getQaContextText(sq),
    contentWidth,
    'times',
    'italic',
    layout.finding.contextFontSize
  );
  const textLines = pdfWrapText(
    doc,
    text,
    contentWidth,
    'times',
    'normal',
    layout.finding.bodyFontSize
  );
  const attribLines = _attribVisible
    ? pdfWrapText(
        doc,
        `\u2014 ${getFindingAttribution(sq)}`,
        layout.contentWidth,
        'times',
        'italic',
        layout.finding.attribFontSize
      )
    : [];
  let height = 0;
  if (contextLines.length) height += (contextLines.length * layout.finding.contextLineHeight) + 4;
  height += textLines.length * layout.finding.bodyLineHeight;
  if (attribLines.length) height += 4 + (attribLines.length * layout.finding.attribLineHeight);
  height += layout.finding.gapAfter;
  return { contextLines, textLines, attribLines, height };
}

function buildPdfTocPages(doc, tocEntries, layout, coverMetrics) {
  const pages = [[]];
  let y = layout.contentTop
    + coverMetrics.height
    + layout.toc.headingLineHeight
    + layout.toc.headingGapAfter;

  tocEntries.forEach(entry => {
    const metrics = measurePdfTocEntry(doc, entry, layout);
    if (pages[pages.length - 1].length && y + metrics.height > layout.contentBottom) {
      pages.push([]);
      y = layout.contentTop + layout.toc.headingLineHeight + layout.toc.headingGapAfter;
    }
    pages[pages.length - 1].push(entry);
    y += metrics.height;
  });

  return pages;
}

function buildPdfBodyPlan(doc, orderedSections, bankId, layout) {
  const bs = getBankState(bankId);
  let page = 1;
  let y = layout.contentTop;
  const pageMap = new Map();

  orderedSections.forEach((section, sectionIdx) => {
    if (sectionIdx > 0) {
      page += 1;
      y = layout.contentTop;
    }

    pageMap.set('sec_' + sanitizeId(section.name), page);
    y += measurePdfSectionHeading(doc, section.name, layout).height;

    section.buckets.forEach(bucket => {
      const quotes = getReportSubquotes(bankId, bucket.id);
      if (!quotes.length) return;

      const headerMetrics = measurePdfBucketHeader(doc, bucket, layout);
      const firstFindingHeight = quotes.length
        ? measurePdfFinding(doc, quotes[0], bs, layout).height
        : 0;
      const bucketStartHeight = headerMetrics.height + firstFindingHeight;
      if (y + bucketStartHeight > layout.contentBottom && y > layout.contentTop) {
        page += 1;
        y = layout.contentTop;
      }

      pageMap.set(`bs_${bucket.id}`, page);
      y += headerMetrics.height;

      quotes.forEach(sq => {
        const findingMetrics = measurePdfFinding(doc, sq, bs, layout);
        if (y + findingMetrics.height > layout.contentBottom && y > layout.contentTop) {
          page += 1;
          y = layout.contentTop;
        }
        y += findingMetrics.height;
      });
      y += 4;
    });
  });

  return { pageMap, pageCount: page };
}

function drawPdfCoverIntro(doc, layout, coverMetrics, raster) {
  let y = layout.contentTop;
  if (coverMetrics.banner && raster) {
    const x = layout.marginLeft + ((layout.contentWidth - coverMetrics.banner.width) / 2);
    doc.addImage(raster.dataUrl, 'PNG', x, y, coverMetrics.banner.width, coverMetrics.banner.height);
    y += coverMetrics.banner.height + layout.cover.bannerGap;
  }

  if (coverMetrics.metaLines.length) {
    doc.setTextColor(122, 115, 100);
    y = drawPdfLines(
      doc,
      coverMetrics.metaLines,
      layout.pageWidth / 2,
      y,
      layout.cover.metaLineHeight,
      { align: 'center' }
    );
  }

  if (coverMetrics.metaLines.length && coverMetrics.titleLines.length) y += 6;

  if (coverMetrics.titleLines.length) {
    doc.setTextColor(15, 27, 45);
    y = drawPdfLines(
      doc,
      coverMetrics.titleLines,
      layout.pageWidth / 2,
      y,
      layout.cover.titleLineHeight,
      { align: 'center' }
    );
  }

  if (coverMetrics.banner || coverMetrics.metaLines.length || coverMetrics.titleLines.length) {
    y += layout.cover.dividerBefore;
    doc.setDrawColor(217, 208, 188);
    doc.setLineWidth(1);
    doc.line(layout.marginLeft, y, layout.pageWidth - layout.marginRight, y);
    y += layout.cover.dividerAfter;
  }
  return y;
}

function drawPdfTocHeading(doc, layout, y, label) {
  doc.setFont('times', 'bold');
  doc.setFontSize(layout.toc.headingFontSize);
  doc.setTextColor(15, 27, 45);
  doc.text(label, layout.marginLeft, y);
  y += layout.toc.headingLineHeight;
  doc.setDrawColor(231, 223, 204);
  doc.line(layout.marginLeft, y - 5, layout.pageWidth - layout.marginRight, y - 5);
  return y + layout.toc.headingGapAfter;
}

function drawPdfTocEntries(doc, layout, entries, actualPageMap, y) {
  entries.forEach(entry => {
    const metrics = measurePdfTocEntry(doc, entry, layout);
    const indent = entry.level === 2 ? layout.toc.level2Indent : 0;
    const x = layout.marginLeft + indent;
    doc.setTextColor(entry.level === 1 ? 15 : 74, entry.level === 1 ? 27 : 82, entry.level === 1 ? 45 : 104);
    y = drawPdfLines(doc, metrics.lines, x, y, metrics.lineHeight);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(11);
    doc.setTextColor(122, 115, 100);
    const pageNumber = actualPageMap.get(entry.targetId);
    if (pageNumber != null) {
      doc.text(
        String(pageNumber),
        layout.pageWidth - layout.marginRight,
        y - metrics.lineHeight,
        { align: 'right' }
      );
    }
    y += layout.toc.entryGap;
  });
  return y;
}

function drawPdfSectionHeading(doc, layout, sectionName, y) {
  const metrics = measurePdfSectionHeading(doc, sectionName, layout);
  doc.setTextColor(15, 27, 45);
  y = drawPdfLines(doc, metrics.lines, layout.marginLeft, y, layout.section.lineHeight);
  doc.setDrawColor(184, 173, 148);
  doc.line(layout.marginLeft, y - 6, layout.pageWidth - layout.marginRight, y - 6);
  return y + layout.section.gapAfter;
}

function drawPdfBucketHeader(doc, layout, bucket, y) {
  const metrics = measurePdfBucketHeader(doc, bucket, layout);
  doc.setTextColor(15, 27, 45);
  y = drawPdfLines(doc, metrics.titleLines, layout.marginLeft, y, layout.bucket.titleLineHeight);
  if (metrics.headlineLines.length) {
    y += 4;
    doc.setTextColor(74, 82, 104);
    y = drawPdfLines(
      doc,
      metrics.headlineLines,
      layout.marginLeft,
      y,
      layout.bucket.headlineLineHeight
    );
  }
  return y + layout.bucket.gapAfter;
}

function drawPdfFinding(doc, layout, sq, bs, y) {
  const metrics = measurePdfFinding(doc, sq, bs, layout);
  const textX = layout.marginLeft + layout.finding.textIndent;

  if (metrics.contextLines.length) {
    doc.setTextColor(74, 82, 104);
    y = drawPdfLines(
      doc,
      metrics.contextLines,
      textX,
      y,
      layout.finding.contextLineHeight
    );
    y += 4;
  }

  doc.setFillColor(20, 33, 58);
  doc.circle(layout.marginLeft + 5, y - 4, 1.4, 'F');
  doc.setTextColor(20, 33, 58);
  y = drawPdfLines(doc, metrics.textLines, textX, y, layout.finding.bodyLineHeight);

  if (metrics.attribLines.length) {
    y += 4;
    doc.setTextColor(122, 115, 100);
    y = drawPdfLines(
      doc,
      metrics.attribLines,
      layout.pageWidth - layout.marginRight,
      y,
      layout.finding.attribLineHeight,
      { align: 'right' }
    );
  }

  return y + layout.finding.gapAfter;
}

function drawPdfPageNumbers(doc, layout) {
  const totalPages = doc.getNumberOfPages();
  for (let pageNum = 1; pageNum <= totalPages; pageNum += 1) {
    doc.setPage(pageNum);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(122, 115, 100);
    doc.text(String(pageNum), layout.pageWidth - layout.marginRight, layout.footerY, { align: 'right' });
  }
}

function renderPdfBody(doc, layout, orderedSections, bankId) {
  const bs = getBankState(bankId);

  orderedSections.forEach((section, sectionIdx) => {
    doc.addPage();
    let y = layout.contentTop;
    y = drawPdfSectionHeading(doc, layout, section.name, y);

    section.buckets.forEach(bucket => {
      const quotes = getReportSubquotes(bankId, bucket.id);
      if (!quotes.length) return;

      const headerMetrics = measurePdfBucketHeader(doc, bucket, layout);
      const firstFindingHeight = quotes.length
        ? measurePdfFinding(doc, quotes[0], bs, layout).height
        : 0;
      if (y + headerMetrics.height + firstFindingHeight > layout.contentBottom && y > layout.contentTop) {
        doc.addPage();
        y = layout.contentTop;
      }

      y = drawPdfBucketHeader(doc, layout, bucket, y);

      quotes.forEach(sq => {
        const findingMetrics = measurePdfFinding(doc, sq, bs, layout);
        if (y + findingMetrics.height > layout.contentBottom && y > layout.contentTop) {
          doc.addPage();
          y = layout.contentTop;
        }
        y = drawPdfFinding(doc, layout, sq, bs, y);
      });
      y += 4;
    });
  });
}

async function savePdf() {
  let pdfLib;
  try {
    pdfLib = await ensurePdfLibrary();
  } catch (e) {
    alert('Could not load the PDF library from the internet.\n\n' + e.message);
    return;
  }

  const { jsPDF } = pdfLib;
  const bankId = state.current_bank;
  const bank = getCurrentBankData(bankId);
  const orderedSections = getOrderedSections(bankId);
  const raster = state.banner_visible && state.banner_src
    ? await rasterizeImageForExport(state.banner_src, 1800)
    : null;

  const doc = new jsPDF({
    orientation: 'portrait',
    unit: 'pt',
    format: 'letter',
    compress: true,
  });
  const layout = getPdfLayout(doc);
  const coverMetrics = getPdfCoverMetrics(doc, layout, raster);
  const tocEntries = getPdfTocEntries(orderedSections);
  const tocPages = buildPdfTocPages(doc, tocEntries, layout, coverMetrics);
  const bodyPlan = buildPdfBodyPlan(doc, orderedSections, bankId, layout);
  const actualPageMap = new Map(
    [...bodyPlan.pageMap.entries()].map(([targetId, pageNum]) => [targetId, pageNum + tocPages.length])
  );

  doc.setProperties({
    title: getReportExportTitle(bankId) || 'PM Call Summary',
    subject: 'PM Call Summary',
    creator: 'Call Summary Editor',
  });

  let tocY = drawPdfCoverIntro(doc, layout, coverMetrics, raster);
  tocY = drawPdfTocHeading(doc, layout, tocY, 'Contents');
  drawPdfTocEntries(doc, layout, tocPages[0] || [], actualPageMap, tocY);

  for (let idx = 1; idx < tocPages.length; idx += 1) {
    doc.addPage();
    let y = drawPdfTocHeading(doc, layout, layout.contentTop, 'Contents (continued)');
    drawPdfTocEntries(doc, layout, tocPages[idx], actualPageMap, y);
  }

  renderPdfBody(doc, layout, orderedSections, bankId);
  drawPdfPageNumbers(doc, layout);

  const ts = new Date().toISOString().replace(/[:.]/g, '').slice(0, 15);
  const bankToken = slugifyFilePart(bank.ticker || bank.company_name, 'bank');
  const periodToken = slugifyFilePart(getReportPeriodLabel(), 'period');
  doc.save(`call_summary_${bankToken}_${periodToken}_${ts}.pdf`);
}

async function saveDocx() {
  const btn = document.getElementById('docx-btn');
  const origHtml = btn ? btn.innerHTML : '';
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = 'Building DOCX&hellip;';
  }

  let docxLib;
  try {
    docxLib = await ensureDocxLibrary();
  } catch (e) {
    alert('Could not load the DOCX library from the internet.\n\n' + e.message);
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = origHtml;
    }
    return;
  }

  const {
    Document, Packer, Paragraph, TextRun, HeadingLevel,
    ImageRun, AlignmentType, PageBreak, TableOfContents, LevelFormat,
  } = docxLib;

  const bankId = state.current_bank;
  const bank = getCurrentBankData(bankId);
  const bs = getBankState(bankId);
  const orderedSections = getOrderedSections(bankId);
  const titleText = getReportCoverMeta(bankId) || 'Call Summary';
  const subtitleText = getReportCoverTitle();
  const children = [];

  if (state.banner_visible && state.banner_src) {
    const raster = await rasterizeImageForExport(state.banner_src, 1800);
    if (raster) {
      let pxWidth = Math.min(620, raster.width);
      let pxHeight = Math.round(raster.height * (pxWidth / raster.width));
      if (pxHeight > 150) {
        const scale = 150 / pxHeight;
        pxWidth = Math.round(pxWidth * scale);
        pxHeight = Math.round(pxHeight * scale);
      }
      children.push(new Paragraph({
        alignment: AlignmentType.CENTER,
        spacing: { before: 0, after: 180 },
        children: [new ImageRun({
          data: raster.data,
          transformation: { width: pxWidth, height: pxHeight },
        })],
      }));
    }
  }

  children.push(new Paragraph({
    heading: HeadingLevel.TITLE,
    alignment: AlignmentType.CENTER,
    spacing: { before: 60, after: 80 },
    children: [new TextRun({ text: titleText, bold: true, size: 40 })],
  }));
  children.push(new Paragraph({
    alignment: AlignmentType.CENTER,
    spacing: { before: 0, after: 320 },
    children: [new TextRun({ text: subtitleText, bold: true, size: 24, color: '4A5268' })],
  }));

  children.push(new Paragraph({
    heading: HeadingLevel.HEADING_1,
    spacing: { before: 0, after: 120 },
    children: [new TextRun({ text: 'Contents', bold: true })],
  }));
  children.push(new TableOfContents('Contents', {
    hyperlink: true,
    headingStyleRange: '1-2',
  }));
  children.push(new Paragraph({ children: [new PageBreak()] }));

  orderedSections.forEach(({ name: secName, buckets: sectionBuckets }, sIdx) => {
    if (sIdx > 0) children.push(new Paragraph({ children: [new PageBreak()] }));
    children.push(new Paragraph({
      heading: HeadingLevel.HEADING_1,
      spacing: { before: 240, after: 160 },
      children: [new TextRun({ text: secName, bold: true })],
    }));

    sectionBuckets.forEach(bucket => {
      const quotes = getReportSubquotes(bankId, bucket.id);
      if (!quotes.length) return;
      const title = (state.bucket_user_titles || {})[bucket.id] || bucket.name;

      children.push(new Paragraph({
        heading: HeadingLevel.HEADING_2,
        spacing: { before: 200, after: 80 },
        children: [new TextRun({ text: title, bold: true })],
      }));
      if (bucket.generated_headline) {
        children.push(new Paragraph({
          spacing: { before: 0, after: 140 },
          children: [new TextRun({
            text: bucket.generated_headline,
            italics: true,
            color: '4A5268',
          })],
        }));
      }

      quotes.forEach(sq => {
        const fmt = (bs.subquote_formats && bs.subquote_formats[sq.id]) || 'verbatim';
        const text = subquoteTextForDocx(sq, fmt, bs);
        if (!text) return;

        const context = getQaContextText(sq);
        if (context) {
          children.push(new Paragraph({
            spacing: { before: 100, after: 40 },
            indent: { left: 360 },
            children: [new TextRun({
              text: context,
              italics: true,
              color: '4A5268',
              size: 20,
            })],
          }));
        }

        children.push(new Paragraph({
          bullet: { level: 0 },
          spacing: { before: 40, after: 40 },
          children: [new TextRun({ text })],
        }));

        if (_attribVisible) {
          children.push(new Paragraph({
            alignment: AlignmentType.RIGHT,
            spacing: { before: 0, after: 140 },
            children: [new TextRun({
              text: `\u2014 ${getFindingAttribution(sq)}`,
              italics: true,
              size: 18,
              color: '7A7364',
            })],
          }));
        }
      });
    });
  });

  const doc = new Document({
    creator: 'Call Summary Editor',
    title: getReportExportTitle(bankId) || 'PM Call Summary',
    description: subtitleText,
    styles: {
      default: {
        document: { run: { font: 'Georgia', size: 22 } },
        heading1: {
          run: { font: 'Georgia', size: 32, bold: true, color: '0F1B2D' },
          paragraph: { spacing: { before: 320, after: 160 } },
        },
        heading2: {
          run: { font: 'Georgia', size: 26, bold: true, color: '0F1B2D' },
          paragraph: { spacing: { before: 200, after: 80 } },
        },
        title: { run: { font: 'Georgia', size: 44, bold: true, color: '0F1B2D' } },
      },
    },
    numbering: {
      config: [{
        reference: 'default-bullets',
        levels: [{
          level: 0,
          format: LevelFormat.BULLET,
          text: '\u2022',
          alignment: AlignmentType.LEFT,
          style: { paragraph: { indent: { left: 360, hanging: 260 } } },
        }],
      }],
    },
    sections: [{
      properties: {
        page: {
          margin: {
            top: 1080,
            right: 720,
            bottom: 1080,
            left: 720,
          },
        },
      },
      children,
    }],
  });

  try {
    const blob = await Packer.toBlob(doc);
    const ts = new Date().toISOString().replace(/[:.]/g, '').slice(0, 15);
    const bankToken = slugifyFilePart(bank.ticker || bank.company_name, 'bank');
    const periodToken = slugifyFilePart(getReportPeriodLabel(), 'period');
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `call_summary_${bankToken}_${periodToken}_${ts}.docx`;
    a.click();
    URL.revokeObjectURL(url);
  } catch (e) {
    alert('Failed to build DOCX: ' + e.message);
    console.error(e);
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = origHtml;
    }
  }
}

// ============================================================
// UTILITIES
// ============================================================
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escAttr(s) { return esc(s); }
</script>
</body>
</html>
