<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Summary — __PERIOD__</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600;700;800&display=swap');

/* ════════════════════════════════════════════════════════════════
   TOKENS — Editorial Financial theme
   ════════════════════════════════════════════════════════════════ */
:root{
  /* Ink & paper */
  --ink:#0F1B2D;
  --ink-2:#213149;
  --ink-3:#3A4A66;
  --paper:#FAF7F0;
  --paper-2:#FFFFFF;
  --surface-1:#F5F1E6;
  --surface-2:#EFEADC;
  --surface-3:#FBF8EF;

  /* Rules / borders */
  --rule:#D9D0BC;
  --rule-2:#E7DFCC;
  --rule-3:#F1EBD9;

  /* Text */
  --text-1:#14213A;
  --text-2:#4A5268;
  --text-3:#7A7364;
  --text-on-ink:#FBF8EF;
  --text-on-ink-2:rgba(251,248,239,.72);

  /* Semantic */
  --accent:#B25A1E;
  --accent-hover:#8F4516;
  --accent-soft:#F2DDC3;
  --accent-line:#D49764;
  --positive:#1F6F3F;
  --positive-soft:#DCECE1;
  --candidate:#B17015;
  --candidate-soft:#F6E4C7;
  --danger:#B0321A;

  /* Shadows */
  --shadow-sm:0 1px 2px rgba(15,27,45,.06);
  --shadow-md:0 4px 14px rgba(15,27,45,.08);
  --shadow-lg:0 18px 48px rgba(15,27,45,.22);

  /* Fonts */
  --font-sans:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --font-serif:'Source Serif 4',Georgia,'Times New Roman',serif;

  /* Radii */
  --r-sm:4px;
  --r-md:8px;
  --r-lg:12px;
}

/* ════════════════════════════════════════════════════════════════
   RESET & BASE
   ════════════════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font-sans);
  background:var(--paper);
  color:var(--text-1);
  font-size:13.5px;
  line-height:1.55;
  height:100vh;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  font-feature-settings:"ss01","cv11","kern";
}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--paper)}

/* ════════════════════════════════════════════════════════════════
   CHROME — banner + tab bar
   ════════════════════════════════════════════════════════════════ */
#app-banner{
  flex-shrink:0;
  background:var(--ink);
  color:var(--text-on-ink);
  font-family:var(--font-serif);
  font-size:15px;
  font-weight:600;
  letter-spacing:.005em;
  padding:13px 28px;
  text-transform:none;
  position:relative;
  display:flex;
  align-items:baseline;
  gap:14px;
  flex-wrap:wrap;
}
#app-banner::after{
  content:"";
  position:absolute;left:28px;right:28px;bottom:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent-line) 15%,var(--accent-line) 85%,transparent);
  opacity:.35;
}
#banner-meta{
  font-family:var(--font-sans);
  font-size:12.5px;
  font-weight:500;
  color:var(--text-on-ink-2);
  letter-spacing:.01em;
  display:inline-flex;
  align-items:baseline;
  gap:8px;
}
#banner-meta:empty{display:none}
#banner-meta .banner-sep{
  display:inline-block;
  width:1px;height:12px;
  background:var(--text-on-ink-2);
  opacity:.35;
  transform:translateY(1px);
}
#banner-meta .banner-period{
  font-weight:400;
  opacity:.78;
  margin-left:4px;
}

/* PDF banner (print only) */
#banner-wrap{display:none}
#banner-wrap img{max-height:56px;max-width:400px;object-fit:contain}

/* Tab bar */
#tab-bar{
  flex-shrink:0;
  background:var(--paper);
  border-bottom:1px solid var(--rule);
  display:flex;align-items:stretch;
  padding:0 24px;gap:2px;
  overflow-x:auto;scrollbar-width:none;
}
#tab-bar::-webkit-scrollbar{display:none}
.tab-btn{
  padding:11px 18px 10px;
  font-size:12.5px;
  font-weight:500;
  letter-spacing:.005em;
  border:none;background:none;cursor:pointer;
  color:var(--text-2);
  border-bottom:2px solid transparent;
  white-space:nowrap;
  transition:color .15s,border-color .15s;
}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--accent);font-weight:600}
.tab-btn:hover:not(.active){color:var(--ink)}

/* Content area */
#content-area{flex:1;display:flex;overflow:hidden;position:relative;background:var(--paper)}

/* ════════════════════════════════════════════════════════════════
   TRANSCRIPT PANEL — wrap + rail + resize
   ════════════════════════════════════════════════════════════════ */
#transcript-wrap{display:flex;flex-shrink:0;overflow:hidden;transition:width .2s ease;border-right:1px solid var(--rule)}
#transcript-wrap.tp-collapsed{width:34px!important;border-right:none}

#transcript-panel{flex:1;display:flex;flex-direction:row;background:var(--surface-3);overflow:hidden;min-width:0}

#tp-content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative;transition:opacity .15s,flex .2s}
.tp-collapsed #tp-content{opacity:0;pointer-events:none;overflow:hidden;flex:0}

#tp-rail{
  width:34px;flex-shrink:0;
  background:var(--ink);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  user-select:none;z-index:2;
  transition:background .15s;
  border-left:1px solid var(--ink-2);
}
#tp-rail:hover{background:var(--ink-2)}
#tp-rail-label{
  writing-mode:vertical-lr;
  font-family:var(--font-serif);
  font-size:11px;font-weight:600;
  color:var(--text-on-ink-2);
  letter-spacing:.08em;
  text-transform:uppercase;
  white-space:nowrap;
}

#tp-resize{width:4px;flex-shrink:0;cursor:col-resize;background:transparent;transition:background .15s}
#tp-resize:hover,#tp-resize.active{background:var(--accent-line)}
#tp-resize.tp-hidden{display:none}

#transcript-body{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:0;min-height:0}

/* Fixed section label — sits above the scroll area so the scrollbar starts
   BELOW it, keeping the seam with #tp-rail visually continuous. */
#tp-section-label{
  flex-shrink:0;
  padding:14px 18px 12px;
  background:var(--ink);
  color:var(--text-on-ink);
  font-family:var(--font-serif);
  font-size:12px;font-weight:600;
  text-transform:uppercase;letter-spacing:.14em;
  border-bottom:1px solid var(--ink-2);
}

#tp-scroll{
  flex:1;
  overflow-y:auto;
  padding:0 0 16px;
  min-height:0;
  scrollbar-width:thin;
  scrollbar-color:var(--ink-3) transparent;
}
#tp-scroll::-webkit-scrollbar{width:8px}
#tp-scroll::-webkit-scrollbar-track{background:transparent}
#tp-scroll::-webkit-scrollbar-thumb{background:var(--ink-3);border-radius:4px;border:none}
#tp-scroll::-webkit-scrollbar-thumb:hover{background:var(--ink-2)}

/* First inline section header is hidden — #tp-section-label shows it instead.
   Subsequent section headers (e.g. Q&A) remain as inline dividers. */
#tp-scroll > .t-section-header:first-child{display:none}

/* Section header — inline divider between sections (no longer sticky, the
   current-section title is rendered in #tp-section-label above the scroll). */
.t-section-header{
  padding:14px 18px 12px;
  background:var(--ink);
  color:var(--text-on-ink);
  font-family:var(--font-serif);
  font-size:12px;font-weight:600;
  text-transform:uppercase;letter-spacing:.14em;
  border-bottom:1px solid var(--ink-2);
  margin-bottom:10px;
}

/* MD speaker block */
.t-block{
  margin:6px 14px;padding:10px 12px 10px 14px;
  border-left:2px solid var(--rule);
  border-radius:0 var(--r-sm) var(--r-sm) 0;
  background:var(--paper-2);
  box-shadow:var(--shadow-sm);
}
.t-block-header{display:flex;flex-wrap:wrap;align-items:baseline;gap:6px;margin-bottom:6px}
.t-speaker-name{font-weight:700;font-size:11.5px;color:var(--ink);letter-spacing:.005em}
.t-speaker-title{font-size:10.5px;color:var(--text-3);font-style:italic}
.t-block-text{font-size:12px;line-height:1.6;color:var(--text-1)}
.t-para-break{display:block;height:8px}

/* QA group */
.t-qa-group{
  margin:8px 14px;
  border:1px solid var(--rule-2);
  border-left:2px solid var(--accent-line);
  border-radius:0 var(--r-md) var(--r-md) 0;
  overflow:hidden;
  background:var(--paper-2);
  box-shadow:var(--shadow-sm);
}
.t-qa-q{padding:9px 12px 8px;background:var(--surface-1)}
.t-qa-a{padding:9px 12px 8px;border-top:1px solid var(--rule-3)}
.qa-lbl{
  display:inline-block;
  font-size:9px;font-weight:700;
  padding:2px 5px;border-radius:3px;
  margin-right:5px;vertical-align:middle;
  letter-spacing:.08em;
}
.qa-lbl.q{background:var(--ink);color:var(--text-on-ink)}
.qa-lbl.a{background:var(--positive);color:#fff}
.qa-person{font-weight:700;font-size:11px;color:var(--ink)}
.qa-affil{font-size:10.5px;color:var(--text-3);font-style:italic}
.t-qa-text{font-size:12px;line-height:1.6;color:var(--text-1);margin-top:3px}
.t-qa-footer{padding:5px 10px;background:var(--surface-3);border-top:1px solid var(--rule-3);display:flex;align-items:center;gap:6px}
.bucket-pill{
  font-size:9.5px;padding:2px 7px;border-radius:999px;
  color:#fff;font-weight:600;white-space:nowrap;
  letter-spacing:.01em;
}
.importance-chip{
  font-size:9.5px;color:var(--text-3);
  background:var(--surface-1);
  padding:2px 7px;border-radius:999px;
  border:1px solid var(--rule-2);
}

/* Sentence tokens */
.s-tok{
  border-radius:2px;padding:0 1px;
  cursor:pointer;
  border-bottom:1.5px solid transparent;
  transition:opacity .1s,background .1s;
  font-size:inherit;line-height:inherit;
}
.s-tok:hover{opacity:.8}
.s-tok.qa-sent{cursor:default}

/* Included / candidate / excluded */
.s-tok.s-incl{
  background:var(--positive-soft);
  border-bottom-color:rgba(31,111,63,.55);
  color:var(--text-1);
}
.s-tok.s-cand{
  background:var(--candidate-soft);
  border-bottom-color:rgba(177,112,21,.5);
  color:var(--text-1);
}
.s-tok.s-excl{background:transparent;border-bottom-color:transparent;color:var(--text-3)}
.s-tok.s-excl:hover{opacity:.65}

/* Group bullet separator */
.t-gbullet{display:inline;color:var(--text-3);font-size:11px;margin:0 2px;user-select:none;vertical-align:middle;opacity:.6}

/* QA numbered container */
.t-qa-num-label{
  font-size:9.5px;font-weight:700;color:var(--text-3);
  padding:8px 14px 3px;
  text-transform:uppercase;letter-spacing:.12em;
}

/* Cross-highlight: flash sentence in report panel */
.s-tok.s-highlight{
  outline:2px solid var(--accent);outline-offset:1px;
  background:var(--accent-soft)!important;border-radius:3px;
  animation:s-flash .6s ease-out;
}
@keyframes s-flash{
  0%{outline-color:var(--accent);background:var(--accent-soft)}
  100%{outline-color:var(--accent);background:var(--accent-soft)}
}
/* Persistent single-finding selection — click a q-card in the report or a
   sentence in the transcript to mark one finding. Border only, no fill. */
.q-card.q-card-selected{
  box-shadow:0 0 0 2px #2563EB;
  border-radius:4px;
  transition:box-shadow .2s, background .2s;
}
/* Persistent category highlight on the report side — every finding belonging
   to state.highlighted_bucket_id gets the blue fill plus the same blue border
   as a single selection, matching .tp-highlighted on the transcript side. */
.q-card.q-card-cat-highlighted{
  background:#DBEAFE;
  box-shadow:0 0 0 2px #2563EB;
  border-radius:4px;
  transition:box-shadow .2s, background .2s;
}
/* The stock ::before is a grey gutter bar; hide it under the blue fill/border
   so it doesn't read as a stray grey smudge inside the highlighted region. */
.q-card.q-card-selected::before,
.q-card.q-card-cat-highlighted::before{display:none}

/* ════════════════════════════════════════════════════════════════
   SENTENCE POPOVER
   ════════════════════════════════════════════════════════════════ */
#s-popover{
  position:fixed;z-index:9999;
  background:var(--paper-2);
  border:1px solid var(--rule);
  border-radius:var(--r-md);
  box-shadow:var(--shadow-lg);
  width:440px;max-width:min(440px,calc(100vw - 16px));
  display:none;overflow:hidden;
}
#s-pop-text{
  padding:14px 16px;
  font-family:var(--font-serif);
  font-size:13px;color:var(--text-1);
  border-bottom:1px solid var(--rule-3);
  line-height:1.65;font-style:italic;
  max-height:180px;overflow:auto;
}
#s-pop-title{
  padding:8px 16px 6px;
  font-size:10px;text-transform:uppercase;letter-spacing:.12em;
  color:var(--text-3);
  background:var(--surface-3);
  border-bottom:1px solid var(--rule-3);
  font-weight:600;
}
#s-pop-scores{max-height:420px;overflow-y:auto}
.s-score-section{padding:10px 0;border-bottom:1px solid var(--rule-3)}
.s-score-section:last-child{border-bottom:none}
.s-score-section-title{padding:0 16px 8px;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.1em}
.s-score-row{display:flex;align-items:flex-start;gap:10px;padding:8px 16px;cursor:pointer;transition:background .1s}
.s-score-row:hover{background:var(--surface-1)}
.s-score-row.current{background:var(--accent-soft)}
.s-score-row.readonly{cursor:default}
.s-score-row.readonly:hover{background:transparent}
.s-score-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.s-score-main{flex:1;min-width:0}
.s-score-name{font-size:12.5px;color:var(--ink);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-score-val{font-size:11px;font-weight:700;color:var(--text-3);min-width:28px;text-align:right;padding-top:3px;font-variant-numeric:tabular-nums}
.s-score-check{font-size:13px;color:var(--accent);margin-left:2px;min-width:12px}
.s-expand-btn{
  margin:8px 16px;padding:8px 12px;
  border:1px solid var(--rule);border-radius:var(--r-sm);
  background:var(--paper-2);color:var(--ink);
  font-size:11.5px;font-weight:600;
  cursor:pointer;width:calc(100% - 32px);text-align:left;
  transition:background .15s;
}
.s-expand-btn:hover{background:var(--surface-1)}
#s-pop-all{display:none;padding-top:8px}
.s-pop-form{padding:10px 16px 4px;display:grid;gap:8px}
.s-pop-form input,.s-pop-form textarea,.s-pop-form select{
  width:100%;
  border:1px solid var(--rule);
  border-radius:var(--r-sm);
  padding:8px 10px;
  font-size:12px;
  font-family:inherit;
  background:var(--paper-2);color:var(--text-1);
  transition:border-color .15s,box-shadow .15s;
}
.s-pop-form input:focus,.s-pop-form textarea:focus,.s-pop-form select:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-soft);
}
.s-pop-form textarea{min-height:64px;resize:vertical;font-family:var(--font-serif);font-size:13px;line-height:1.55}
.s-pop-form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.s-pop-form-actions{display:flex;justify-content:flex-end;padding:4px 16px 14px;gap:8px}
#s-pop-custom{display:none}
#s-pop-footer{padding:9px 16px;border-top:1px solid var(--rule-3);background:var(--surface-3)}
.s-pop-note{font-size:10.5px;color:var(--text-3);font-style:italic}

/* ════════════════════════════════════════════════════════════════
   REPORT PANEL — header + paper
   ════════════════════════════════════════════════════════════════ */
#report-panel{flex:1;display:flex;flex-direction:column;background:var(--paper);min-width:0}

#report-header{
  flex-shrink:0;
  background:var(--ink);
  border-bottom:1px solid var(--ink-2);
  padding:11px 22px;
  display:flex;align-items:center;justify-content:flex-end;
  position:relative;
}
#report-header::before{
  content:"";
  position:absolute;
  right:100%;top:0;bottom:0;
  width:5px;
  background:var(--ink);
  pointer-events:none;
}
.report-actions{display:flex;gap:6px;align-items:center}
.hdr-menu-caret{margin-left:6px;width:10px;height:10px;display:inline-block;vertical-align:middle;opacity:.85}
.hdr-menu-caret path{stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
/* Icon-only dropdown trigger — the Settings and Save menus are compact gear
   and disk glyphs. Square padding keeps the hit target balanced, and the SVG
   inherits currentColor so it picks up the existing header button color. */
.btn.hdr-menu-trigger.btn-icon{padding:7px 8px;line-height:0}
.btn.hdr-menu-trigger.btn-icon svg{display:block;width:16px;height:16px}
.report-actions .btn{
  color:var(--text-on-ink);
  border-color:rgba(251,248,239,.18);
  background:rgba(251,248,239,.04);
}
.report-actions .btn:hover{
  background:rgba(251,248,239,.1);
  color:#fff;
  border-color:rgba(251,248,239,.32);
}

/* Badge buttons */
.btn-badge{position:relative;overflow:visible}
.btn-badge.btn-disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.badge-count{
  position:absolute;top:-6px;right:-6px;
  background:var(--accent);color:#fff;
  font-size:10px;font-weight:700;
  min-width:18px;height:18px;border-radius:9px;
  display:inline-flex;align-items:center;justify-content:center;
  padding:0 5px;
  box-shadow:0 1px 3px rgba(0,0,0,.4);
  line-height:1;letter-spacing:0;
  border:1.5px solid var(--ink);
}
.badge-count.hidden{display:none}

/* ════════════════════════════════════════════════════════════════
   MODAL
   ════════════════════════════════════════════════════════════════ */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(15,27,45,.5);
  backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
  z-index:9998;
  align-items:flex-start;justify-content:center;
  padding:56px 20px 20px;
}
.modal-overlay.active{display:flex}
.modal-box{
  background:var(--paper-2);
  border-radius:var(--r-lg);
  box-shadow:var(--shadow-lg);
  width:min(780px,100%);
  max-height:calc(100vh - 80px);
  display:flex;flex-direction:column;overflow:hidden;
  border:1px solid var(--rule-2);
}
.modal-header{
  flex-shrink:0;
  padding:18px 22px 16px;
  border-bottom:1px solid var(--rule-2);
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  background:var(--surface-3);
}
.modal-title{font-family:var(--font-serif);font-size:18px;font-weight:700;color:var(--ink);letter-spacing:.005em}
.modal-subtitle{font-size:11.5px;color:var(--text-2);margin-top:4px;line-height:1.5;max-width:620px}
.modal-close{
  background:none;border:none;
  font-size:22px;color:var(--text-2);
  cursor:pointer;line-height:1;
  padding:2px 8px;border-radius:var(--r-sm);
  flex-shrink:0;transition:background .15s,color .15s;
}
.modal-close:hover{background:var(--surface-1);color:var(--ink)}
.modal-body{flex:1;overflow-y:auto;padding:20px 22px;background:var(--paper-2)}
.modal-empty{font-size:12.5px;color:var(--text-3);font-style:italic;text-align:center;padding:24px}

/* Emerging topics toggle bar (used in the proposal modal) */
.emg-bar{
  background:var(--surface-1);
  border:1px solid var(--rule-2);
  border-radius:var(--r-md);
  padding:12px 14px;margin:0 0 20px;font-size:11.5px;
}
.emg-bar-title{
  font-size:10px;font-weight:700;color:var(--text-3);
  text-transform:uppercase;letter-spacing:.12em;
  margin-bottom:8px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.emg-bar-title-count{color:var(--text-3);font-weight:600;text-transform:none;letter-spacing:0}
.emg-bar-row{display:flex;align-items:center;gap:12px;padding:6px 0}
.emg-bar-row+.emg-bar-row{border-top:1px solid var(--rule-3)}
.emg-bar-main{flex:1;min-width:0;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.emg-bar-label{color:var(--ink);font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.emg-bar-meta{color:var(--text-3);font-size:10.5px;font-weight:500;white-space:nowrap}

/* Report body + page */
#report-body{flex:1;overflow-y:auto;padding:32px 24px 48px;background:var(--paper)}
#report-page{
  background:var(--paper-2);
  min-height:calc(100% - 48px);
  border-radius:2px;
  box-shadow:var(--shadow-md);
  padding:56px 64px 72px;
  max-width:820px;
  margin:0 auto;
  position:relative;
}
#report-page::before{
  content:"";
  position:absolute;top:0;left:64px;right:64px;height:3px;
  background:var(--accent);
}

/* Banner cover page — shown at the top of the report paper when the banner
   toggle is on. The negative margin lets the image run to the page edges while
   the L1 heading below keeps its normal text column. */
.rpt-cover{
  margin:-8px -64px 28px;
  padding:0 0 22px;
  text-align:center;
  border-bottom:1px solid var(--rule);
}
.rpt-cover img{
  display:block;
  width:100%;
  height:auto;
  max-width:none;
  max-height:170px;
  object-fit:contain;
  object-position:center;
  margin:0 auto;
}
.rpt-cover-copy{margin:18px auto 0;max-width:920px;padding:0 52px}
.rpt-cover-meta{
  font-family:var(--font-sans);
  font-size:12px;
  font-weight:700;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--text-3);
}
.rpt-cover-title{
  font-family:var(--font-serif);
  font-size:32px;
  font-weight:700;
  line-height:1.15;
  color:var(--ink);
  margin-top:10px;
}
.rpt-cover-noimg{padding-top:18px}

/* Table of contents — editorial list with dotted leaders. Page numbers are
   populated by `target-counter` in print only; on screen they stay empty so
   the rows read as a clean navigation list. */
.rpt-toc{
  margin:0 0 32px;
  padding:0 0 24px;
  border-bottom:1px solid var(--rule);
}
.rpt-toc-title{
  font-family:var(--font-serif);
  font-size:18px;font-weight:700;
  color:var(--ink);
  margin:0 0 12px;
  padding:0 0 8px;
  border-bottom:1px solid var(--rule-2);
  letter-spacing:.005em;
}
.rpt-toc-list,.rpt-toc-sublist{list-style:none;padding:0;margin:0}
.rpt-toc-sublist{padding-left:18px;margin:2px 0 10px}
.rpt-toc-l1>a,.rpt-toc-l2>a{
  display:flex;align-items:baseline;gap:6px;
  padding:3px 0;
  text-decoration:none;
  font-family:var(--font-serif);
  color:var(--text-1);
  transition:color .1s;
}
.rpt-toc-l1>a{font-weight:700;font-size:14px;color:var(--ink);padding:5px 0}
.rpt-toc-l2>a{font-weight:400;font-size:12.5px;color:var(--text-2)}
.rpt-toc-l1>a:hover,.rpt-toc-l2>a:hover{color:var(--accent)}
.rpt-toc-label{flex-shrink:1;min-width:0}
.rpt-toc-leader{
  flex:1;min-width:24px;
  border-bottom:1px dotted var(--rule);
  transform:translateY(-4px);
  opacity:.6;
}
.rpt-toc-page{
  font-variant-numeric:tabular-nums;
  color:var(--text-3);
  font-size:11.5px;
  min-width:18px;text-align:right;
}
/* On screen the page numbers have no meaning — hide the trailing span and
   the leader so rows render as clean clickable lines. */
@media screen{
  .rpt-toc-page{display:none}
  .rpt-toc-leader{display:none}
}

/* L1 section heading */
.rpt-l1{
  font-family:var(--font-serif);
  font-size:22px;font-weight:700;
  color:var(--ink);
  padding:6px 0 10px;
  margin:0 0 14px;
  border-bottom:1px solid var(--rule);
  text-transform:none;
  letter-spacing:0;
  line-height:1.25;
}
.rpt-l1:not(:first-child){margin-top:32px}

/* L2 bucket heading */
.bkt-section{margin-bottom:18px;overflow:hidden}
.bkt-header{
  display:flex;align-items:flex-start;gap:12px;
  padding:8px 0 10px;
  cursor:pointer;user-select:none;
  border-bottom:1px solid var(--rule-3);
  margin-bottom:10px;
}
.bkt-bar{
  width:3px;min-height:28px;
  border-radius:2px;flex-shrink:0;
  margin-top:5px;
}
.bkt-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.bkt-name-row{display:flex;align-items:center;gap:8px;width:100%;min-width:0}
.bkt-name-input{
  font-family:var(--font-serif);
  font-size:16px;font-weight:700;
  color:var(--ink);
  background:transparent;border:none;outline:none;
  padding:0;cursor:text;display:block;
  letter-spacing:.005em;
  line-height:1.3;
  /* field-sizing auto-shrinks the input to its text so the highlighter button
     sits directly after the title rather than floating at the row's far edge.
     Long titles still respect the row width via the max-width + flex-shrink
     below — overflow collapses gracefully via ellipsis-free truncation. */
  field-sizing:content;
}
.bkt-name-row .bkt-name-input{flex:0 1 auto;min-width:0;max-width:100%}
.bkt-name-input:focus{background:var(--surface-1);border-radius:3px;padding:2px 6px;margin:-2px -6px}
.bkt-headline{
  font-size:12px;color:var(--text-2);
  font-style:italic;line-height:1.5;
  display:block;word-wrap:break-word;
  font-family:var(--font-serif);
}
.bkt-chevron{width:14px;height:14px;color:var(--text-3);transition:transform .15s;flex-shrink:0;margin-top:8px;opacity:.6}
.bkt-chevron path{stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.bkt-chevron.closed{transform:rotate(0deg)}
.bkt-chevron.open{transform:rotate(180deg)}
.bkt-quotes{padding:2px 0 2px 15px}

/* Emerging topic review (inside modal) */
.emg-review-panel{border:1px solid var(--rule-2);border-radius:var(--r-md);background:var(--paper-2);overflow:hidden}
.emg-review-header{padding:14px 16px;border-bottom:1px solid var(--rule-2);background:var(--surface-3);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.emg-review-title{font-family:var(--font-serif);font-size:16px;font-weight:700;color:var(--ink)}
.emg-review-subtitle{font-size:11.5px;color:var(--text-2);margin-top:3px;max-width:620px;line-height:1.5}
.emg-review-pill{font-size:10.5px;font-weight:700;color:var(--positive);background:var(--positive-soft);border-radius:999px;padding:4px 10px;white-space:nowrap}
.emg-review-grid{display:grid;gap:10px;padding:14px}
.emg-review-card{border:1px solid var(--rule-2);border-radius:var(--r-md);background:var(--surface-3);padding:14px}
.emg-review-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.emg-review-card-title{font-family:var(--font-serif);font-size:14px;font-weight:700;color:var(--ink)}
.emg-review-card-subtitle{font-size:11.5px;color:var(--text-3);margin-top:4px}
.emg-review-card-summary{font-size:12.5px;color:var(--text-1);line-height:1.6;margin-top:10px;font-family:var(--font-serif)}
.emg-review-card-actions{display:flex;justify-content:flex-end;margin-top:12px}

/* Config review */
.cfg-review-drawer{margin-top:14px;border:1px solid var(--rule-2);border-radius:var(--r-md);background:var(--paper-2);overflow:hidden}
.cfg-review-drawer summary{list-style:none;cursor:pointer;padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;background:var(--surface-3)}
.cfg-review-drawer summary::-webkit-details-marker{display:none}
.cfg-review-title{font-family:var(--font-serif);font-size:16px;font-weight:700;color:var(--ink)}
.cfg-review-subtitle{font-size:11.5px;color:var(--text-2);margin-top:3px;max-width:620px;line-height:1.5}
.cfg-review-pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.cfg-review-pill{font-size:10.5px;font-weight:700;color:var(--text-2);background:var(--surface-1);border-radius:999px;padding:4px 10px;white-space:nowrap;border:1px solid var(--rule-2)}
.cfg-review-body{padding:16px}
.cfg-review-section+.cfg-review-section{margin-top:18px}
.cfg-review-section h3{font-family:var(--font-serif);font-size:13px;font-weight:700;color:var(--ink);margin:0 0 10px}
.cfg-review-table{width:100%;border-collapse:collapse;font-size:11.5px}
.cfg-review-table th,.cfg-review-table td{border:1px solid var(--rule-2);padding:9px 10px;text-align:left;vertical-align:top}
.cfg-review-table th{background:var(--surface-3);color:var(--text-2);font-weight:700}
.cfg-review-table td{color:var(--text-1);line-height:1.55}
.cfg-review-empty{font-size:12px;color:var(--text-3);font-style:italic;padding:6px 0}
.cfg-review-detail{margin:0}
.cfg-review-detail summary{list-style:none;cursor:pointer;font-size:11.5px;font-weight:700;color:var(--accent);padding:0;background:none;display:inline-flex}
.cfg-review-detail summary::-webkit-details-marker{display:none}
.cfg-review-detail-body{margin-top:8px}
.cfg-review-note{font-size:11.5px;color:var(--text-2);margin-top:10px}
.cfg-review-evidence{margin-top:10px;display:grid;gap:6px}
.cfg-review-evidence-item{font-size:11.5px;line-height:1.55;color:var(--text-1);background:var(--surface-3);border-radius:var(--r-sm);padding:9px 11px;border-left:3px solid var(--rule)}
.cfg-config-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:11.5px}
.cfg-config-table th,.cfg-config-table td{border:1px solid var(--rule-2);padding:8px 9px;text-align:left;vertical-align:top}
.cfg-config-table th{width:140px;background:var(--surface-3);color:var(--text-2);font-weight:700}
.cfg-config-table td{white-space:pre-wrap}
.cfg-review-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
.cfg-review-help{font-size:11.5px;color:var(--text-2);line-height:1.6;margin:2px 0 12px}
.cfg-review-help code{background:var(--surface-1);padding:2px 6px;border-radius:3px;font-size:11px;font-family:ui-monospace,"SF Mono",Menlo,monospace}

/* Pass-1 update cards */
.cfg-update-list{display:grid;gap:12px}
.cfg-update-card{border:1px solid var(--rule-2);border-radius:var(--r-md);background:var(--surface-3);padding:14px}
.cfg-update-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}
.cfg-update-title{font-family:var(--font-serif);font-size:14px;font-weight:700;color:var(--ink)}
.cfg-update-reason{font-size:11.5px;color:var(--text-1);line-height:1.6;margin-bottom:12px}
.cfg-update-diff{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cfg-update-col-label{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}
.cfg-update-col-body{font-size:11.5px;line-height:1.6;color:var(--text-1);background:var(--paper-2);border:1px solid var(--rule-2);border-radius:var(--r-sm);padding:8px 10px;min-height:44px;font-family:var(--font-serif);white-space:pre-wrap}
.cfg-update-col-body-new{background:var(--positive-soft);border-color:rgba(31,111,63,.3);color:#0D5C30}
.cfg-copy-btn.btn-copied{background:var(--positive);border-color:var(--positive);color:#fff}

/* Pass-2 emerging cards */
.cfg-emerging-list{display:grid;gap:12px}
.cfg-emerging-card{border:1px solid var(--rule-2);border-radius:var(--r-md);background:var(--surface-3);padding:14px}
.cfg-emerging-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.cfg-emerging-title{font-family:var(--font-serif);font-size:14px;font-weight:700;color:var(--ink)}
.cfg-emerging-meta{font-size:10.5px;color:var(--text-3);margin-top:4px}
.cfg-emerging-reason{font-size:11.5px;color:var(--text-1);line-height:1.6;margin:10px 0 6px}
.cfg-emerging-row{margin-top:6px}
.cfg-emerging-row>summary{font-size:11.5px;font-weight:700;color:var(--accent);cursor:pointer;list-style:none;display:inline-flex}
.cfg-emerging-row>summary::-webkit-details-marker{display:none}

/* Enable toggle */
.cfg-enable-toggle{display:inline-flex;align-items:center;gap:8px;font-size:11.5px;font-weight:700;color:var(--ink);cursor:pointer;user-select:none;white-space:nowrap}
.cfg-enable-toggle input{appearance:none;-webkit-appearance:none;width:30px;height:16px;background:var(--rule);border-radius:9px;position:relative;cursor:pointer;transition:background .15s;flex-shrink:0;margin:0}
.cfg-enable-toggle input::after{content:"";position:absolute;top:1px;left:1px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.cfg-enable-toggle input:checked{background:var(--positive)}
.cfg-enable-toggle input:checked::after{transform:translateX(14px)}
.cfg-enable-toggle input:disabled{cursor:default}

/* Category highlight — sits inside .bkt-name-row, right after the name input. */
.bkt-focus{
  background:none;
  border:1px solid transparent;
  color:var(--text-3);
  cursor:pointer;
  padding:4px 6px;border-radius:var(--r-sm);
  line-height:0;flex-shrink:0;
  display:inline-flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s,border-color .15s;
}
.bkt-focus:hover{color:var(--accent);background:var(--accent-soft)}
.bkt-focus.active{color:#5A2A0E;background:var(--accent-soft);border-color:var(--accent)}
.bkt-focus svg{display:block;pointer-events:none}
#tp-highlight-pill{
  display:none;position:absolute;top:10px;right:14px;z-index:10;
  align-items:center;gap:4px;
  padding:4px 4px 4px 11px;
  background:#DBEAFE;
  border:1px solid #93C5FD;
  border-radius:999px;
  font-size:11px;color:#1E3A8A;font-weight:600;
  letter-spacing:.02em;
  box-shadow:0 2px 8px rgba(37,99,235,.18);
}
#tp-highlight-pill.active{display:inline-flex}
#tp-highlight-pill .tp-pill-clear{
  background:none;border:none;color:#1E3A8A;cursor:pointer;
  font-size:13px;line-height:1;padding:0;width:16px;height:16px;
  display:inline-flex;align-items:center;justify-content:center;
  border-radius:999px;
}
#tp-highlight-pill .tp-pill-clear:hover{background:rgba(30,58,138,.12);color:#1E3A8A}
.tp-highlighted{
  background:#DBEAFE!important;
  border-left:3px solid #2563EB!important;
  padding-left:9px!important;
  margin-left:-12px!important;
}
/* Within a highlighted category, only sentences that are actually part of a
   report finding get the blue outline. This excludes QA question context,
   which can be status=selected but is never itself a finding card. */
.s-tok.tp-highlighted.tp-report-included{
  outline:2px solid #2563EB;
  outline-offset:1px;
  border-radius:3px;
}
/* Single-finding selection on transcript sentences — outline (not border)
   so the inline text flow isn't pushed around. Mirrors the blue border on
   the corresponding q-card in the report preview, giving the user one
   visual "this is your selected finding" signal across both panes. */
.s-tok.tp-sent-selected{
  outline:2px solid #2563EB;
  outline-offset:1px;
  border-radius:3px;
}

/* ════════════════════════════════════════════════════════════════
   QUOTE CARDS
   ════════════════════════════════════════════════════════════════ */
.q-card{
  background:transparent;
  border:none;
  border-radius:0;
  margin-bottom:14px;
  overflow:visible;
  position:relative;
  padding-left:18px;
}
.q-card::before{
  content:"";
  position:absolute;
  left:0;top:8px;bottom:8px;
  width:2px;
  background:var(--rule);
  border-radius:2px;
}
.q-card:hover::before{background:var(--accent-line)}
.q-card.sortable-ghost{opacity:.4;background:var(--surface-1)}
.q-card.sortable-chosen{box-shadow:0 6px 20px rgba(15,27,45,.14);background:var(--surface-3)}
.q-card-header{
  padding:2px 0 6px;
  display:flex;align-items:center;gap:8px;
  background:transparent;
  border-bottom:none;
}
.drag-handle{color:var(--rule);cursor:grab;font-size:14px;flex-shrink:0;user-select:none;transition:color .15s}
.q-card:hover .drag-handle{color:var(--text-3)}
.drag-handle:active{cursor:grabbing}
.q-attrib{text-align:right;font-size:10.5px;color:var(--text-3);font-style:italic;padding:4px 0 0;font-family:var(--font-serif)}
.attrib-off .q-attrib{display:none}
.q-hdr-spacer{flex:1}
.q-del{
  background:none;border:none;
  color:var(--rule);
  cursor:pointer;font-size:16px;
  padding:0 4px;line-height:1;flex-shrink:0;
  transition:color .15s;
}
.q-card:hover .q-del{color:var(--text-3)}
.q-del:hover{color:var(--danger)!important}

/* Edit / Revert buttons (mirrors .q-del look) */
.q-edit,.q-revert{
  background:none;border:none;
  color:var(--rule);
  cursor:pointer;
  padding:0 4px;line-height:1;flex-shrink:0;
  display:inline-flex;align-items:center;justify-content:center;
  transition:color .15s;
}
.q-card:hover .q-edit,
.q-card:hover .q-revert{color:var(--text-3)}
.q-edit:hover{color:var(--accent)!important}
.q-revert:hover{color:var(--accent)!important}

/* "edited" pill — signals that the finding text is user-customised */
.q-edited-badge{
  font-size:9.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--accent);
  background:var(--accent-soft);
  padding:2px 6px;border-radius:3px;
  white-space:nowrap;
}

/* Inline edit UI */
.q-text.q-text-editing{max-height:none;overflow:visible}
.q-edit-area{
  width:100%;box-sizing:border-box;
  font-family:var(--font-serif);
  font-size:14px;line-height:1.7;color:var(--text-1);
  padding:8px 10px;
  border:1px solid var(--rule);
  border-radius:4px;
  background:var(--paper-2);
  resize:vertical;min-height:80px;
  letter-spacing:.003em;
}
.q-edit-area:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
.q-edit-actions{
  display:flex;justify-content:flex-end;gap:6px;
  padding:6px 0 0;
}
.q-edit-cancel,.q-edit-save{
  font-size:11.5px;font-weight:500;
  padding:4px 12px;border-radius:3px;cursor:pointer;
  border:1px solid var(--rule);
  background:var(--paper-2);color:var(--text-2);
  transition:background .15s,color .15s,border-color .15s;
}
.q-edit-cancel:hover{background:var(--surface-1)}
.q-edit-save{background:var(--accent);color:#fff;border-color:var(--accent)}
.q-edit-save:hover{background:var(--accent-hover);border-color:var(--accent-hover)}

/* Summarize toggle */
.fmt-toggle{display:inline-flex;align-items:center;gap:7px;font-size:10.5px;color:var(--text-3);cursor:pointer;user-select:none;white-space:nowrap;font-weight:500}
.fmt-toggle input{appearance:none;-webkit-appearance:none;width:24px;height:13px;background:var(--rule);border-radius:7px;position:relative;cursor:pointer;transition:background .15s;flex-shrink:0}
.fmt-toggle input::after{content:"";position:absolute;top:1px;left:1px;width:11px;height:11px;background:#fff;border-radius:50%;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.fmt-toggle input:checked{background:var(--accent)}
.fmt-toggle input:checked::after{transform:translateX(11px)}

/* Quote body text */
.q-text{
  padding:0;
  font-family:var(--font-serif);
  font-size:14px;line-height:1.7;
  color:var(--text-1);
  max-height:240px;overflow-y:auto;
  letter-spacing:.003em;
}
.q-text p{margin-bottom:8px}
.q-text p:last-child{margin-bottom:0}
.q-text .s-tok{background:none!important;border-bottom:none!important;color:inherit!important;padding:0!important;cursor:default}
.q-text .s-tok:hover{opacity:1}
.q-expand-btn{
  font-size:11px;color:var(--accent);cursor:pointer;
  padding:6px 0;display:block;text-align:left;
  background:none;border:none;width:auto;
  font-weight:600;
  margin-top:4px;
  border-top:none;
  letter-spacing:.02em;
}
.q-expand-btn:hover{color:var(--accent-hover)}

/* QA conversation context */
.qa-card-q{
  padding:0 0 8px;margin-bottom:8px;
  background:transparent;
  border-bottom:1px dotted var(--rule-2);
  font-size:11.5px;color:var(--text-3);
}
.qa-card-q-text{
  font-family:var(--font-serif);
  font-size:13px;color:var(--text-2);
  margin-top:4px;line-height:1.6;
  font-style:italic;
}

/* ════════════════════════════════════════════════════════════════
   BUTTONS
   ════════════════════════════════════════════════════════════════ */
.btn{
  font-family:var(--font-sans);
  font-size:12px;padding:7px 14px;
  border-radius:var(--r-sm);
  border:1px solid;
  cursor:pointer;font-weight:600;
  transition:background .15s,color .15s,border-color .15s,opacity .15s;
  white-space:nowrap;
  letter-spacing:.005em;
}
.btn:hover{opacity:1}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
.btn-secondary{background:var(--paper-2);color:var(--ink);border-color:var(--rule)}
.btn-secondary:hover{background:var(--surface-1);border-color:var(--rule)}
.btn-sm{font-size:11px;padding:4px 10px}
.btn-ghost{background:transparent;color:var(--text-on-ink-2);border-color:rgba(251,248,239,.2)}
.btn-ghost:hover{background:rgba(251,248,239,.1);color:#fff}

/* Add-to-report menu */
.atr-menu{
  position:fixed;background:var(--paper-2);
  border:1px solid var(--rule);
  border-radius:var(--r-md);
  box-shadow:var(--shadow-lg);
  z-index:9999;padding:6px;min-width:220px;
}
.atr-item{padding:9px 14px;cursor:pointer;font-size:12.5px;display:flex;align-items:center;gap:10px;border-radius:var(--r-sm);transition:background .1s}
.atr-item:hover{background:var(--surface-1)}
.atr-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* Header dropdown menu (Settings / Save) */
.hdr-menu{
  position:fixed;background:var(--paper-2);
  border:1px solid var(--rule);
  border-radius:var(--r-md);
  box-shadow:var(--shadow-lg);
  z-index:9999;padding:6px;min-width:200px;
  color:var(--ink);
}
.hdr-menu-item{
  padding:9px 14px;cursor:pointer;font-size:12.5px;
  display:flex;align-items:center;gap:10px;
  border-radius:var(--r-sm);transition:background .1s;
  color:var(--ink);
}
.hdr-menu-item:hover{background:var(--surface-1)}
.hdr-menu-toggle{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:9px 14px;font-size:12.5px;font-weight:500;color:var(--ink);
  cursor:pointer;user-select:none;
  border-radius:var(--r-sm);transition:background .1s;
}
.hdr-menu-toggle:hover{background:var(--surface-1)}
.hdr-menu-toggle input{
  appearance:none;-webkit-appearance:none;
  width:30px;height:16px;background:var(--rule);
  border-radius:9px;position:relative;cursor:pointer;
  transition:background .15s;flex-shrink:0;margin:0;
}
.hdr-menu-toggle input::after{
  content:"";position:absolute;top:1px;left:1px;
  width:14px;height:14px;background:#fff;
  border-radius:50%;transition:transform .15s;
  box-shadow:0 1px 2px rgba(0,0,0,.2);
}
.hdr-menu-toggle input:checked{background:var(--positive)}
.hdr-menu-toggle input:checked::after{transform:translateX(14px)}

.empty-bucket{padding:24px 16px;text-align:center;color:var(--text-3);font-size:12.5px;font-style:italic}
.in-report-tag{font-size:11px;color:var(--positive);font-weight:600}
.t-block-actions{margin-top:10px;display:flex;gap:8px;align-items:center}

/* ════════════════════════════════════════════════════════════════
   PRINT / PDF
   ════════════════════════════════════════════════════════════════ */
@media print{
  :root{--paper:#fff;--paper-2:#fff}
  @page{margin:20mm 16mm}
  body{background:#fff;color:#14213A;font-family:var(--font-serif)}
  #app-banner{display:none!important}
  #tab-bar{display:none!important}
  #transcript-wrap{display:none!important}
  #tp-resize{display:none!important}
  #report-header{display:none!important}
  #s-popover{display:none!important}
  .modal-overlay{display:none!important}
  .emg-bar{display:none!important}

  /* Old external banner is suppressed — the redesigned `.rpt-cover` now
     carries the banner image as the first printed page. */
  #banner-wrap{display:none!important}

  /* Banner + TOC share page 1: the cover image sits as a compact masthead
     above the TOC, then the TOC itself forces a page break so the body
     copy starts on page 2. */
  .rpt-cover{
    display:block!important;
    margin:0 0 24px!important;
    padding:0 0 18px!important;
    border:none!important;
    border-bottom:1px solid #D9D0BC!important;
    text-align:center;
    page-break-inside:avoid;
    page-break-after:avoid;break-after:avoid;
  }
  .rpt-cover img{
    width:100%!important;
    height:auto!important;
    max-width:none!important;
    max-height:168px;
    display:block;
    margin:0 auto;
  }
  .rpt-cover-copy{margin:16px auto 0!important;max-width:none!important;padding:0 4px!important}
  .rpt-cover-meta{font-size:11px!important;letter-spacing:.16em!important}
  .rpt-cover-title{font-size:28px!important;margin-top:8px!important}

  /* TOC: ends on its own page; reveal leaders + page numbers. */
  .rpt-toc{
    page-break-after:always;break-after:page;
    page-break-before:avoid;break-before:avoid;
    border-bottom:none;padding:0;margin:0;
  }
  .rpt-toc-title{font-size:22px;margin-bottom:20px;padding-bottom:10px}
  .rpt-toc-leader{display:inline-block!important;flex:1!important;opacity:1!important;border-bottom-color:#B8AD94!important}
  .rpt-toc-page{display:none!important}
  .rpt-toc-l1>a, .rpt-toc-l2>a{color:#14213A!important;text-decoration:none!important}
  /* `target-counter(attr(href), page)` resolves the fragment link to the
     page counter of the target — Chromium/WebKit populate this at print time.
     Kept as a single ::after on the anchor so the leader still sits to its
     left inside the flex row. */
  .rpt-toc-l1>a::after, .rpt-toc-l2>a::after{
    content: target-counter(attr(href), page);
    color:#7A7364;
    font-variant-numeric:tabular-nums;
    font-size:11.5px;
    min-width:22px;
    text-align:right;
    margin-left:6px;
    flex-shrink:0;
  }
  /* Start each L1 section on its own page so readers land on a clean header. */
  .rpt-l1{page-break-before:always;break-before:page}
  .rpt-l1:first-of-type{page-break-before:auto;break-before:auto}

  #content-area{display:block!important;background:#fff!important}
  #report-panel{overflow:visible!important;display:block;background:#fff!important}
  #report-body{overflow:visible!important;height:auto;padding:0!important;background:#fff!important}
  #report-page{box-shadow:none!important;padding:0!important;max-width:none!important;background:#fff!important}
  #report-page::before{display:none!important}
  body{overflow:visible!important;height:auto}
  #app{height:auto;overflow:visible}

  .rpt-l1{font-size:20px;padding:14px 0 8px;margin-bottom:12px;page-break-after:avoid;border-bottom-color:#B8AD94}
  .bkt-section{margin-bottom:14px;page-break-inside:avoid}
  .bkt-header{padding:4px 0;cursor:default;border-bottom:none;margin-bottom:6px}
  .bkt-bar{display:none!important}
  .bkt-chevron{display:none!important}
  .bkt-focus{display:none!important}
  .bkt-name-input{font-size:14.5px;cursor:default;background:transparent!important}
  .bkt-headline{font-size:11.5px;color:#5A5A5A}
  .bkt-quotes{padding:2px 0 2px 10px;display:block!important}

  .q-card{background:none!important;border:none!important;border-radius:0!important;margin-bottom:6px;page-break-inside:avoid;padding-left:14px;position:relative}
  .q-card.q-card-selected,
  .q-card.q-card-cat-highlighted{background:none!important;box-shadow:none!important}
  .q-card::before{
    content:"\2022";
    position:absolute;
    left:0;top:2px;
    font-size:12px;
    line-height:1.5;
    color:#333;
    background:none!important;
    width:auto!important;
    display:block!important;
  }
  .q-card.q-card-selected::before,
  .q-card.q-card-cat-highlighted::before{display:block!important}
  .q-card-header{display:none!important}
  .qa-card-q{display:none!important}
  .q-attrib{font-size:9.5px;padding:0;text-align:right;color:#5A5A5A}
  .attrib-off .q-attrib{display:none!important}
  .q-text{padding:2px 0;max-height:none!important;overflow:visible!important;font-size:11.5px;line-height:1.6;color:#14213A}
  .q-text .s-tok{background:none!important;border-bottom:none!important;color:#14213A!important;padding:0!important;cursor:default}
  .q-expand-btn{display:none!important}
  .empty-bucket{display:none!important}
}

::-webkit-scrollbar{width:8px;height:8px}

::-webkit-scrollbar-thumb{background:var(--rule);border-radius:4px;border:2px solid var(--paper)}

/* __BEGIN_STATE__ */
__STATE_JSON__
