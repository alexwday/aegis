<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Summary — __PERIOD__</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#F0F2F5;color:#1C1E21;font-size:14px;line-height:1.5;height:100vh;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* App banner */
#app-banner{flex-shrink:0;background:#1A2332;color:#fff;font-size:14px;font-weight:700;letter-spacing:.03em;padding:10px 20px;text-transform:uppercase}

/* PDF banner — only shown in print/PDF */
#banner-wrap{display:none}
#banner-wrap img{max-height:56px;max-width:400px;object-fit:contain}

/* Tab bar */
#tab-bar{flex-shrink:0;background:#fff;border-bottom:2px solid #E4E6EA;display:flex;align-items:stretch;padding:0 16px;gap:2px;overflow-x:auto;scrollbar-width:none}
#tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 18px;font-size:13px;font-weight:500;border:none;background:none;cursor:pointer;color:#65676B;border-bottom:3px solid transparent;white-space:nowrap}
.tab-btn.active{color:#1A2332;border-bottom-color:#1A2332;font-weight:600}
.tab-btn:hover:not(.active){color:#1A2332}

/* Content area */
#content-area{flex:1;display:flex;overflow:hidden;position:relative}

/* Transcript wrapper: rail + panel side by side */
#transcript-wrap{display:flex;flex-shrink:0;overflow:hidden;transition:width .2s ease}
#transcript-wrap.tp-collapsed{width:32px!important}

/* Transcript panel — flex row: content + rail */
#transcript-panel{flex:1;display:flex;flex-direction:row;background:#fff;overflow:hidden;min-width:0}

/* Transcript content column */
#tp-content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;transition:opacity .15s,flex .2s}
.tp-collapsed #tp-content{opacity:0;pointer-events:none;overflow:hidden;flex:0}

/* Vertical rail — always visible, on the inside (right edge of transcript) */
#tp-rail{width:32px;flex-shrink:0;background:#2C3E50;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;z-index:2}
#tp-rail:hover{background:#34495E}
#tp-rail-label{writing-mode:vertical-lr;font-size:10px;font-weight:600;color:rgba(255,255,255,.8);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}

/* Resize handle — hidden when collapsed */
#tp-resize{width:5px;flex-shrink:0;cursor:col-resize;background:#E4E6EA;transition:background .15s}
#tp-resize:hover,#tp-resize.active{background:#0A66C2}
#tp-resize.tp-hidden{display:none}

#transcript-body{flex:1;overflow-y:auto;padding:4px 0}

/* Transcript section header */
.t-section-header{padding:8px 12px;background:linear-gradient(135deg,#1A2332 0%,#2C3E50 100%);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#fff;border-top:none;border-bottom:2px solid #E4E6EA;margin-bottom:4px}

/* MD speaker block — condensed */
.t-block{margin:4px 6px;padding:6px 8px;border-left:3px solid #D0D4DA;border-radius:0 4px 4px 0;background:#FAFBFC}
.t-block-header{display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin-bottom:4px}
.t-speaker-name{font-weight:600;font-size:10px;color:#1A2332}
.t-speaker-title{font-size:9px;color:#65676B}
.t-block-text{font-size:10.5px;line-height:1.45;color:#444}
.t-para-break{display:block;height:6px}

/* QA group — condensed */
.t-qa-group{margin:4px 6px;border-left:3px solid #B8CCE4;border-radius:0 4px 4px 0;overflow:hidden;background:#F0F5FA}
.t-qa-q{padding:5px 8px;background:#E8F0F8}
.t-qa-a{padding:5px 8px;border-top:1px solid #D0DCE8}
.qa-lbl{display:inline-block;font-size:8px;font-weight:800;padding:1px 4px;border-radius:2px;margin-right:4px;vertical-align:middle}
.qa-lbl.q{background:#0A66C2;color:#fff}
.qa-lbl.a{background:#0F7B4E;color:#fff}
.qa-person{font-weight:600;font-size:10px;color:#1A2332}
.qa-affil{font-size:9px;color:#65676B}
.t-qa-text{font-size:10.5px;line-height:1.45;color:#444;margin-top:2px}
.t-qa-footer{padding:3px 7px;background:#fff;border-top:1px solid #E4E6EA;display:flex;align-items:center;gap:6px}
.bucket-pill{font-size:9px;padding:1px 6px;border-radius:8px;color:#fff;font-weight:600;white-space:nowrap}
.importance-chip{font-size:9px;color:#8A8D91;background:#F0F2F5;padding:1px 5px;border-radius:8px}

/* Sentence tokens */
.s-tok{border-radius:2px;padding:0px 1px;cursor:pointer;border-bottom:1.5px solid transparent;transition:opacity .1s;font-size:inherit;line-height:inherit}
.s-tok:hover{opacity:.75}
.s-tok.qa-sent{cursor:default}

/* Transcript: included vs excluded sentence styling */
.s-tok.s-incl{background:rgba(46,125,50,.08);border-bottom-color:rgba(46,125,50,.35);color:#1C1E21}
.s-tok.s-cand{background:rgba(245,127,23,.10);border-bottom-color:rgba(245,127,23,.45);color:#1C1E21}
.s-tok.s-excl{background:transparent;border-bottom-color:transparent;color:#B0B3B8}
.s-tok.s-excl:hover{opacity:.55}

/* Group bullet separator */
.t-gbullet{display:inline;color:#A0A4A8;font-size:11px;margin:0 1px;user-select:none;vertical-align:middle}

/* QA numbered container */
.t-qa-num-label{font-size:9px;font-weight:700;color:#65676B;padding:5px 7px 2px;text-transform:uppercase;letter-spacing:.03em}

/* Cross-highlight: flash sentence in report panel */
.s-tok.s-highlight{outline:2px solid #FF9800;outline-offset:1px;background:rgba(255,152,0,.15)!important;border-radius:3px;animation:s-flash .6s ease-out}
@keyframes s-flash{0%{outline-color:#FF9800;background:rgba(255,152,0,.25)}100%{outline-color:#FF9800;background:rgba(255,152,0,.15)}}
.q-card.q-card-highlight{box-shadow:0 0 0 2px #FF9800;transition:box-shadow .3s}

/* Sentence popover */
#s-popover{position:fixed;z-index:9999;background:#fff;border:1px solid #E4E6EA;border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.14);width:420px;max-width:min(420px,calc(100vw - 16px));display:none;overflow:hidden}
#s-pop-text{padding:12px 14px;font-size:12px;color:#3C3F44;border-bottom:1px solid #F0F2F5;line-height:1.6;font-style:italic;max-height:180px;overflow:auto}
#s-pop-title{padding:6px 14px 4px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#8A8D91;background:#F8F9FB;border-bottom:1px solid #F0F2F5}
#s-pop-scores{max-height:420px;overflow-y:auto}
.s-score-section{padding:10px 0;border-bottom:1px solid #F0F2F5}
.s-score-section:last-child{border-bottom:none}
.s-score-section-title{padding:0 14px 8px;font-size:10px;font-weight:700;color:#65676B;text-transform:uppercase;letter-spacing:.04em}
.s-score-row{display:flex;align-items:flex-start;gap:8px;padding:8px 14px;cursor:pointer;transition:background .1s}
.s-score-row:hover{background:#F0F2F5}
.s-score-row.current{background:#EEF3FA}
.s-score-row.readonly{cursor:default}
.s-score-row.readonly:hover{background:transparent}
.s-score-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.s-score-main{flex:1;min-width:0}
.s-score-name{font-size:12px;color:#1A2332;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-score-val{font-size:11px;font-weight:700;color:#65676B;min-width:28px;text-align:right;padding-top:1px}
.s-score-check{font-size:12px;color:#1565C0;margin-left:2px;min-width:12px}
.s-expand-btn{margin:0 14px;padding:7px 10px;border:1px solid #D7DBE0;border-radius:6px;background:#fff;color:#1A2332;font-size:11px;font-weight:600;cursor:pointer;width:calc(100% - 28px);text-align:left}
.s-expand-btn:hover{background:#F8F9FB}
#s-pop-all{display:none;padding-top:8px}
.s-pop-form{padding:8px 14px 2px;display:grid;gap:8px}
.s-pop-form input,.s-pop-form textarea,.s-pop-form select{width:100%;border:1px solid #CDD0D5;border-radius:6px;padding:7px 9px;font-size:12px;font-family:inherit;background:#fff;color:#1A2332}
.s-pop-form textarea{min-height:64px;resize:vertical}
.s-pop-form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.s-pop-form-actions{display:flex;justify-content:flex-end;padding:2px 14px 12px}
#s-pop-custom{display:none}
#s-pop-footer{padding:8px 14px;border-top:1px solid #F0F2F5;background:#F8F9FB}
.s-pop-note{font-size:10px;color:#8A8D91;font-style:italic}

/* Report panel */
#report-panel{flex:1;display:flex;flex-direction:column;background:#4A4A4A;overflow:hidden;min-width:0}
#report-header{flex-shrink:0;background:#3A3A3A;border-bottom:1px solid #333;padding:10px 18px;display:flex;align-items:center;justify-content:space-between}
.report-meta-title{font-size:14px;font-weight:700;color:rgba(255,255,255,.85)}
.report-actions{display:flex;gap:8px;align-items:center}
.report-actions .btn{color:rgba(255,255,255,.75);border-color:rgba(255,255,255,.25);background:transparent}
.report-actions .btn:hover{background:rgba(255,255,255,.1);color:#fff}
/* Header proposal buttons with notification badges. Greyed out when the
   proposal count is zero; a red circular badge in the upper-right shows the
   count otherwise. The badge floats above the border so overflow:visible is
   required on the button. */
.btn-badge{position:relative;overflow:visible}
.btn-badge.btn-disabled{opacity:.38;cursor:not-allowed;pointer-events:none}
.badge-count{position:absolute;top:-7px;right:-7px;background:#E02020;color:#fff;font-size:10px;font-weight:800;min-width:18px;height:18px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;box-shadow:0 1px 3px rgba(0,0,0,.35);line-height:1;letter-spacing:0}
.badge-count.hidden{display:none}

/* Modal overlay used by both "Config Change Proposals" and "Emerging Topics"
   header buttons. A single overlay in the DOM — the body content is swapped
   between modes when each button is clicked. */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9998;align-items:flex-start;justify-content:center;padding:48px 20px 20px}
.modal-overlay.active{display:flex}
.modal-box{background:#fff;border-radius:10px;box-shadow:0 20px 48px rgba(0,0,0,.4);width:min(760px,100%);max-height:calc(100vh - 80px);display:flex;flex-direction:column;overflow:hidden}
.modal-header{flex-shrink:0;padding:16px 20px;border-bottom:1px solid #E4E6EA;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;background:linear-gradient(180deg,#FBFCFE 0%,#F5F7FA 100%)}
.modal-title{font-size:16px;font-weight:800;color:#1A2332}
.modal-subtitle{font-size:11px;color:#65676B;margin-top:3px;line-height:1.45;max-width:620px}
.modal-close{background:none;border:none;font-size:22px;color:#65676B;cursor:pointer;line-height:1;padding:2px 8px;border-radius:4px;flex-shrink:0}
.modal-close:hover{background:#F0F2F5;color:#1A2332}
.modal-body{flex:1;overflow-y:auto;padding:18px 20px;background:#fff}
.modal-empty{font-size:12px;color:#8A8D91;font-style:italic;text-align:center;padding:20px}

/* Small toggle bar at the top of the report draft preview — one row per
   emerging topic with an on/off switch. Hidden in print so the exported
   PDF stays clean. By default each topic is enabled (its findings are
   already reassigned to the new bucket). */
.emg-bar{background:#F4F6F9;border:1px solid #E4E6EA;border-radius:6px;padding:10px 12px;margin:0 0 16px;font-size:11px}
.emg-bar-title{font-size:10px;font-weight:700;color:#65676B;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.emg-bar-title-count{color:#8A8D91;font-weight:600;text-transform:none;letter-spacing:0}
.emg-bar-row{display:flex;align-items:center;gap:10px;padding:5px 0}
.emg-bar-row+.emg-bar-row{border-top:1px solid #E9EBEF}
.emg-bar-main{flex:1;min-width:0;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.emg-bar-label{color:#1A2332;font-weight:700;font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.emg-bar-meta{color:#65676B;font-size:10px;font-weight:500;white-space:nowrap}
#report-body{flex:1;overflow-y:auto;padding:24px 32px}
#report-page{background:#fff;min-height:100%;border-radius:2px;box-shadow:0 2px 12px rgba(0,0,0,.3);padding:32px 36px;max-width:800px;margin:0 auto}

/* Bucket section */
/* Report: L1 section heading */
.rpt-l1{font-size:16px;font-weight:800;color:#1A2332;padding:10px 0 4px;margin:0;border-bottom:2px solid #1A2332;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.rpt-l1:not(:first-child){margin-top:14px}

/* Report: L2 bucket heading + inline generated subtitle */
.bkt-section{margin-bottom:6px;overflow:hidden}
.bkt-header{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;user-select:none}
.bkt-bar{width:3px;min-height:24px;border-radius:2px;flex-shrink:0}
.bkt-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.bkt-name-input{font-size:13px;font-weight:700;color:#1A2332;background:transparent;border:none;outline:none;padding:0;cursor:text;width:100%;display:block}
.bkt-name-input:focus{background:#F8F9FB;border-radius:3px;padding:1px 4px;margin:-1px -4px;width:calc(100% + 8px)}
.bkt-headline{font-size:11px;color:#65676B;font-style:italic;line-height:1.4;display:block;word-wrap:break-word}
.bkt-chevron{color:#C4C9D0;font-size:12px;transition:transform .15s;flex-shrink:0}
.bkt-chevron.open{transform:rotate(0deg)}
.bkt-chevron.closed{transform:rotate(-90deg)}
.bkt-quotes{padding:2px 0 2px 6px}

/* Emerging topic review */
.emg-review-panel{border:1px solid #D7DBE0;border-radius:8px;background:#fff;overflow:hidden}
.emg-review-header{padding:12px 14px;border-bottom:1px solid #E4E6EA;background:linear-gradient(180deg,#FBFCFE 0%,#F5F7FA 100%);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.emg-review-title{font-size:15px;font-weight:800;color:#1A2332}
.emg-review-subtitle{font-size:11px;color:#65676B;margin-top:2px;max-width:620px;line-height:1.45}
.emg-review-pill{font-size:10px;font-weight:700;color:#3D5A40;background:#E8F5E9;border-radius:999px;padding:4px 8px;white-space:nowrap}
.emg-review-grid{display:grid;gap:10px;padding:14px}
.emg-review-card{border:1px solid #E4E6EA;border-radius:8px;background:#FAFBFC;padding:12px}
.emg-review-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.emg-review-card-title{font-size:13px;font-weight:800;color:#1A2332}
.emg-review-card-subtitle{font-size:11px;color:#65676B;margin-top:4px}
.emg-review-card-summary{font-size:12px;color:#3C3F44;line-height:1.55;margin-top:8px}
.emg-review-card-actions{display:flex;justify-content:flex-end;margin-top:12px}

/* Config review */
.cfg-review-drawer{margin-top:12px;border:1px solid #D7DBE0;border-radius:8px;background:#fff;overflow:hidden}
.cfg-review-drawer summary{list-style:none;cursor:pointer;padding:12px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;background:linear-gradient(180deg,#FBFCFE 0%,#F5F7FA 100%)}
.cfg-review-drawer summary::-webkit-details-marker{display:none}
.cfg-review-title{font-size:15px;font-weight:800;color:#1A2332}
.cfg-review-subtitle{font-size:11px;color:#65676B;margin-top:2px;max-width:620px;line-height:1.45}
.cfg-review-pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.cfg-review-pill{font-size:10px;font-weight:700;color:#4B5563;background:#E8EDF4;border-radius:999px;padding:4px 8px;white-space:nowrap}
.cfg-review-body{padding:14px}
.cfg-review-section+.cfg-review-section{margin-top:16px}
.cfg-review-section h3{font-size:12px;font-weight:800;color:#1A2332;margin:0 0 8px}
.cfg-review-table{width:100%;border-collapse:collapse;font-size:11px}
.cfg-review-table th,.cfg-review-table td{border:1px solid #E4E6EA;padding:8px 9px;text-align:left;vertical-align:top}
.cfg-review-table th{background:#F8F9FB;color:#65676B;font-weight:700}
.cfg-review-table td{color:#3C3F44;line-height:1.5}
.cfg-review-empty{font-size:12px;color:#8A8D91;font-style:italic;padding:4px 0}
.cfg-review-detail{margin:0}
.cfg-review-detail summary{list-style:none;cursor:pointer;font-size:11px;font-weight:700;color:#0A66C2;padding:0;background:none;display:inline-flex}
.cfg-review-detail summary::-webkit-details-marker{display:none}
.cfg-review-detail-body{margin-top:8px}
.cfg-review-note{font-size:11px;color:#65676B;margin-top:8px}
.cfg-review-evidence{margin-top:10px;display:grid;gap:6px}
.cfg-review-evidence-item{font-size:11px;line-height:1.5;color:#444;background:#F8F9FB;border-radius:6px;padding:8px 10px;border-left:3px solid #D4DAE3}
.cfg-config-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:11px}
.cfg-config-table th,.cfg-config-table td{border:1px solid #E4E6EA;padding:7px 8px;text-align:left;vertical-align:top}
.cfg-config-table th{width:140px;background:#F8F9FB;color:#65676B;font-weight:700}
.cfg-review-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
.cfg-review-help{font-size:11px;color:#65676B;line-height:1.55;margin:2px 0 10px}
.cfg-review-help code{background:#F0F2F5;padding:1px 5px;border-radius:3px;font-size:10px}
/* Pass-1 "Category description updates" cards. Side-by-side current vs. proposed
   text so the user can eyeball the change before copying the new description. */
.cfg-update-list{display:grid;gap:10px}
.cfg-update-card{border:1px solid #E4E6EA;border-radius:8px;background:#FAFBFC;padding:12px}
.cfg-update-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px}
.cfg-update-title{font-size:13px;font-weight:800;color:#1A2332}
.cfg-update-reason{font-size:11px;color:#3C3F44;line-height:1.55;margin-bottom:10px}
.cfg-update-diff{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cfg-update-col-label{font-size:10px;font-weight:700;color:#8A8D91;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.cfg-update-col-body{font-size:11px;line-height:1.55;color:#444;background:#fff;border:1px solid #E4E6EA;border-radius:6px;padding:7px 9px;min-height:40px}
.cfg-update-col-body-new{background:#F0F9F2;border-color:#C8E6C9;color:#1B5E20}
.cfg-copy-btn.btn-copied{background:#2D9E5F;border-color:#2D9E5F;color:#fff}
/* Pass-2 "Emerging topics" cards with Enable toggle. */
.cfg-emerging-list{display:grid;gap:10px}
.cfg-emerging-card{border:1px solid #E4E6EA;border-radius:8px;background:#FAFBFC;padding:12px}
.cfg-emerging-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.cfg-emerging-title{font-size:13px;font-weight:800;color:#1A2332}
.cfg-emerging-meta{font-size:10px;color:#65676B;margin-top:3px}
.cfg-emerging-reason{font-size:11px;color:#3C3F44;line-height:1.55;margin:8px 0 6px}
.cfg-emerging-row{margin-top:4px}
.cfg-emerging-row>summary{font-size:11px;font-weight:700;color:#0A66C2;cursor:pointer;list-style:none;display:inline-flex}
.cfg-emerging-row>summary::-webkit-details-marker{display:none}
/* Toggle-switch styling for Enable/Enabled on emerging-topic cards. Mirrors
   `.fmt-toggle` so the visual vocabulary stays consistent across the app. */
.cfg-enable-toggle{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#1A2332;cursor:pointer;user-select:none;white-space:nowrap}
.cfg-enable-toggle input{appearance:none;-webkit-appearance:none;width:30px;height:16px;background:#CDD0D5;border-radius:9px;position:relative;cursor:pointer;transition:background .15s;flex-shrink:0;margin:0}
.cfg-enable-toggle input::after{content:"";position:absolute;top:1px;left:1px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.cfg-enable-toggle input:checked{background:#2D9E5F}
.cfg-enable-toggle input:checked::after{transform:translateX(14px)}
.cfg-enable-toggle input:disabled{cursor:default}
/* Category highlight feature. Clicking the 🔎 icon in a bucket header sets
   state.highlighted_bucket_id, opens the transcript drawer, and adds
   `.tp-highlighted` to every sentence row that belongs to that bucket
   regardless of status. A dismissible pill shows which category is active. */
.bkt-focus{background:none;border:1px solid transparent;color:#8A8D91;cursor:pointer;padding:3px 6px;border-radius:4px;margin-right:4px;line-height:0;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center}
.bkt-focus:hover{color:#B45309;background:#FEF3C7}
.bkt-focus.active{color:#5C3B00;background:#FCD34D;border-color:#F59E0B}
.bkt-focus svg{display:block;pointer-events:none}
#tp-highlight-pill{display:none;align-items:center;justify-content:space-between;gap:8px;padding:6px 10px;margin:6px 8px 4px;background:#EEF4FB;border:1px solid #C8DEF1;border-radius:6px;font-size:11px;color:#0A4A86;font-weight:600}
#tp-highlight-pill.active{display:flex}
#tp-highlight-pill .tp-pill-clear{background:none;border:none;color:#0A4A86;cursor:pointer;font-size:14px;line-height:1;padding:0 2px}
#tp-highlight-pill .tp-pill-clear:hover{color:#c00}
.tp-highlighted{background:#FFF6C2!important;border-left:3px solid #E8B40A!important;padding-left:6px!important;margin-left:-9px!important}

/* Quote card (sub-quote) */
.q-card{background:#fff;border:1px solid #E4E6EA;border-radius:6px;margin-bottom:4px;overflow:hidden}
.q-card.sortable-ghost{opacity:.4;background:#E8F4FD}
.q-card.sortable-chosen{box-shadow:0 4px 16px rgba(0,0,0,.14)}
.q-card-header{padding:4px 8px;display:flex;align-items:center;gap:5px;background:#F8F9FB;border-bottom:1px solid #F0F2F5}
.drag-handle{color:#C4C9D0;cursor:grab;font-size:13px;flex-shrink:0;user-select:none}
.drag-handle:active{cursor:grabbing}
.q-attrib{text-align:right;font-size:9px;color:#8A8D91;font-style:italic;padding:0 10px 6px}
.attrib-off .q-attrib{display:none}
.q-hdr-spacer{flex:1}
.q-del{background:none;border:none;color:#C4C9D0;cursor:pointer;font-size:15px;padding:0 2px;line-height:1;flex-shrink:0}
.q-del:hover{color:#E02020}
/* Summarize toggle (replaces the former Verbatim/Condensed dropdown) */
.fmt-toggle{display:inline-flex;align-items:center;gap:6px;font-size:10px;color:#65676B;cursor:pointer;user-select:none;white-space:nowrap}
.fmt-toggle input{appearance:none;-webkit-appearance:none;width:22px;height:12px;background:#CDD0D5;border-radius:7px;position:relative;cursor:pointer;transition:background .15s;flex-shrink:0}
.fmt-toggle input::after{content:"";position:absolute;top:1px;left:1px;width:10px;height:10px;background:#fff;border-radius:50%;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.fmt-toggle input:checked{background:#0A66C2}
.fmt-toggle input:checked::after{transform:translateX(10px)}
.q-text{padding:6px 10px;font-size:11px;line-height:1.65;color:#3C3F44;max-height:200px;overflow-y:auto}
.q-text p{margin-bottom:5px}
.q-text p:last-child{margin-bottom:0}
/* Report preview: no per-bucket highlighting inside quote cards. The transcript
   panel still uses .s-tok's bucket colors to cue classification, but the
   report panel is a clean bullet list that should read like the final copy. */
.q-text .s-tok{background:none!important;border-bottom:none!important;color:inherit!important;padding:0!important;cursor:default}
.q-text .s-tok:hover{opacity:1}
.q-expand-btn{font-size:11px;color:#0A66C2;cursor:pointer;padding:3px 12px;display:block;text-align:center;background:#F8F9FB;border:none;width:100%;border-top:1px solid #F0F2F5}
/* QA conversation card extras */
.qa-card-q{padding:8px 12px 4px;background:#FAFBFC;border-bottom:1px solid #F0F2F5;font-size:11px;color:#65676B}
.qa-card-q-text{font-size:12px;color:#444;margin-top:4px;line-height:1.6}

/* Buttons */
.btn{font-size:12px;padding:6px 14px;border-radius:5px;border:1px solid;cursor:pointer;font-weight:600;transition:opacity .1s;white-space:nowrap}
.btn:hover{opacity:.88}
.btn-primary{background:#1A2332;color:#fff;border-color:#1A2332}
.btn-secondary{background:#fff;color:#444;border-color:#CDD0D5}
.btn-secondary:hover{background:#F8F9FB}
.btn-sm{font-size:11px;padding:3px 9px}
.btn-ghost{background:transparent;color:rgba(255,255,255,.75);border-color:rgba(255,255,255,.3)}
.btn-ghost:hover{background:rgba(255,255,255,.1);opacity:1}

/* Add-to-report menu */
.atr-menu{position:fixed;background:#fff;border:1px solid #E4E6EA;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:9999;padding:4px 0;min-width:200px}
.atr-item{padding:8px 16px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px}
.atr-item:hover{background:#F0F2F5}
.atr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.empty-bucket{padding:20px 16px;text-align:center;color:#8A8D91;font-size:12px;font-style:italic}
.in-report-tag{font-size:11px;color:#2D9E5F;font-weight:600}
.t-block-actions{margin-top:8px;display:flex;gap:6px;align-items:center}

/* Print */
@media print{
  /* Hide app chrome */
  #app-banner{display:none!important}
  #tab-bar{display:none!important}
  #transcript-wrap{display:none!important}
  #tp-resize{display:none!important}
  #report-header{display:none!important}
  #s-popover{display:none!important}
  .modal-overlay{display:none!important}
  .emg-bar{display:none!important}

  /* PDF banner */
  #banner-wrap{display:block!important;text-align:center;padding:8px 0 4px;border:none;margin:0}
  #banner-wrap.banner-off{display:none!important}

  /* Layout */
  #content-area{display:block!important}
  #report-panel{overflow:visible!important;display:block;background:#fff!important}
  #report-body{overflow:visible!important;height:auto;padding:0!important}
  #report-page{box-shadow:none!important;padding:0!important;max-width:none!important}
  body{overflow:visible!important;height:auto}
  #app{height:auto;overflow:visible}

  /* L1 headings */
  .rpt-l1{font-size:18px;padding:16px 0 8px;margin-bottom:12px;page-break-after:avoid}

  /* L2 bucket: just name + headline, no bar/chevron/focus icon */
  .bkt-section{margin-bottom:12px;page-break-inside:avoid}
  .bkt-header{padding:4px 0;cursor:default}
  .bkt-bar{display:none!important}
  .bkt-chevron{display:none!important}
  .bkt-focus{display:none!important}
  .bkt-name-input{font-size:14px;cursor:default}
  .bkt-headline{font-size:11px}
  .bkt-quotes{padding:2px 0 2px 8px;display:block!important}

  /* Quote cards: clean bullet points */
  .q-card{background:none!important;border:none!important;border-radius:0!important;margin-bottom:4px;page-break-inside:avoid;padding-left:12px;position:relative}
  .q-card::before{content:"\2022";position:absolute;left:0;top:2px;font-size:11px;line-height:1.5;color:#333}
  .q-card-header{display:none!important}
  .qa-card-q{display:none!important}
  .q-attrib{font-size:9px;padding:0;text-align:right}
  .attrib-off .q-attrib{display:none!important}
  .q-text{padding:2px 0;max-height:none!important;overflow:visible!important;font-size:11px;line-height:1.5}
  .q-text .s-tok{background:none!important;border-bottom:none!important;color:#333!important;padding:0!important;cursor:default}
  .q-expand-btn{display:none!important}
  .empty-bucket{display:none!important}
}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CDD0D5;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#A8ADB5}
</style>

<body>
<div id="app">
  <div id="app-banner">Investor Relations PM Call Summary</div>
  <div id="banner-wrap">
    <img id="banner-img" src="" alt="Banner">
  </div>
  <div id="tab-bar"></div>
  <div id="content-area">
    <div id="transcript-wrap" class="tp-collapsed" style="width:40%">
      <div id="transcript-panel">
        <div id="tp-content">
          <div id="tp-highlight-pill">
            <span id="tp-highlight-pill-label">Highlighting: —</span>
            <button class="tp-pill-clear" onclick="clearCategoryHighlight()" title="Clear highlight">&times;</button>
          </div>
          <div id="transcript-body"></div>
        </div>
        <div id="tp-rail" onclick="toggleTranscript()"><span id="tp-rail-label">Earnings Call Transcript</span></div>
      </div>
    </div>
    <div id="tp-resize" class="tp-hidden"></div>
    <div id="report-panel">
      <div id="report-header">
        <div class="report-meta">
          <div class="report-meta-title">Report Draft</div>
        </div>
        <div class="report-actions">
          <button class="btn btn-secondary" id="attrib-toggle-btn" onclick="toggleAttrib()">Names: Off</button>
          <button class="btn btn-secondary btn-badge btn-disabled" id="config-changes-btn"
                  onclick="openConfigChangesModal()" title="Category description updates">
            Config Change Proposals
            <span class="badge-count hidden" id="config-changes-badge">0</span>
          </button>
          <button class="btn btn-secondary btn-badge btn-disabled" id="emerging-topics-btn"
                  onclick="openEmergingTopicsModal()" title="Emerging topics detected in this call">
            Emerging Topics
            <span class="badge-count hidden" id="emerging-topics-badge">0</span>
          </button>
          <button class="btn btn-secondary" id="banner-toggle-btn" onclick="toggleBanner()">Banner: On</button>
          <button class="btn btn-secondary" onclick="saveReport()">&#128190; Save</button>
          <button class="btn btn-secondary" onclick="window.print()">&#128196; PDF</button>
        </div>
      </div>
      <div id="report-body"><div id="report-page" class="attrib-off"></div></div>
    </div>
    <!-- Shared modal overlay. Both header buttons populate the same element
         with their own body/title and toggle .active to show it. -->
    <div class="modal-overlay" id="proposal-modal" onclick="handleModalBackdropClick(event)">
      <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-header">
          <div>
            <div class="modal-title" id="modal-title">—</div>
            <div class="modal-subtitle" id="modal-subtitle"></div>
          </div>
          <button class="modal-close" onclick="closeProposalModal()" title="Close">&times;</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>
  </div>
</div>

<!-- Sentence score popover (single DOM element, repositioned on click) -->
<div id="s-popover">
  <div id="s-pop-text"></div>
  <div id="s-pop-title">Category Scores</div>
  <div id="s-pop-scores"></div>
  <div id="s-pop-footer"><span class="s-pop-note" id="s-pop-note"></span></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>

<script type="application/json" id="state-data">
/* __BEGIN_STATE__ */
__STATE_JSON__
/* __END_STATE__ */
</script>

<script>
// ============================================================
// BOOT
// ============================================================
const MIN_IMPORTANCE = __MIN_IMPORTANCE__;
let __HTML_TPL__ = null;
let state = null;
let sortableInstances = [];
let _activeSid = null; // sentence currently shown in popover
// Transcript panel has a single fixed view: blocks. The classified / by-category
// alternates were removed because the block view already shows status colour
// cues on every sentence, so the other modes just added navigation cost.
// Inline highlighter-pen SVG (Lucide "highlighter" outline). Inlining keeps
// the icon dependency-free and lets `currentColor` pick up the .bkt-focus
// state styling (default grey, hover amber, active dark-on-yellow).
const HIGHLIGHTER_SVG = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 11-6 6v3h9l3-3"/><path d="m22 12-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4"/></svg>';

const DYNAMIC_BUCKET_COLORS = [
  {bg:'#E3F2FD', accent:'#1565C0'},
  {bg:'#F3E5F5', accent:'#6A1B9A'},
  {bg:'#E8F5E9', accent:'#2E7D32'},
  {bg:'#FFF3E0', accent:'#E65100'},
  {bg:'#FCE4EC', accent:'#880E4F'},
  {bg:'#E0F7FA', accent:'#00695C'},
  {bg:'#FFF8E1', accent:'#F57F17'},
  {bg:'#E8EAF6', accent:'#283593'},
  {bg:'#F1F8E9', accent:'#558B2F'},
  {bg:'#FBE9E7', accent:'#BF360C'},
  {bg:'#E0F2F1', accent:'#004D40'},
  {bg:'#EDE7F6', accent:'#4527A0'},
  {bg:'#F9FBE7', accent:'#827717'},
  {bg:'#FCE4EC', accent:'#AD1457'},
  {bg:'#E8EAF6', accent:'#1A237E'},
];

document.addEventListener('DOMContentLoaded', () => {
  __HTML_TPL__ = document.documentElement.outerHTML;
  state = JSON.parse(
    document.getElementById('state-data').textContent
      .replace(/\/\*\s*__BEGIN_STATE__\s*\*\//,'')
      .replace(/\/\*\s*__END_STATE__\s*\*\//, '')
      .trim()
  );
  document.addEventListener('mousedown', maybeClosePopover);
  renderApp();
});

function renderApp() {
  renderBanner();
  renderTabs();
  renderCurrentBank();
}

// ============================================================
// BANNER (PDF only — toggle on/off for print output)
// ============================================================
function renderBanner() {
  const wrap = document.getElementById('banner-wrap');
  const img = document.getElementById('banner-img');
  const btn = document.getElementById('banner-toggle-btn');
  if (state.banner_src) { img.src = state.banner_src; }
  if (state.banner_visible) {
    wrap.classList.remove('banner-off');
    if (btn) btn.textContent = 'Banner: On';
  } else {
    wrap.classList.add('banner-off');
    if (btn) btn.textContent = 'Banner: Off';
  }
}
function toggleBanner() { state.banner_visible = !state.banner_visible; renderBanner(); }

let _attribVisible = false;
function toggleAttrib() {
  _attribVisible = !_attribVisible;
  document.getElementById('report-page').classList.toggle('attrib-off', !_attribVisible);
  document.getElementById('attrib-toggle-btn').textContent = _attribVisible ? 'Names: On' : 'Names: Off';
}

// ============================================================
// TABS
// ============================================================
function renderTabs() {
  const bar = document.getElementById('tab-bar');
  const fq = state.meta && state.meta.fiscal_quarter || '';
  const fy = state.meta && state.meta.fiscal_year || '';
  const shortYear = fy.length === 4 ? "'" + fy.slice(2) : fy;
  const period = fq && fy ? ` ${fq}${shortYear}` : '';
  bar.innerHTML = Object.entries(state.banks).map(([id, bank]) =>
    `<button class="tab-btn${id === state.current_bank ? ' active' : ''}" onclick="selectBank('${id}')">
       ${esc(bank.company_name)}${period ? `<span style="font-weight:400;color:#65676B;margin-left:4px;font-size:11px">${esc(period)}</span>` : ''}</button>`
  ).join('');
}
function selectBank(id) {
  state.current_bank = id; renderTabs(); renderCurrentBank();
}
function renderCurrentBank() {
  renderTranscriptPanel(); renderReportPanel();
}

// ============================================================
// TRANSCRIPT PANEL — COLLAPSE / VIEW MODES
// ============================================================
let _tpSavedWidth = null;
function toggleTranscript() {
  const wrap = document.getElementById('transcript-wrap');
  const resize = document.getElementById('tp-resize');
  const isCollapsed = wrap.classList.contains('tp-collapsed');
  if (isCollapsed) {
    openTranscriptPanel();
  } else {
    _tpSavedWidth = wrap.style.width || '40%';
    wrap.classList.add('tp-collapsed');
    wrap.style.width = '';
    resize.classList.add('tp-hidden');
  }
}

// Force the transcript panel open. Used by the category highlight feature so
// clicking the focus icon on a bucket never leaves the user staring at a
// collapsed rail.
function openTranscriptPanel() {
  const wrap = document.getElementById('transcript-wrap');
  const resize = document.getElementById('tp-resize');
  if (!wrap.classList.contains('tp-collapsed')) return;
  wrap.classList.remove('tp-collapsed');
  wrap.style.width = _tpSavedWidth || '40%';
  resize.classList.remove('tp-hidden');
}

// Toggle highlight for a bucket. Clicking the same bucket's focus icon
// twice clears the highlight; clicking a different one switches target.
function toggleCategoryHighlight(bucketId) {
  if (state.highlighted_bucket_id === bucketId) {
    clearCategoryHighlight();
    return;
  }
  state.highlighted_bucket_id = bucketId;
  openTranscriptPanel();
  renderTranscriptBody();
  renderCurrentBank();
  updateHighlightPill();
}

function clearCategoryHighlight() {
  if (!state.highlighted_bucket_id) return;
  state.highlighted_bucket_id = null;
  renderTranscriptBody();
  renderCurrentBank();
  updateHighlightPill();
}

function updateHighlightPill() {
  const pill = document.getElementById('tp-highlight-pill');
  const label = document.getElementById('tp-highlight-pill-label');
  if (!pill || !label) return;
  const bucketId = state.highlighted_bucket_id;
  if (!bucketId) {
    pill.classList.remove('active');
    return;
  }
  const bucket = state.buckets.find(b => b.id === bucketId);
  label.textContent = 'Highlighting: ' + (bucket ? bucket.name : bucketId);
  pill.classList.add('active');
}

// ── Resize handle for transcript panel ──
(function initResize() {
  document.addEventListener('DOMContentLoaded', () => {
    const handle = document.getElementById('tp-resize');
    const wrap = document.getElementById('transcript-wrap');
    if (!handle || !wrap) return;
    let startX, startW;
    handle.addEventListener('mousedown', e => {
      e.preventDefault();
      startX = e.clientX;
      startW = wrap.offsetWidth;
      handle.classList.add('active');
      const onMove = ev => {
        const delta = ev.clientX - startX;
        const newW = Math.max(200, Math.min(startW + delta, window.innerWidth * 0.7));
        wrap.style.width = newW + 'px';
      };
      const onUp = () => {
        handle.classList.remove('active');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
})();

// ============================================================
// TRANSCRIPT PANEL — RENDER
// ============================================================
function renderTranscriptPanel() {
  renderTranscriptBody();
}

function getBucket(bid) {
  return state.buckets.find(b => b.id === bid) ||
         {id:'unassigned',name:'Unassigned',color_bg:'#FAFAFA',color_accent:'#9E9E9E'};
}

function bucketLabel(bucket) {
  return (state.bucket_user_titles && state.bucket_user_titles[bucket.id]) || bucket.name || 'Unassigned';
}

function bucketAppliesTo(bucket, transcriptSection) {
  const applies = (bucket && bucket.transcript_sections) || 'ALL';
  return applies === 'ALL' || applies === transcriptSection;
}

function getSentenceContext(sid) {
  const bank = state.banks[state.current_bank] || {};
  for (const blk of (bank.md_blocks || [])) {
    if ((blk.sentences || []).some(s => s.sid === sid)) {
      return {transcriptSection:'MD', editable:true, role:'md'};
    }
  }
  for (const conv of (bank.qa_conversations || [])) {
    if ((conv.question_sentences || []).some(s => s.sid === sid)) {
      return {transcriptSection:'QA', editable:false, role:'qa_question'};
    }
    if ((conv.answer_sentences || []).some(s => s.sid === sid)) {
      return {transcriptSection:'QA', editable:true, role:'qa_answer'};
    }
  }
  return {transcriptSection:'ALL', editable:false, role:'unknown'};
}

function getApplicableBucketsForSentence(sid) {
  const ctx = getSentenceContext(sid);
  const currentBucketId = effectivePrimary(sid);
  return {
    context: ctx,
    buckets: state.buckets.filter(bucket =>
      bucket.id === currentBucketId || bucketAppliesTo(bucket, ctx.transcriptSection))
  };
}

function nextBucketColors() {
  const count = state.buckets.length;
  return DYNAMIC_BUCKET_COLORS[count % DYNAMIC_BUCKET_COLORS.length] || {bg:'#ECEFF1', accent:'#546E7A'};
}

function insertBucket(bucket) {
  if (!state.buckets) state.buckets = [];
  state.buckets.push(bucket);
}

function createBucketFromRow(row, options={}) {
  if (state.next_bucket_seq == null) {
    state.next_bucket_seq = state.buckets.filter(b => /^bucket_\d+$/.test(b.id)).length;
  }
  const colors = nextBucketColors();
  const bucketId = `bucket_${state.next_bucket_seq++}`;
  const bucket = {
    id: bucketId,
    name: (row.category_name || '').trim(),
    report_section: row.report_section || 'Results Summary',
    transcript_sections: row.transcript_sections || 'ALL',
    description: row.category_description || '',
    color_bg: colors.bg,
    color_accent: colors.accent,
    generated_headline: options.generated_headline || '',
    source: options.source || 'suggested',
  };
  insertBucket(bucket);
  return bucket;
}

function getSentenceReviewStatus(sid) {
  const bs = getBankState(state.current_bank);
  if (bs.sentence_status_overrides && bs.sentence_status_overrides[sid]) {
    return bs.sentence_status_overrides[sid];
  }
  const sent = findSentence(sid);
  return (sent && sent.status) || 'candidate';
}

function setSentenceReviewStatus(sids, status) {
  const bs = getBankState(state.current_bank);
  if (!bs.sentence_status_overrides) bs.sentence_status_overrides = {};
  (Array.isArray(sids) ? sids : [sids]).forEach(sid => {
    bs.sentence_status_overrides[sid] = status;
  });
}

function effectivePrimary(sid) {
  const bs = getBankState(state.current_bank);
  return (bs.sentence_user_primary && bs.sentence_user_primary[sid]) ||
         findSentence(sid)?.selected_bucket_id ||
         findSentence(sid)?.primary || '';
}

function renderTranscriptBody() {
  renderTranscriptBodyBlocks();
}

// ── Helpers: inclusion check + consecutive-category grouping ──
function computeIncludedSids(bankId) {
  const inc = new Set();
  const bank = state.banks[bankId] || {};
  (bank.md_blocks || []).forEach(blk => {
    (blk.sentences || []).forEach(sent => {
      if (getSentenceReviewStatus(sent.sid) === 'selected') inc.add(sent.sid);
    });
  });
  // Analyst question sentences are deliberately omitted from the inclusion
  // set. They are context-only (status="context") and never become a finding
  // on their own; the analyst_question_summary on the conversation provides
  // the prefix line that contextualises the executive findings.
  (bank.qa_conversations || []).forEach(conv => {
    (conv.answer_sentences || []).forEach(sent => {
      if (getSentenceReviewStatus(sent.sid) === 'selected') {
        inc.add(sent.sid);
      }
    });
  });
  return inc;
}
function renderGroupedSpans(groups, btype, inc) {
  return groups.map((g, i) => {
    const bullet = i > 0 ? '<span class="t-gbullet">&bull;</span>' : '';
    return bullet + g.sents.map(s => tSpan(s, btype, inc)).join(' ');
  }).join(' ');
}

// ── Render sentences with paragraph breaks ──
function tSpansWithParas(sentences, btype, inc) {
  let html = '', lastPara = -1;
  sentences.forEach(s => {
    const pi = s.para_idx != null ? s.para_idx : 0;
    if (lastPara >= 0 && pi !== lastPara) html += '<span class="t-para-break"></span>';
    lastPara = pi;
    html += tSpan(s, btype, inc) + ' ';
  });
  return html;
}

// ── Transcript sentence span (included/excluded styling) ──
function tSpan(sent, blockType, inc) {
  const bid = effectivePrimary(sent.sid);
  const isQa = blockType === 'qa';
  const status = getSentenceReviewStatus(sent.sid);
  const cls = status === 'selected' ? 's-incl' : status === 'candidate' ? 's-cand' : 's-excl';
  // When a category is focused from the report preview, highlight every
  // sentence whose current bucket matches — across all three statuses so
  // the user sees the full footprint of the category (included/review/rejected).
  const highlightCls = state.highlighted_bucket_id && bid === state.highlighted_bucket_id
    ? ' tp-highlighted' : '';
  const scores64 = btoa(unescape(encodeURIComponent(JSON.stringify(sent.scores))));
  return `<span class="s-tok ${cls}${isQa?' qa-sent':''}${highlightCls}"
    data-sid="${sent.sid}" data-btype="${blockType}" data-primary="${bid}" data-scores="${scores64}"
    onclick="showSentencePopover(event,this)">${esc(sent.text)}</span>`;
}

function sentenceSpan(sent, blockType) {
  const bid = effectivePrimary(sent.sid);
  const bkt = getBucket(bid);
  const isQa = blockType === 'qa';
  const scores64 = btoa(unescape(encodeURIComponent(JSON.stringify(sent.scores))));

// ── View: Blocks ──
function renderTranscriptBodyBlocks() {
  const bank = state.banks[state.current_bank];
  const inc = computeIncludedSids(state.current_bank);
  let html = '';
  if (bank.md_blocks && bank.md_blocks.length) {
    html += `<div class="t-section-header">Management Discussion</div>`;
    bank.md_blocks.forEach(blk => {
      const sentHtml = tSpansWithParas(blk.sentences, 'md', inc);
      html += `<div class="t-block">
        <div class="t-block-header"><span class="t-speaker-name">${esc(blk.speaker)}</span>
        ${blk.speaker_title ? `<span class="t-speaker-title">${esc(blk.speaker_title)}</span>` : ''}</div>
        <div class="t-block-text">${sentHtml}</div></div>`;
    });
  }
  if (bank.qa_conversations && bank.qa_conversations.length) {
    html += `<div class="t-section-header">Questions &amp; Answers</div>`;
    bank.qa_conversations.forEach((conv, ci) => {
      html += renderQAConvBlocks(conv, inc, ci);
    });
  }
  document.getElementById('transcript-body').innerHTML = html;
}

// Build the per-turn rows for the Blocks view, preserving the back-and-forth
// order of the original transcript. Falls back to the legacy
// question_sentences/answer_sentences split when an older saved state has no
// `turns` array (e.g. a report rendered before turn ordering was added).
function _qaConvTurns(conv) {
  if (Array.isArray(conv.turns) && conv.turns.length) return conv.turns;
  const turns = [];
  if ((conv.question_sentences || []).length) {
    turns.push({
      role: 'q',
      speaker: conv.analyst_name || 'Analyst',
      speaker_title: '',
      speaker_affiliation: conv.analyst_affiliation || '',
      sentences: conv.question_sentences,
    });
  }
  if ((conv.answer_sentences || []).length) {
    turns.push({
      role: 'a',
      speaker: conv.executive_name || 'Executive',
      speaker_title: conv.executive_title || '',
      speaker_affiliation: '',
      sentences: conv.answer_sentences,
    });
  }
  return turns;
}

function _qaTurnLabel(turn) {
  if (turn.role === 'q') {
    const name = turn.speaker || 'Analyst';
    return turn.speaker_affiliation ? `${name} (${turn.speaker_affiliation})` : name;
  }
  const name = turn.speaker || 'Executive';
  return turn.speaker_title ? `${name}, ${turn.speaker_title}` : name;
}

function renderQAConvBlocks(conv, inc, convIdx) {
  const turns = _qaConvTurns(conv);
  const turnsHtml = turns.map(turn => {
    const label = _qaTurnLabel(turn);
    const sentHtml = tSpansWithParas(turn.sentences || [], 'qa', inc);
    const cls = turn.role === 'q' ? 't-qa-q' : 't-qa-a';
    const lblCls = turn.role === 'q' ? 'q' : 'a';
    const lblText = turn.role === 'q' ? 'Q' : 'A';
    return `<div class="${cls}"><span class="qa-lbl ${lblCls}">${lblText}</span><span class="qa-person">${esc(label)}</span>
      <div class="t-qa-text">${sentHtml}</div></div>`;
  }).join('');
  return `<div class="t-qa-group">
    <div class="t-qa-num-label">Question ${convIdx + 1}</div>
    ${turnsHtml}</div>`;
}

function createCustomBucketForActiveSentence() {
  if (!_activeSid) return;
  const context = getSentenceContext(_activeSid);
  if (!context.editable) return;

  const name = (document.getElementById('s-custom-name')?.value || '').trim();
  const reportSection = document.getElementById('s-custom-section')?.value || 'Results Summary';
  const subtitle = (document.getElementById('s-custom-subtitle')?.value || '').trim();
  const description = (document.getElementById('s-custom-description')?.value || '').trim();
  if (!name) return;

  const bucket = createBucketFromRow({
    category_name: name,
    category_description: description,
    transcript_sections: context.transcriptSection,
    report_section: reportSection,
  }, {
    generated_headline: subtitle,
    source: 'suggested',
  });

function setActiveSentenceStatus(status) {
  if (!_activeSid) return;
  const context = getSentenceContext(_activeSid);
  if (!context.editable) return;
  setSentenceReviewStatus(_activeSid, status);
  if (status === 'selected' && !effectivePrimary(_activeSid)) {
    const sent = findSentence(_activeSid);
    const fallback = (sent && sent.candidate_bucket_ids && sent.candidate_bucket_ids[0]) || '';
    if (fallback) {
      const bs = getBankState(state.current_bank);
      if (!bs.sentence_user_primary) bs.sentence_user_primary = {};
      bs.sentence_user_primary[_activeSid] = fallback;
    }
  }
  document.getElementById('s-popover').style.display = 'none';
  _activeSid = null;
  renderCurrentBank();
}

function showSentencePopover(evt, el) {
  evt.stopPropagation();
  const sid    = el.dataset.sid;
  const scores = JSON.parse(decodeURIComponent(escape(atob(el.dataset.scores))));
  const sent   = findSentence(sid);
  if (!sent) return;

  _activeSid = sid;

  // Cross-highlight: find this sentence in the report panel and scroll to it
  highlightInReport(sid);

  // Populate text preview
  document.getElementById('s-pop-text').textContent = `"${sent.text}"`;

  // Note line
  const bucketState = getApplicableBucketsForSentence(sid);
  const readonly = !bucketState.context.editable;
  const currentStatus = getSentenceReviewStatus(sid);
  document.getElementById('s-pop-note').textContent = readonly
    ? 'Analyst question sentences are context only \u2014 they are not classified into a category and never become a finding on their own.'
    : `Current review status: ${currentStatus}. Click a category to promote it into the report.`;

  const curPrimary = effectivePrimary(sid);
  const applicableBuckets = bucketState.buckets;
  const scoredRows = applicableBuckets
    .map(b => ({ bucket: b, score: scores[b.id] || 0 }))
    .sort((a, b) => b.score - a.score || bucketLabel(a.bucket).localeCompare(bucketLabel(b.bucket)));

  const topIds = scoredRows.slice(0, 3).map(row => row.bucket.id);
  if (!topIds.includes(curPrimary)) topIds.push(curPrimary);
  const topRows = applicableBuckets
    .filter(bucket => topIds.includes(bucket.id))
    .map(bucket => ({ bucket, score: scores[bucket.id] || 0 }))
    .sort((a, b) => (b.bucket.id === curPrimary) - (a.bucket.id === curPrimary) || b.score - a.score);
  const allRows = applicableBuckets
    .map(bucket => ({ bucket, score: scores[bucket.id] || 0 }))
    .sort((a, b) =>
      (b.bucket.id === curPrimary) - (a.bucket.id === curPrimary) ||
      b.score - a.score ||
      bucketLabel(a.bucket).localeCompare(bucketLabel(b.bucket))
    );

  const topHtml = topRows.map(({bucket, score}) =>
    renderPopoverScoreRow(bucket, score, sid, {
      readonly,
      current: bucket.id === curPrimary,
    })
  ).join('');
  const remainingCount = Math.max(allRows.length - topRows.length, 0);
  const allHtml = allRows.map(({bucket, score}) =>
    renderPopoverScoreRow(bucket, score, sid, {
      readonly,
      current: bucket.id === curPrimary,
    })
  ).join('');

  const customHtml = readonly ? '' : `
    <div class="s-score-section">
      <div class="s-score-section-title">Review Status</div>
      <div class="s-score-row${currentStatus==='selected'?' current':''}" onclick="setActiveSentenceStatus('selected')">
        <div class="s-score-main"><div class="s-score-name">Selected for report</div></div>
        <div class="s-score-check">${currentStatus==='selected' ? '&#10003;' : ''}</div>
      </div>
      <div class="s-score-row${currentStatus==='candidate'?' current':''}" onclick="setActiveSentenceStatus('candidate')">
        <div class="s-score-main"><div class="s-score-name">Candidate only</div></div>
        <div class="s-score-check">${currentStatus==='candidate' ? '&#10003;' : ''}</div>
      </div>
      <div class="s-score-row${currentStatus==='rejected'?' current':''}" onclick="setActiveSentenceStatus('rejected')">
        <div class="s-score-main"><div class="s-score-name">Rejected</div></div>
        <div class="s-score-check">${currentStatus==='rejected' ? '&#10003;' : ''}</div>
      </div>
    </div>
    <div class="s-score-section">
      <button id="s-pop-custom-btn" class="s-expand-btn" onclick="toggleCustomBucketForm(event)">Create custom classification</button>
      <div id="s-pop-custom">
        <div class="s-pop-form">
          <input id="s-custom-name" type="text" placeholder="New classification name">
          <div class="s-pop-form-row">
            <select id="s-custom-section">
              <option value="Results Summary">Results Summary</option>
              <option value="Earnings Call Q&A">Earnings Call Q&A</option>
            </select>
            <input id="s-custom-subtitle" type="text" placeholder="Optional subtitle">
          </div>
          <textarea id="s-custom-description" placeholder="Optional description"></textarea>
        </div>
        <div class="s-pop-form-actions">
          <button class="btn btn-primary btn-sm" onclick="createCustomBucketForActiveSentence()">Create and assign</button>
        </div>
      </div>
    </div>`;

  const allSectionHtml = allRows.length ? `
    <div class="s-score-section">
      <button id="s-pop-all-btn" class="s-expand-btn"
              data-show-label="Show all classifications${remainingCount ? ` (${remainingCount} more)` : ''}"
              data-hide-label="Hide all classifications"
              onclick="togglePopoverAll(event)">
        Show all classifications${remainingCount ? ` (${remainingCount} more)` : ''}
      </button>
      <div id="s-pop-all">${allHtml}</div>
    </div>` : '';

  document.getElementById('s-pop-scores').innerHTML = `
    <div class="s-score-section">
      <div class="s-score-section-title">Top Matches</div>
      ${topHtml || '<div class="s-score-row readonly"><div class="s-score-main"><div class="s-score-name">No scores available</div></div></div>'}
    </div>
    ${allSectionHtml}
    ${customHtml}
  `;

  // Position near click
  const pop = document.getElementById('s-popover');
  pop.style.display = 'block';
  const pw = Math.min(420, window.innerWidth - 16), ph_est = 520;
  let left = evt.clientX + 8;
  let top  = evt.clientY + 8;
  if (left + pw > window.innerWidth - 8)  left = evt.clientX - pw - 8;
  if (top + ph_est > window.innerHeight - 8) top = evt.clientY - ph_est - 8;
  pop.style.left = Math.max(8, left) + 'px';
  pop.style.top  = Math.max(8, top)  + 'px';
}

function highlightInReport(sid) {

function reassignSentence(sid, newBucketId) {
  const {context} = getApplicableBucketsForSentence(sid);
  const targetBucket = getBucket(newBucketId);
  if (!context.editable || !bucketAppliesTo(targetBucket, context.transcriptSection)) return;
  const bs = getBankState(state.current_bank);
  if (!bs.sentence_user_primary) bs.sentence_user_primary = {};
  bs.sentence_user_primary[sid] = newBucketId;
  setSentenceReviewStatus(sid, 'selected');
  document.getElementById('s-popover').style.display = 'none';
  _activeSid = null;
  renderCurrentBank(); // full re-render: transcript colors + report groupings
}

// ============================================================
// SUB-QUOTE COMPUTATION (programmatic from sentence data)
// ============================================================

/**
 * Group consecutive sentences with the same effective primary into sub-quotes.
 * Sub-quote ID = "SQ_" + first sentence SID.
 */
function computeMDSubquotes(blk, bs) {
  const groups = [];
  let cur = null;

  for (const sent of blk.sentences) {
    if (getSentenceReviewStatus(sent.sid) !== 'selected') {
      if (cur) { groups.push(cur); cur = null; }
      continue;
    }
    const ep = (bs.sentence_user_primary && bs.sentence_user_primary[sent.sid]) ||
      sent.selected_bucket_id || sent.primary;
    if (!ep) {
      if (cur) { groups.push(cur); cur = null; }
      continue;
    }
    // Check for whole-subquote bucket override (from drag-drop)
    const sqid = cur ? cur.id : `SQ_${sent.sid}`;
    const bucketOverride = bs.subquote_bucket_overrides && bs.subquote_bucket_overrides[sqid];
    const effectiveBucket = bucketOverride || ep;

    if (!cur || cur.effective_bucket !== effectiveBucket) {
      if (cur) groups.push(cur);
      cur = {
        id: `SQ_${sent.sid}`,
        type: 'md',
        block_id: blk.id,
        speaker: blk.speaker,
        speaker_title: blk.speaker_title || '',
        effective_bucket: effectiveBucket,
        sentences: [sent],
      };
    } else {
      cur.sentences.push(sent);
    }
  }
  if (cur) groups.push(cur);
  return groups;
}

/**
 * For QA conversations, group consecutive answer sentences by effective bucket.
 * The analyst question stays attached as context on each resulting sub-quote.
 */
function computeQASubquotes(conv, bs) {
  const visibleAnswers = (conv.answer_sentences || []).filter(
    s => getSentenceReviewStatus(s.sid) === 'selected'
  );
  if (!visibleAnswers.length) return [];

  const groups = [];
  let cur = null;
  for (const sent of visibleAnswers) {
    const effectiveBucket =
      (bs.sentence_user_primary && bs.sentence_user_primary[sent.sid]) ||
      sent.selected_bucket_id ||
      sent.primary ||
      '';
    if (!effectiveBucket) continue;
    if (!cur || cur.effective_bucket !== effectiveBucket) {
      if (cur) groups.push(cur);
      cur = {
        id: `SQ_${sent.sid}`,
        type: 'qa',
        conv_id: conv.id,
        analyst_name: conv.analyst_name,
        analyst_affiliation: conv.analyst_affiliation,
        executive_name: conv.executive_name,
        executive_title: conv.executive_title,
        analyst_question_summary: conv.analyst_question_summary || '',
        effective_bucket: effectiveBucket,
        question_sentences: conv.question_sentences || [],
        answer_sentences: [sent],
      };
    } else {
      cur.answer_sentences.push(sent);
    }
  }
  if (cur) groups.push(cur);
  return groups;
}

function getAllSubquotes(bankId) {
  const bank = state.banks[bankId];
  const bs   = getBankState(bankId);
  const result = [];
  (bank.md_blocks || []).forEach(blk => result.push(...computeMDSubquotes(blk, bs)));
  (bank.qa_conversations || []).forEach(conv => result.push(...computeQASubquotes(conv, bs)));
  return result;
}

function getSubquoteImportance(sq) {
  const sents = sq.type === 'md' ? sq.sentences : sq.answer_sentences;
  if (!sents || !sents.length) return 0;
  return Math.max(...sents.map(s => s.importance_score || 0));
}

function getSubquoteFormats(sq, fmt) {
  const sents = sq.type === 'md' ? sq.sentences : sq.answer_sentences;
  if (!sents) return '';
  const key = fmt === 'verbatim' ? 'text' : fmt;
  return sents.map(s => s[key] || s.text || '').join(' ').trim();
}

function getSubquoteBucketScore(sq) {
  const bucketId = sq.effective_bucket;
  const sents = sq.type === 'md' ? sq.sentences : sq.answer_sentences;
  if (!bucketId || !sents || !sents.length) return 0;
  return Math.max(...sents.map(s => Number((s.scores || {})[bucketId] || 0)));
}

function getSubquoteSentenceIds(sq) {
  const sents = sq.type === 'md' ? sq.sentences : sq.answer_sentences;
  return (sents || []).map(s => s.sid);
}

function isSubquoteForceIncluded(sq, bs) {
  return getSubquoteSentenceIds(sq).some(sid => getSentenceReviewStatus(sid) === 'selected');
}

function getReportSubquotes(bankId, bucketId) {
  const bs  = getBankState(bankId);
  const all = getAllSubquotes(bankId);
  let eligible = all.filter(sq =>
    sq.effective_bucket === bucketId &&
    getSubquoteSentenceIds(sq).some(sid => getSentenceReviewStatus(sid) === 'selected')
  );

  const order = bs.bucket_subquote_order && bs.bucket_subquote_order[bucketId];
  if (order && order.length) {
    const ordered = [];
    order.forEach(id => {
      const sq = eligible.find(x => x.id === id);
      if (sq) ordered.push(sq);
    });
    eligible.forEach(sq => { if (!order.includes(sq.id)) ordered.push(sq); });
    return ordered;
  }
  return [...eligible].sort((a, b) =>
    getSubquoteImportance(b) - getSubquoteImportance(a) ||
    getSubquoteBucketScore(b) - getSubquoteBucketScore(a) ||
    a.id.localeCompare(b.id)
  );
}

function getConfigChangeProposals(bankId) {

// Copy a string to the clipboard. Uses the async Clipboard API when available
// and falls back to a synthetic textarea for older browsers / local files.
function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    return navigator.clipboard.writeText(text).catch(() => _copyViaTextarea(text));
  }
  return Promise.resolve(_copyViaTextarea(text));
}
function _copyViaTextarea(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch (e) { /* ignore */ }
  document.body.removeChild(ta);
}

function copyProposedDescription(proposalId, btn) {
  const proposals = getConfigChangeProposals(state.current_bank);
  const proposal = proposals.find(item => item.id === proposalId);
  if (!proposal) return;
  const desc = (proposal.proposed_row || {}).category_description || '';
  copyToClipboard(desc).then(() => {
    if (!btn) return;
    const prev = btn.textContent;
    btn.textContent = 'Copied';
    btn.classList.add('btn-copied');
    setTimeout(() => { btn.textContent = prev; btn.classList.remove('btn-copied'); }, 1200);
  });
}

// Enable an emerging-topic proposal: create the bucket at the end of its
// report section, move every linked finding out of its current bucket into
// the new one, and normalize each finding's status to `candidate` so the
// user reviews them in their new home.
//
// Before reassigning, record each evidence's prior bucket + status on the
// proposal itself so disableEmergingCategory can restore the original state.
function enableEmergingCategory(proposalId, options = {}) {
  const proposals = getConfigChangeProposals(state.current_bank);
  const proposal = proposals.find(item => item.id === proposalId);
  if (!proposal || proposal.change_type !== 'new_category') return;

  // Idempotent: if we've already enabled this one, just re-render (unless the
  // caller asked us to stay silent during auto-enable on load).
  if (proposal.adopted_bucket_id && state.buckets.some(b => b.id === proposal.adopted_bucket_id)) {
    if (!options.silent) renderCurrentBank();
    return;
  }

  const bucket = createBucketFromRow(proposal.proposed_row || {}, {
    source: 'emerging',
  });
  proposal.adopted_bucket_id = bucket.id;

  const bs = getBankState(state.current_bank);
  if (!bs.sentence_user_primary) bs.sentence_user_primary = {};

  // Snapshot the pre-reassignment state so "disable" is a true reverse op.
  // sentence_user_primary may not yet have an entry for an evidence id — in
  // that case the effective bucket comes from the sentence's own
  // selected_bucket_id / primary, so we resolve via effectivePrimary.
  const originalAssignments = {};
  const originalStatuses = {};
  (proposal.linked_evidence_ids || []).forEach(evidenceId => {
    const hadExplicit = Object.prototype.hasOwnProperty.call(bs.sentence_user_primary, evidenceId);
    originalAssignments[evidenceId] = hadExplicit
      ? { kind: 'explicit', value: bs.sentence_user_primary[evidenceId] }
      : { kind: 'derived', value: effectivePrimary(evidenceId) };
    originalStatuses[evidenceId] = getSentenceReviewStatus(evidenceId);
    bs.sentence_user_primary[evidenceId] = bucket.id;
    // Every linked finding lands in the review queue — promoted if it was
    // rejected, demoted if it was selected. The user then re-confirms each
    // one in the new category's card list.
    setSentenceReviewStatus(evidenceId, 'candidate');
  });
  proposal._original_assignments = originalAssignments;
  proposal._original_statuses = originalStatuses;

  if (!options.silent) renderCurrentBank();
}

// Reverse enableEmergingCategory: restore each evidence's prior bucket +
// status, then drop the emerging bucket from state.buckets. Clearing
// adopted_bucket_id makes the proposal re-enable-able.
function disableEmergingCategory(proposalId, options = {}) {
  const proposals = getConfigChangeProposals(state.current_bank);
  const proposal = proposals.find(item => item.id === proposalId);
  if (!proposal || proposal.change_type !== 'new_category') return;
  if (!proposal.adopted_bucket_id) {
    if (!options.silent) renderCurrentBank();
    return;
  }

  const bucketId = proposal.adopted_bucket_id;
  const bs = getBankState(state.current_bank);
  const originalAssignments = proposal._original_assignments || {};
  const originalStatuses = proposal._original_statuses || {};

  (proposal.linked_evidence_ids || []).forEach(evidenceId => {
    const prior = originalAssignments[evidenceId];
    if (prior && prior.kind === 'explicit') {
      bs.sentence_user_primary[evidenceId] = prior.value;
    } else if (bs.sentence_user_primary) {
      // The evidence never had an explicit override — drop the key so the
      // sentence falls back to its own selected_bucket_id/primary.
      delete bs.sentence_user_primary[evidenceId];
    }
    if (Object.prototype.hasOwnProperty.call(originalStatuses, evidenceId)) {
      setSentenceReviewStatus(evidenceId, originalStatuses[evidenceId]);
    }
  });

  // Remove the emerging bucket and any derived per-bank state that referenced
  // it (order maps, subquote bucket overrides). Skip it if the user has since
  // renamed it or reassigned other sentences — for now we trust the round trip.
  state.buckets = state.buckets.filter(b => b.id !== bucketId);
  if (bs.bucket_subquote_order) delete bs.bucket_subquote_order[bucketId];
  if (bs.subquote_bucket_overrides) {
    Object.keys(bs.subquote_bucket_overrides).forEach(sqid => {
      if (bs.subquote_bucket_overrides[sqid] === bucketId) {
        delete bs.subquote_bucket_overrides[sqid];
      }
    });
  }

  proposal.adopted_bucket_id = null;
  delete proposal._original_assignments;
  delete proposal._original_statuses;

  if (!options.silent) renderCurrentBank();
}

// One-time auto-enable on first load: emerging topics default to ON so the
// report opens with the proposed new categories already in place. The user
// can flip any of them off via the bar at the top of the draft preview.
let _emergingDefaultsApplied = false;
function applyEmergingTopicDefaults() {
  if (_emergingDefaultsApplied) return;
  _emergingDefaultsApplied = true;
  Object.keys((state.config_change_proposals || {}).by_bank || {}).forEach(bankId => {
    const prevBank = state.current_bank;
    state.current_bank = bankId;
    const proposals = getConfigChangeProposals(bankId).filter(
      p => p.change_type === 'new_category' && !p.adopted_bucket_id
    );
    proposals.forEach(p => enableEmergingCategory(p.id, { silent: true }));
    state.current_bank = prevBank;
  });
}

// Shortcut: "is this emerging proposal currently reflected in state.buckets?"
function isEmergingAdopted(proposal) {
  return !!proposal.adopted_bucket_id &&
    state.buckets.some(b => b.id === proposal.adopted_bucket_id);
}

// Routed both from the modal cards and from the bar at the top of the draft.
function toggleEmergingCategory(proposalId, wantEnabled) {
  if (wantEnabled) {
    enableEmergingCategory(proposalId);
  } else {
    disableEmergingCategory(proposalId);
  }
}

// ============================================================
// HEADER BUTTONS — BADGES + MODAL
// ============================================================
function updateHeaderBadges() {
  const proposals = getConfigChangeProposals(state.current_bank);
  const updates = proposals.filter(p => p.change_type === 'update_existing').length;
  const emerging = proposals.filter(p => p.change_type === 'new_category').length;
  _setBadge('config-changes-btn', 'config-changes-badge', updates);
  _setBadge('emerging-topics-btn', 'emerging-topics-badge', emerging);
}

function _setBadge(btnId, badgeId, count) {
  const btn = document.getElementById(btnId);
  const badge = document.getElementById(badgeId);
  if (!btn || !badge) return;
  if (count > 0) {
    btn.classList.remove('btn-disabled');
    btn.removeAttribute('aria-disabled');
    badge.textContent = count > 99 ? '99+' : String(count);
    badge.classList.remove('hidden');
  } else {
    btn.classList.add('btn-disabled');
    btn.setAttribute('aria-disabled', 'true');
    badge.textContent = '0';
    badge.classList.add('hidden');
  }
}

function openConfigChangesModal() {
  const btn = document.getElementById('config-changes-btn');
  if (btn && btn.classList.contains('btn-disabled')) return;
  _openProposalModal(
    'Config Change Proposals',
    'Description edits for existing categories, generated from the indexed findings. Copy the new description into the config sheet to adopt it.',
    renderConfigChangesModalBody()
  );
}

function openEmergingTopicsModal() {
  const btn = document.getElementById('emerging-topics-btn');
  if (btn && btn.classList.contains('btn-disabled')) return;
  _openProposalModal(
    'Emerging Topics',
    'New themes detected outside the current taxonomy. Enabled topics appear as new sections in the report and pull linked findings into them.',
    renderEmergingTopicsModalBody()
  );
}

function _openProposalModal(title, subtitle, bodyHtml) {

document.addEventListener('keydown', evt => {
