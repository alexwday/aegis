# Call Summary Editor ETL Configuration
#
# Five LLM stages run per bank:
#   qa_boundary         - group raw Q&A speaker blocks into analyst exchanges
#   md_classification   - sentence-level classify MD paragraphs into buckets/evidence states
#   qa_classification   - sentence-level classify Q&A exchanges into buckets/evidence states
#   headline            - optional headline generation from selected evidence
#   config_review       - structured config change proposals from transcript evidence

models:
  # Tier names resolve to aegis.utils.settings.config.llm.{tier}.model (small/medium/large)
  qa_boundary:       {tier: medium}
  md_classification: {tier: medium}
  qa_classification: {tier: medium}
  headline:          {tier: medium}
  config_review:     {tier: medium}

llm:
  temperature: 0.1
  # Per-stage token budgets. `default` is used when a stage key is missing.
  max_tokens:
    qa_boundary:       4096
    md_classification: 32768
    qa_classification: 32768
    headline:          2048
    # Each proposal carries two full config rows (7 fields each) plus up to 4
    # supporting quotes, and we ask for up to 4 proposals per pass. That packs
    # close to 3k output tokens in the worst case before JSON/tool-call wrapping
    # and reasoning overhead, which blew past the previous 4096 cap and tripped
    # `finish_reason: length` — the tool call would arrive truncated with no
    # parseable `tool_calls`. 16384 gives enough headroom for both passes.
    config_review:     16384
    default:           32768

concurrency:
  # Bounds concurrent MD block + QA conversation classifications per bank.
  max_concurrent_extractions: 5

pipeline:
  # min_importance: legacy floor for evidence to remain visible in config review
  # and optional headline generation. Report inclusion is driven by explicit
  # sentence status (`selected` / `candidate` / `rejected`) instead.
  min_importance: 4.0
  # Initial sentence status thresholds for the recall-first review workflow.
  selected_importance_threshold: 6.5
  candidate_importance_threshold: 4.0
  # Minimum existing-bucket score required before evidence is auto-assigned to
  # an existing category. Lower-scoring evidence remains unmapped for review.
  min_bucket_score_for_assignment: 6.0
  # Bucket headlines are shown inline after the section name in the report
  # preview (e.g. "Capital Markets: <generated subtitle>"), so they need to
  # run as part of the normal pipeline.
  enable_headlines: true
  # Maximum number of sample snippets fed to the headline LLM per bucket.
  # Higher = richer headlines but larger prompt cost.
  headline_sample_size: 8
