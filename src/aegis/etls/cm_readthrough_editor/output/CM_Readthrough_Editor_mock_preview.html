<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CM Readthrough — Q3 2024</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600;700;800&display=swap');

/* ════════════════════════════════════════════════════════════════
   TOKENS — Editorial Financial theme
   ════════════════════════════════════════════════════════════════ */
:root{
  /* Ink & paper */
  --ink:#0F1B2D;
  --ink-2:#213149;
  --ink-3:#3A4A66;
  --paper:#FAF7F0;
  --paper-2:#FFFFFF;
  --surface-1:#F5F1E6;
  --surface-2:#EFEADC;
  --surface-3:#FBF8EF;

  /* Rules / borders */
  --rule:#D9D0BC;
  --rule-2:#E7DFCC;
  --rule-3:#F1EBD9;

  /* Text */
  --text-1:#14213A;
  --text-2:#4A5268;
  --text-3:#7A7364;
  --text-on-ink:#FBF8EF;
  --text-on-ink-2:rgba(251,248,239,.72);

  /* Semantic */
  --accent:#B25A1E;
  --accent-hover:#8F4516;
  --accent-soft:#F2DDC3;
  --accent-line:#D49764;
  --selection:#2563EB;
  --selection-soft:#DBEAFE;
  --positive:#1F6F3F;
  --positive-soft:#DCECE1;
  --candidate:#B17015;
  --candidate-soft:#F6E4C7;
  --danger:#B0321A;

  /* Shadows */
  --shadow-sm:0 1px 2px rgba(15,27,45,.06);
  --shadow-md:0 4px 14px rgba(15,27,45,.08);
  --shadow-lg:0 18px 48px rgba(15,27,45,.22);

  /* Fonts */
  --font-sans:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --font-serif:'Source Serif 4',Georgia,'Times New Roman',serif;

  /* Radii */
  --r-sm:4px;
  --r-md:8px;
  --r-lg:12px;

  /* Shared height for the two fixed top bars: the transcript's section
     label (#tp-section-label) and the report preview toolbar
     (#report-header). Both panels set min-height to this so they stay
     aligned across the top of the app. */
  --top-bar-h:54px;
}

/* ════════════════════════════════════════════════════════════════
   RESET & BASE
   ════════════════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font-sans);
  background:var(--paper);
  color:var(--text-1);
  font-size:13.5px;
  line-height:1.55;
  height:100vh;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  font-feature-settings:"ss01","cv11","kern";
}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--paper)}

/* ════════════════════════════════════════════════════════════════
   CHROME — banner + tab bar
   ════════════════════════════════════════════════════════════════ */
#app-banner{
  flex-shrink:0;
  background:var(--ink);
  color:var(--text-on-ink);
  font-family:var(--font-serif);
  font-size:15px;
  font-weight:600;
  letter-spacing:.005em;
  padding:13px 28px;
  text-transform:none;
  position:relative;
  display:flex;
  align-items:baseline;
  gap:14px;
  flex-wrap:wrap;
}
#app-banner::after{
  content:"";
  position:absolute;left:28px;right:28px;bottom:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent-line) 15%,var(--accent-line) 85%,transparent);
  opacity:.35;
}
#banner-meta{
  font-family:var(--font-sans);
  font-size:12.5px;
  font-weight:500;
  color:var(--text-on-ink-2);
  letter-spacing:.01em;
  display:inline-flex;
  align-items:baseline;
  gap:8px;
}
#banner-meta:empty{display:none}
#banner-meta .banner-sep{
  display:inline-block;
  width:1px;height:12px;
  background:var(--text-on-ink-2);
  opacity:.35;
  transform:translateY(1px);
}
#banner-meta .banner-period{
  font-weight:400;
  opacity:.78;
  margin-left:4px;
}

/* PDF banner (print only) */
#banner-wrap{display:none}
#banner-wrap img{max-height:56px;max-width:400px;object-fit:contain}

/* Tab bar */
#tab-bar{
  flex-shrink:0;
  background:var(--paper);
  border-bottom:1px solid var(--rule);
  display:flex;align-items:stretch;
  padding:0 24px;gap:2px;
  overflow-x:auto;scrollbar-width:none;
}
#tab-bar::-webkit-scrollbar{display:none}
.tab-btn{
  padding:11px 18px 10px;
  font-size:12.5px;
  font-weight:500;
  letter-spacing:.005em;
  border:none;background:none;cursor:pointer;
  color:var(--text-2);
  border-bottom:2px solid transparent;
  white-space:nowrap;
  transition:color .15s,border-color .15s;
}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--accent);font-weight:600}
.tab-btn:hover:not(.active){color:var(--ink)}

/* Content area */
#content-area{flex:1;display:flex;overflow:hidden;position:relative;background:var(--paper)}

/* ════════════════════════════════════════════════════════════════
   TRANSCRIPT PANEL — wrap + rail + resize
   ════════════════════════════════════════════════════════════════ */
#transcript-wrap{display:flex;flex-shrink:0;overflow:hidden;transition:width .2s ease;border-right:1px solid var(--rule)}
#transcript-wrap.tp-collapsed{width:34px!important;border-right:none}

#transcript-panel{flex:1;display:flex;flex-direction:row;background:var(--surface-3);overflow:hidden;min-width:0}

#tp-content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative;transition:opacity .15s,flex .2s}
.tp-collapsed #tp-content{opacity:0;pointer-events:none;overflow:hidden;flex:0}

#tp-rail{
  width:34px;flex-shrink:0;
  background:var(--ink);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  user-select:none;z-index:2;
  transition:background .15s;
  border-left:1px solid var(--ink-2);
}
#tp-rail:hover{background:var(--ink-2)}
#tp-rail-label{
  writing-mode:vertical-lr;
  font-family:var(--font-serif);
  font-size:11px;font-weight:600;
  color:var(--text-on-ink-2);
  letter-spacing:.08em;
  text-transform:uppercase;
  white-space:nowrap;
}

#tp-resize{width:4px;flex-shrink:0;cursor:col-resize;background:transparent;transition:background .15s}
#tp-resize:hover,#tp-resize.active{background:var(--accent-line)}
#tp-resize.tp-hidden{display:none}

#transcript-body{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:0;min-height:0}

/* Fixed section label — sits above the scroll area so the scrollbar starts
   BELOW it, keeping the seam with #tp-rail visually continuous. */
#tp-section-label{
  flex-shrink:0;
  min-height:var(--top-bar-h);
  display:flex;align-items:center;gap:10px;
  padding:0 12px 0 18px;
  background:var(--ink);
  color:var(--text-on-ink);
  font-family:var(--font-serif);
  font-size:12px;font-weight:600;
  text-transform:uppercase;letter-spacing:.14em;
  border-bottom:1px solid var(--ink-2);
}
#tp-section-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Findings-view toggle — single icon button in the transcript header.
   Inactive = default speaker-block view; active (highlighted) = findings list
   view where each finding is rendered as its own <li>. */
.tp-view-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:24px;padding:0;
  background:rgba(251,248,239,.06);
  border:1px solid rgba(251,248,239,.14);
  border-radius:var(--r-sm);
  color:rgba(251,248,239,.55);
  cursor:pointer;
  transition:background .15s,color .15s,border-color .15s;
}
.tp-view-btn:hover{color:#fff;background:rgba(251,248,239,.12);border-color:rgba(251,248,239,.22)}
.tp-view-btn.active{background:rgba(251,248,239,.18);color:#fff;border-color:rgba(251,248,239,.28)}
.tp-view-btn svg{display:block}
.tp-bank-btn{
  display:inline-flex;align-items:center;gap:8px;
  min-height:28px;max-width:min(50%, 320px);
  padding:0 10px;
  background:rgba(251,248,239,.06);
  border:1px solid rgba(251,248,239,.14);
  border-radius:999px;
  color:rgba(251,248,239,.88);
  cursor:pointer;
  font-family:var(--font-sans);
  font-size:11px;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;
  transition:background .15s,color .15s,border-color .15s;
}
.tp-bank-btn:hover{color:#fff;background:rgba(251,248,239,.12);border-color:rgba(251,248,239,.24)}
.tp-bank-btn svg{display:block;flex-shrink:0}
.tp-bank-btn-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tp-scope-btn{
  display:inline-flex;align-items:center;justify-content:center;
  min-height:28px;padding:0 10px;
  background:rgba(251,248,239,.06);
  border:1px solid rgba(251,248,239,.14);
  border-radius:999px;
  color:rgba(251,248,239,.88);
  cursor:pointer;
  font-family:var(--font-sans);
  font-size:10.5px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  white-space:nowrap;
  transition:background .15s,color .15s,border-color .15s;
}
.tp-scope-btn:hover{color:#fff;background:rgba(251,248,239,.12);border-color:rgba(251,248,239,.24)}

.tp-inline-toolbar{
  display:flex;align-items:center;justify-content:flex-end;
  gap:10px;padding:12px 18px 0;
}
.tp-inline-link{
  background:none;border:none;padding:0;
  color:var(--accent);cursor:pointer;
  font-size:11.5px;font-weight:600;
  letter-spacing:.01em;
}
.tp-inline-link:hover{color:var(--accent-hover);text-decoration:underline}

.bank-menu{
  position:fixed;z-index:10005;
  width:min(420px, calc(100vw - 24px));
  max-height:min(560px, calc(100vh - 32px));
  background:var(--paper-2);
  border:1px solid var(--rule-2);
  border-radius:var(--r-lg);
  box-shadow:var(--shadow-lg);
  overflow:hidden;
}
.bank-menu-header{
  padding:14px 16px 12px;
  background:var(--surface-3);
  border-bottom:1px solid var(--rule-2);
}
.bank-menu-title{
  font-family:var(--font-serif);
  font-size:16px;font-weight:700;color:var(--ink);
}
.bank-menu-subtitle{
  margin-top:4px;
  font-size:11.5px;line-height:1.5;color:var(--text-2);
}
.bank-menu-search{
  width:100%;
  margin-top:12px;
  padding:9px 11px;
  border:1px solid var(--rule-2);
  border-radius:var(--r-md);
  background:var(--paper-2);
  color:var(--text-1);
  font:inherit;
}
.bank-menu-search:focus{outline:none;border-color:var(--accent-line);box-shadow:0 0 0 3px rgba(178,90,30,.08)}
.bank-menu-scroll{max-height:420px;overflow-y:auto;padding:8px 8px 10px}
.bank-menu-group + .bank-menu-group{margin-top:6px}
.bank-menu-group-title{
  padding:8px 8px 6px;
  font-size:10px;font-weight:700;letter-spacing:.14em;
  color:var(--text-3);text-transform:uppercase;
}
.bank-menu-item{
  width:100%;
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  padding:10px 12px;
  border:none;border-radius:var(--r-md);
  background:none;cursor:pointer;
  text-align:left;
  transition:background .12s,color .12s;
}
.bank-menu-item:hover{background:var(--surface-3)}
.bank-menu-item.active{background:var(--accent-soft)}
.bank-menu-item-main{min-width:0}
.bank-menu-item-ticker{
  font-size:10.5px;font-weight:700;letter-spacing:.12em;
  color:var(--accent);text-transform:uppercase;
}
.bank-menu-item-name{
  margin-top:3px;
  font-size:12.5px;line-height:1.45;color:var(--text-1);
}
.bank-menu-item-count{
  flex-shrink:0;
  min-width:28px;height:22px;padding:0 8px;
  display:inline-flex;align-items:center;justify-content:center;
  border-radius:999px;
  background:var(--surface-1);
  color:var(--text-2);
  font-size:11px;font-weight:700;
}
.bank-menu-empty{
  padding:22px 16px;
  text-align:center;
  font-size:12px;font-style:italic;color:var(--text-3);
}

#tp-scroll{
  flex:1;
  overflow-y:auto;
  padding:0 0 16px;
  min-height:0;
  scrollbar-width:thin;
  scrollbar-color:var(--ink-3) transparent;
}
#tp-scroll::-webkit-scrollbar{width:8px}
#tp-scroll::-webkit-scrollbar-track{background:transparent}
#tp-scroll::-webkit-scrollbar-thumb{background:var(--ink-3);border-radius:4px;border:none}
#tp-scroll::-webkit-scrollbar-thumb:hover{background:var(--ink-2)}

/* First inline section header is hidden — #tp-section-label shows it instead.
   Subsequent section headers (e.g. Q&A) remain as inline dividers. */
#tp-scroll > .t-section-header:first-child{display:none}

/* Section header — inline divider between sections (no longer sticky, the
   current-section title is rendered in #tp-section-label above the scroll). */
.t-section-header{
  padding:14px 18px 12px;
  background:var(--ink);
  color:var(--text-on-ink);
  font-family:var(--font-serif);
  font-size:12px;font-weight:600;
  text-transform:uppercase;letter-spacing:.14em;
  border-bottom:1px solid var(--ink-2);
  margin-bottom:10px;
}

/* MD speaker block */
.t-block{
  margin:6px 14px;padding:10px 12px 10px 14px;
  border-left:2px solid var(--rule);
  border-radius:0 var(--r-sm) var(--r-sm) 0;
  background:var(--paper-2);
  box-shadow:var(--shadow-sm);
}
.t-block-header{display:flex;flex-wrap:wrap;align-items:baseline;gap:6px;margin-bottom:6px}
.t-speaker-name{font-weight:700;font-size:11.5px;color:var(--ink);letter-spacing:.005em}
.t-speaker-title{font-size:10.5px;color:var(--text-3);font-style:italic}
.t-block-text{font-size:12px;line-height:1.6;color:var(--text-1)}
.t-para-break{display:block;height:8px}

/* Findings view — one <li> per finding. Bullet sits outside the indent so the
   finding text aligns cleanly. Used inside both MD .t-block-text and QA
   .t-qa-text containers, so the font/color cascade naturally. */
.t-findings-list{
  list-style:none;padding:0;margin:0;
}
.t-findings-list > li{
  position:relative;
  padding:2px 0 2px 16px;
}
.t-findings-list > li + li{margin-top:6px}
.t-findings-list > li::before{
  content:"";
  position:absolute;
  left:4px;top:10px;
  width:4px;height:4px;
  border-radius:50%;
  background:var(--text-3);
}

/* QA group */
.t-qa-group{
  margin:8px 14px;
  border:1px solid var(--rule-2);
  border-left:2px solid var(--accent-line);
  border-radius:0 var(--r-md) var(--r-md) 0;
  overflow:hidden;
  background:var(--paper-2);
  box-shadow:var(--shadow-sm);
}
.t-qa-q{padding:9px 12px 8px;background:var(--surface-1)}
.t-qa-a{padding:9px 12px 8px;border-top:1px solid var(--rule-3)}
.t-qa-toggle-row{
  padding:8px 12px;
  border-top:1px solid var(--rule-3);
  background:var(--paper-2);
}
.t-qa-toggle{
  background:none;border:none;padding:0;
  color:var(--accent);cursor:pointer;
  font-size:11px;font-weight:700;
  letter-spacing:.01em;
}
.t-qa-toggle:hover{color:var(--accent-hover);text-decoration:underline}
.qa-lbl{
  display:inline-block;
  font-size:9px;font-weight:700;
  padding:2px 5px;border-radius:3px;
  margin-right:5px;vertical-align:middle;
  letter-spacing:.08em;
}
.qa-lbl.q{background:var(--ink);color:var(--text-on-ink)}
.qa-lbl.a{background:var(--positive);color:#fff}
.qa-person{font-weight:700;font-size:11px;color:var(--ink)}
.qa-affil{font-size:10.5px;color:var(--text-3);font-style:italic}
.t-qa-text{font-size:12px;line-height:1.6;color:var(--text-1);margin-top:3px}
.t-qa-footer{padding:5px 10px;background:var(--surface-3);border-top:1px solid var(--rule-3);display:flex;align-items:center;gap:6px}
.bucket-pill{
  font-size:9.5px;padding:2px 7px;border-radius:999px;
  color:#fff;font-weight:600;white-space:nowrap;
  letter-spacing:.01em;
}
.importance-chip{
  font-size:9.5px;color:var(--text-3);
  background:var(--surface-1);
  padding:2px 7px;border-radius:999px;
  border:1px solid var(--rule-2);
}

/* Sentence tokens */
.s-tok{
  border-radius:2px;padding:0 1px;
  cursor:pointer;
  border-bottom:1.5px solid transparent;
  transition:opacity .1s,background .1s;
  font-size:inherit;line-height:inherit;
}
.s-tok:hover{opacity:.8}
.s-tok.qa-sent{cursor:default}

/* Included / candidate / excluded */
.s-tok.s-incl{
  background:var(--positive-soft);
  border-bottom-color:rgba(31,111,63,.55);
  color:var(--text-1);
}
.s-tok.s-cand{
  background:var(--candidate-soft);
  border-bottom-color:rgba(177,112,21,.5);
  color:var(--text-1);
}
.s-tok.s-ctx{background:transparent;border-bottom-color:transparent;color:var(--text-2)}
.s-tok.s-ctx:hover{opacity:.9}
.s-tok.s-excl{background:transparent;border-bottom-color:transparent;color:var(--text-3)}
.s-tok.s-excl:hover{opacity:.65}

/* Group bullet separator */
.t-gbullet{display:inline;color:var(--text-3);font-size:11px;margin:0 2px;user-select:none;vertical-align:middle;opacity:.6}

/* QA numbered container */
.t-qa-num-label{
  font-size:9.5px;font-weight:700;color:var(--text-3);
  padding:8px 14px 3px;
  text-transform:uppercase;letter-spacing:.12em;
}

/* Cross-highlight: flash sentence in report panel */
.s-tok.s-highlight{
  outline:2px solid var(--selection);outline-offset:1px;
  background:var(--selection-soft)!important;border-radius:3px;
  animation:s-flash .6s ease-out;
}
@keyframes s-flash{
  0%{outline-color:var(--selection);background:var(--selection-soft)}
  100%{outline-color:var(--selection);background:var(--selection-soft)}
}
/* Persistent single-finding selection — click a q-card in the report or a
   sentence in the transcript to mark one finding. Border only, no fill. */
.q-card.q-card-selected{
  box-shadow:0 0 0 2px #2563EB;
  border-radius:4px;
  transition:box-shadow .2s, background .2s;
}
/* Persistent category highlight on the report side — every finding belonging
   to state.highlighted_bucket_id gets the blue fill plus the same blue border
   as a single selection, matching the category-focus treatment in the
   transcript pane. */
.q-card.q-card-cat-highlighted{
  background:#DBEAFE;
  box-shadow:0 0 0 2px #2563EB;
  border-radius:4px;
  transition:box-shadow .2s, background .2s;
}
/* The stock ::before is a grey gutter bar; hide it under the blue fill/border
   so it doesn't read as a stray grey smudge inside the highlighted region. */
.q-card.q-card-selected::before,
.q-card.q-card-cat-highlighted::before{display:none}

/* ════════════════════════════════════════════════════════════════
   SENTENCE POPOVER — condensed layout
   Header row = review-status icon toggles + importance chip.
   Body       = Top Matches list + "show all" expander.
   The quoted finding text and review-status footer were removed; the
   "Create custom classification" form was lifted out to a dedicated
   header button so the popover stays compact.
   ════════════════════════════════════════════════════════════════ */
#s-popover{
  position:fixed;z-index:9999;
  background:var(--paper-2);
  border:1px solid var(--rule);
  border-radius:var(--r-md);
  box-shadow:var(--shadow-lg);
  width:320px;max-width:min(320px,calc(100vw - 16px));
  display:none;overflow:hidden;
}
#s-pop-header{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:8px 10px 8px 8px;
  background:linear-gradient(to bottom,var(--surface-3),var(--paper-2));
  border-bottom:1px solid var(--rule-3);
}
#s-pop-status-icons{display:inline-flex;align-items:center;gap:3px}
.s-status-icon{
  display:inline-flex;align-items:center;justify-content:center;
  width:30px;height:28px;padding:0;
  background:transparent;border:1px solid transparent;border-radius:var(--r-sm);
  color:var(--text-3);
  cursor:pointer;
  transition:background .15s,color .15s,border-color .15s;
}
.s-status-icon:hover{background:var(--paper-2);color:var(--ink);border-color:var(--rule-2)}
/* Per-status active colors reinforce semantic meaning: green = promoted
   to report, amber = held as candidate context, red = explicitly rejected. */
.s-status-icon[data-status="selected"].active{
  background:rgba(34,197,94,.14);color:#16A34A;border-color:rgba(34,197,94,.34);
}
.s-status-icon[data-status="candidate"].active{
  background:rgba(245,158,11,.14);color:#D97706;border-color:rgba(245,158,11,.34);
}
.s-status-icon[data-status="rejected"].active{
  background:rgba(239,68,68,.12);color:#DC2626;border-color:rgba(239,68,68,.3);
}
.s-status-icon.disabled,.s-status-icon:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.s-status-icon svg{display:block}
#s-pop-importance{
  font-size:10px;font-weight:700;
  letter-spacing:.03em;
  color:var(--text-2);
  background:var(--paper);
  padding:4px 9px;border-radius:999px;
  border:1px solid var(--rule-2);
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
  box-shadow:0 1px 0 rgba(15,27,45,.04);
}
#s-pop-importance .s-score-num{color:var(--ink);margin-left:2px}
#s-pop-importance.hidden{display:none}
#s-pop-readonly-note{
  padding:10px 14px;
  font-size:11.5px;color:var(--text-2);font-style:italic;
  line-height:1.55;
  border-top:1px solid var(--rule-3);
  background:var(--surface-3);
}
#s-pop-readonly-note.hidden{display:none}
#s-pop-scores{max-height:380px;overflow-y:auto}
#s-pop-scores.hidden{display:none}
.s-score-section{padding:6px 0 4px}
.s-score-row{
  display:flex;align-items:center;gap:10px;
  padding:7px 12px 7px 14px;
  cursor:pointer;
  position:relative;
  transition:background .1s;
}
.s-score-row:hover{background:var(--surface-1)}
/* Current (primary) bucket gets the soft accent fill plus an inset colored
   bar on the left edge — the bar uses the bucket's own accent so the visual
   match between transcript highlight and popover row is obvious. */
.s-score-row.current{
  background:var(--accent-soft);
  box-shadow:inset 3px 0 0 var(--cur-accent,var(--accent));
}
.s-score-row.readonly{cursor:default}
.s-score-row.readonly:hover{background:transparent}
.s-score-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 2px var(--paper-2)}
.s-score-main{flex:1;min-width:0}
.s-score-name{font-size:12.5px;color:var(--ink);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-score-val{font-size:11px;font-weight:700;color:var(--text-3);min-width:28px;text-align:right;font-variant-numeric:tabular-nums}
.s-score-check{font-size:13px;color:#16A34A;min-width:12px;font-weight:700}
.s-expand-btn{
  margin:6px 12px 8px;padding:7px 12px;
  border:1px solid var(--rule);border-radius:999px;
  background:var(--paper-2);color:var(--text-2);
  font-size:11px;font-weight:600;letter-spacing:.01em;
  cursor:pointer;width:calc(100% - 24px);
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  transition:background .15s,color .15s,border-color .15s;
}
.s-expand-btn:hover{background:var(--surface-1);color:var(--ink);border-color:var(--rule-2)}
.s-expand-btn::after{
  content:'';
  width:6px;height:6px;
  border-right:1.5px solid currentColor;
  border-bottom:1.5px solid currentColor;
  transform:rotate(45deg) translateY(-2px);
  opacity:.7;
  transition:transform .15s;
}
.s-expand-btn.expanded::after{transform:rotate(-135deg) translateY(2px)}
#s-pop-all{display:none}

/* ════════════════════════════════════════════════════════════════
   REPORT PANEL — header + paper
   ════════════════════════════════════════════════════════════════ */
#report-panel{flex:1;display:flex;flex-direction:column;background:var(--paper);min-width:0}
#report-panel{position:relative}

#report-header{
  flex-shrink:0;
  min-height:var(--top-bar-h);
  background:var(--ink);
  border-bottom:1px solid var(--ink-2);
  padding:0 22px;
  display:flex;align-items:center;justify-content:flex-end;
  position:relative;
}
#report-header::before{
  content:"";
  position:absolute;
  right:100%;top:0;bottom:0;
  width:5px;
  background:var(--ink);
  pointer-events:none;
}
.report-actions{display:flex;gap:6px;align-items:center}
.hdr-menu-caret{margin-left:6px;width:10px;height:10px;display:inline-block;vertical-align:middle;opacity:.85}
.hdr-menu-caret path{stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
/* Icon-only dropdown trigger — the Settings and Save menus are compact gear
   and disk glyphs. Square padding keeps the hit target balanced, and the SVG
   inherits currentColor so it picks up the existing header button color. */
.btn.btn-icon{padding:7px 8px;line-height:0}
.btn.btn-icon svg{display:block;width:16px;height:16px}
.report-actions .btn{
  color:var(--text-on-ink);
  border-color:rgba(251,248,239,.18);
  background:rgba(251,248,239,.04);
}
.report-actions .btn:hover{
  background:rgba(251,248,239,.1);
  color:#fff;
  border-color:rgba(251,248,239,.32);
}

/* Badge buttons */
.btn-badge{position:relative;overflow:visible}
.btn-badge.btn-disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.badge-count{
  position:absolute;top:-6px;right:-6px;
  background:var(--accent);color:#fff;
  font-size:10px;font-weight:700;
  min-width:18px;height:18px;border-radius:9px;
  display:inline-flex;align-items:center;justify-content:center;
  padding:0 5px;
  box-shadow:0 1px 3px rgba(0,0,0,.4);
  line-height:1;letter-spacing:0;
  border:1.5px solid var(--ink);
}
.badge-count.hidden{display:none}

/* ════════════════════════════════════════════════════════════════
   MODAL
   ════════════════════════════════════════════════════════════════ */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(15,27,45,.5);
  backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
  z-index:9998;
  align-items:flex-start;justify-content:center;
  padding:56px 20px 20px;
}
.modal-overlay.active{display:flex}
.modal-box{
  background:var(--paper-2);
  border-radius:var(--r-lg);
  box-shadow:var(--shadow-lg);
  width:min(780px,100%);
  max-height:calc(100vh - 80px);
  display:flex;flex-direction:column;overflow:hidden;
  border:1px solid var(--rule-2);
}
.modal-header{
  flex-shrink:0;
  padding:18px 22px 16px;
  border-bottom:1px solid var(--rule-2);
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  background:var(--surface-3);
}
.modal-title{font-family:var(--font-serif);font-size:18px;font-weight:700;color:var(--ink);letter-spacing:.005em}
.modal-subtitle{font-size:11.5px;color:var(--text-2);margin-top:4px;line-height:1.5;max-width:620px}
.modal-close{
  background:none;border:none;
  font-size:22px;color:var(--text-2);
  cursor:pointer;line-height:1;
  padding:2px 8px;border-radius:var(--r-sm);
  flex-shrink:0;transition:background .15s,color .15s;
}
.modal-close:hover{background:var(--surface-1);color:var(--ink)}
.modal-body{flex:1;overflow-y:auto;padding:20px 22px;background:var(--paper-2)}
.modal-empty{font-size:12.5px;color:var(--text-3);font-style:italic;text-align:center;padding:24px}
/* Narrower variant — used by the Add Category modal so a two-field form
   doesn't float in a wide container. */
.modal-box-sm{width:min(460px,100%)}

/* Add Category modal form */
.add-cat-form{display:flex;flex-direction:column;gap:14px}
.add-cat-field{display:flex;flex-direction:column;gap:6px}
.add-cat-label{font-size:11.5px;font-weight:700;color:var(--text-2);letter-spacing:.02em}
.add-cat-optional{font-weight:500;color:var(--text-3);font-size:10.5px;text-transform:none;letter-spacing:0}
.add-cat-field input{
  width:100%;
  border:1px solid var(--rule);
  border-radius:var(--r-sm);
  padding:9px 11px;
  font-size:13px;
  font-family:inherit;
  background:var(--paper-2);color:var(--text-1);
  transition:border-color .15s,box-shadow .15s;
}
.add-cat-field input:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-soft);
}
.add-cat-error{
  font-size:11.5px;color:#B91C1C;
  background:#FEF2F2;border:1px solid #FECACA;
  border-radius:var(--r-sm);
  padding:8px 10px;
}
.add-cat-error.hidden{display:none}
.add-cat-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:4px}

/* Emerging topics toggle bar (used in the proposal modal) */
.emg-bar{
  background:var(--surface-1);
  border:1px solid var(--rule-2);
  border-radius:var(--r-md);
  padding:12px 14px;margin:0 0 20px;font-size:11.5px;
}
.emg-bar-title{
  font-size:10px;font-weight:700;color:var(--text-3);
  text-transform:uppercase;letter-spacing:.12em;
  margin-bottom:8px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.emg-bar-title-count{color:var(--text-3);font-weight:600;text-transform:none;letter-spacing:0}
.emg-bar-row{display:flex;align-items:center;gap:12px;padding:6px 0}
.emg-bar-row+.emg-bar-row{border-top:1px solid var(--rule-3)}
.emg-bar-main{flex:1;min-width:0;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.emg-bar-label{color:var(--ink);font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.emg-bar-meta{color:var(--text-3);font-size:10.5px;font-weight:500;white-space:nowrap}

/* Report body + page */
#report-body{flex:1;overflow-y:auto;padding:32px 24px 48px;background:var(--paper)}
#report-top-btn{
  position:absolute;right:28px;bottom:28px;z-index:8;
  padding:9px 12px;
  border:1px solid var(--rule-2);
  border-radius:999px;
  background:rgba(255,255,255,.92);
  color:var(--ink);
  font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  box-shadow:var(--shadow-md);
  cursor:pointer;
  transition:background .15s,border-color .15s,color .15s;
}
#report-top-btn:hover{background:var(--surface-3);border-color:var(--rule);color:var(--accent-hover)}
#report-page{
  min-height:calc(100% - 48px);
  max-width:none;
  margin:0 auto;
  position:relative;
  counter-reset:report-section;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:28px;
  background:transparent;
  box-shadow:none;
  padding:0;
}
#report-page::before{display:none}
.rpt-sheet{
  width:min(100%, 1120px);
  background:var(--paper-2);
  border-radius:2px;
  box-shadow:var(--shadow-md);
  position:relative;
  overflow:hidden;
}
.rpt-sheet-portrait{
  width:min(100%, 820px);
  padding:56px 64px 72px;
}
.rpt-sheet-landscape{
  padding:30px 34px 38px;
}
.rpt-sheet-landscape::before{
  content:"";
  position:absolute;
  top:0;left:0;right:0;
  height:3px;
  background:var(--accent);
}
.cm-page-header{
  margin:0 0 20px;
}
.cm-main-title{
  font-family:var(--font-serif);
  font-size:22px;
  font-weight:700;
  line-height:1.2;
  color:var(--ink);
  letter-spacing:.002em;
}
.cm-section-subtitle{
  margin-top:8px;
  font-family:var(--font-serif);
  font-size:12.5px;
  font-style:italic;
  color:var(--text-2);
  line-height:1.55;
}
.cm-table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  border:1px solid var(--rule-2);
  background:var(--paper-2);
}
.cm-table col.cm-col-bank{width:84px}
.cm-table col.cm-col-theme{width:220px}
.cm-table col.cm-col-question-bank{width:84px}
.cm-table th,
.cm-table td{
  border:1px solid var(--rule-2);
  padding:10px 12px;
  vertical-align:top;
}
.cm-table th{
  background:var(--ink);
  color:var(--text-on-ink);
  font-family:var(--font-sans);
  font-size:11.5px;
  font-weight:700;
  letter-spacing:.04em;
  text-align:left;
}
.cm-table .cm-bank-cell{
  text-align:center;
  font-family:var(--font-sans);
  font-size:11.5px;
  font-weight:700;
  color:var(--ink);
  vertical-align:middle;
  letter-spacing:.06em;
}
.cm-table .cm-theme-cell{
  font-family:var(--font-serif);
  font-size:13px;
  font-weight:700;
  color:var(--ink);
  line-height:1.45;
}
.cm-outlook-cell{
  font-size:12.5px;
  line-height:1.6;
}
.cm-outlook-category + .cm-outlook-category{
  margin-top:12px;
  padding-top:10px;
  border-top:1px solid var(--rule-3);
}
.cm-category-title{
  font-family:var(--font-serif);
  font-size:13px;
  font-weight:700;
  color:var(--ink);
  margin:0 0 4px;
}
.cm-category-headline{
  margin:0 0 6px;
  font-family:var(--font-serif);
  font-size:12px;
  font-style:italic;
  color:var(--text-2);
  line-height:1.55;
}
.cm-finding.q-card,
.cm-question-item.q-card{
  margin:0;
  padding:2px 44px 2px 0;
  background:none;
  border:none;
  border-radius:0;
  box-shadow:none;
  position:relative;
}
.cm-finding.q-card + .cm-finding.q-card,
.cm-question-item.q-card + .cm-question-item.q-card{
  margin-top:6px;
}
.cm-finding.q-card::before,
.cm-question-item.q-card::before{
  display:none;
}
.cm-finding.q-card.q-card-selected,
.cm-question-item.q-card.q-card-selected{
  background:var(--selection-soft);
  box-shadow:inset 3px 0 0 var(--selection);
}
.cm-finding.q-card.q-card-cat-highlighted,
.cm-question-item.q-card.q-card-cat-highlighted{
  background:rgba(178,90,30,.06);
  box-shadow:inset 3px 0 0 var(--accent-line);
}
.cm-table .q-card-header{
  position:absolute;
  top:2px;
  right:0;
  display:flex;
  align-items:center;
  gap:2px;
  opacity:0;
  transition:opacity .12s;
}
.cm-table .q-card:hover .q-card-header,
.cm-table .q-card.q-card-selected .q-card-header{
  opacity:1;
}
.cm-table .q-edit,
.cm-table .q-revert,
.cm-table .q-del{
  width:22px;
  height:22px;
  padding:0;
  border:none;
  background:none;
  color:var(--text-3);
}
.cm-table .q-edit:hover,
.cm-table .q-revert:hover,
.cm-table .q-del:hover{
  color:var(--ink);
}
.cm-table .q-hdr-spacer,
.cm-table .drag-handle,
.cm-table .fmt-toggle{display:none!important}
.cm-score{
  display:inline-block;
  margin-right:6px;
  font-size:12px;
  font-weight:700;
  color:#002060;
}
.cm-quote-line{
  display:block;
}
.cm-quote-mark{
  font-size:12px;
  color:var(--ink);
}
.cm-table .q-text{
  display:inline;
  max-height:none;
  overflow:visible;
  font-family:var(--font-serif);
  font-size:13.5px;
  line-height:1.68;
  letter-spacing:.003em;
  color:var(--text-1);
}
.cm-inline-text{display:inline}
.cm-table .q-text p{
  display:inline;
  margin:0;
}
.cm-table .q-text p + p::before{
  content:" ";
}
.cm-table .s-tok{
  background:none!important;
  border-bottom:none!important;
  padding:0!important;
  border-radius:0!important;
  box-shadow:none!important;
}
.cm-table .s-highlight{
  background:rgba(37,99,235,.12)!important;
  outline:none!important;
}
.cm-question-list{
  display:grid;
  gap:6px;
}
.cm-question-item{
  display:flex;
  align-items:flex-start;
  gap:8px;
}
.cm-question-bullet{
  flex-shrink:0;
  width:10px;
  padding-top:3px;
  font-size:12px;
  line-height:1;
  color:var(--ink);
}
.cm-question-body{
  min-width:0;
  flex:1;
}
.cm-empty{
  padding:18px 0 6px;
  font-size:12px;
  font-style:italic;
  color:var(--text-3);
}

/* Banner cover page — shown at the top of the report paper when the banner
   toggle is on. The negative margin lets the image run to the page edges while
   the L1 heading below keeps its normal text column. */
.rpt-cover{
  margin:-8px -64px 28px;
  padding:0 0 22px;
  text-align:center;
  border-bottom:1px solid var(--rule);
}
.rpt-cover img{
  display:block;
  width:100%;
  height:auto;
  max-width:none;
  max-height:170px;
  object-fit:contain;
  object-position:center;
  margin:0 auto;
}
.rpt-cover-copy{margin:18px auto 0;max-width:920px;padding:0 52px}
.rpt-cover-meta{
  font-family:var(--font-sans);
  font-size:11.5px;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--text-3);
  display:inline-block;
  padding:8px 22px;
  border-top:1px solid var(--rule);
  border-bottom:1px solid var(--rule);
  min-width:240px;
}
.rpt-cover-title{
  font-family:var(--font-serif);
  font-size:32px;
  font-weight:700;
  line-height:1.15;
  letter-spacing:-.005em;
  color:var(--ink);
  margin-top:18px;
  padding-bottom:16px;
  position:relative;
}
.rpt-cover-title::after{
  content:"";
  position:absolute;
  left:50%;bottom:0;
  width:48px;height:2px;
  transform:translateX(-50%);
  background:var(--accent);
}
.rpt-cover-noimg{padding-top:18px}

/* Table of contents — editorial list with dotted leaders. Page numbers are
   populated by `target-counter` in print only; on screen they stay empty so
   the rows read as a clean navigation list. */
.rpt-toc{
  margin:0 0 32px;
  padding:0 0 24px;
  border-bottom:1px solid var(--rule);
}
.rpt-toc-title{
  font-family:var(--font-serif);
  font-size:18px;font-weight:700;
  color:var(--ink);
  margin:0 0 12px;
  padding:0 0 8px;
  border-bottom:1px solid var(--rule-2);
  letter-spacing:.005em;
}
.rpt-toc-list{list-style:none;padding:0;margin:0;counter-reset:toc-section}
.rpt-toc-sublist{list-style:none;padding-left:0;margin:2px 0 10px}
.rpt-toc-l1{counter-increment:toc-section;counter-reset:toc-bucket 0}
.rpt-toc-l2{counter-increment:toc-bucket}
.rpt-toc-l1>a,.rpt-toc-l2>a{
  display:flex;align-items:baseline;gap:10px;
  padding:3px 0;
  text-decoration:none;
  font-family:var(--font-serif);
  color:var(--text-1);
  transition:color .1s;
}
.rpt-toc-l1>a{font-weight:700;font-size:14px;color:var(--ink);padding:6px 0}
.rpt-toc-l2>a{font-weight:400;font-size:12.5px;color:var(--text-2);padding-left:32px}
.rpt-toc-l1>a:hover,.rpt-toc-l2>a:hover{color:var(--accent)}
.rpt-toc-l1>a::before{
  content:counter(toc-section,upper-roman) ".";
  font-family:var(--font-sans);
  font-weight:700;
  font-size:10.5px;
  letter-spacing:.14em;
  color:var(--accent);
  min-width:32px;
  flex-shrink:0;
  font-variant-numeric:tabular-nums;
}
.rpt-toc-l2>a::before{
  content:counter(toc-bucket,decimal-leading-zero);
  font-family:var(--font-sans);
  font-weight:600;
  font-size:10px;
  letter-spacing:.06em;
  color:var(--text-3);
  min-width:24px;
  flex-shrink:0;
  font-variant-numeric:tabular-nums;
}
.rpt-toc-label{flex-shrink:1;min-width:0}
.rpt-toc-leader{
  flex:1;min-width:24px;
  border-bottom:1px dotted var(--rule);
  transform:translateY(-4px);
  opacity:.6;
}
.rpt-toc-page{
  font-variant-numeric:tabular-nums;
  color:var(--text-3);
  font-size:11.5px;
  min-width:18px;text-align:right;
}
/* On screen the page numbers have no meaning — hide the trailing span and
   the leader so rows render as clean clickable lines. */
@media screen{
  .rpt-toc-page{display:none}
  .rpt-toc-leader{display:none}
}

/* L1 section heading. Body counters are scoped to #report-page so the
   ordinal restarts each time the report is re-rendered. */
.rpt-l1{
  font-family:var(--font-serif);
  font-size:22px;font-weight:700;
  color:var(--ink);
  padding:6px 0 10px;
  margin:0 0 14px;
  border-bottom:1px solid var(--rule);
  text-transform:none;
  letter-spacing:0;
  line-height:1.25;
  counter-increment:report-section;
  counter-reset:report-bucket 0;
}
.rpt-l1::before{
  content:counter(report-section,upper-roman) ".";
  font-family:var(--font-sans);
  font-size:11px;
  font-weight:700;
  letter-spacing:.18em;
  color:var(--accent);
  margin-right:14px;
  padding-right:14px;
  border-right:1px solid var(--rule);
  display:inline-block;
  vertical-align:middle;
  position:relative;
  top:-3px;
  font-variant-numeric:tabular-nums;
}
.rpt-l1:not(:first-child){margin-top:32px}

/* L2 bucket heading. Bucket counter restarts on each .rpt-l1 (declared
   above) so each section's buckets begin at 01. */
.bkt-section{margin-bottom:18px;overflow:hidden;counter-increment:report-bucket}
.bkt-header{
  display:flex;align-items:flex-start;gap:12px;
  padding:8px 0 10px;
  cursor:pointer;user-select:none;
  border-bottom:1px solid var(--rule-3);
  margin-bottom:10px;
}
.bkt-bar{
  width:3px;min-height:28px;
  border-radius:2px;flex-shrink:0;
  margin-top:5px;
}
.bkt-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.bkt-name-row{display:flex;align-items:center;gap:10px;width:100%;min-width:0}
.bkt-name-row::before{
  content:counter(report-bucket,decimal-leading-zero);
  font-family:var(--font-sans);
  font-size:11px;
  font-weight:700;
  letter-spacing:.06em;
  color:var(--accent);
  flex-shrink:0;
  font-variant-numeric:tabular-nums;
  align-self:baseline;
  padding-top:3px;
}
.bkt-name-input{
  font-family:var(--font-serif);
  font-size:16px;font-weight:700;
  color:var(--ink);
  background:transparent;border:none;outline:none;
  padding:0;cursor:text;display:block;
  letter-spacing:.005em;
  line-height:1.3;
  /* field-sizing auto-shrinks the input to its text so the highlighter button
     sits directly after the title rather than floating at the row's far edge.
     Long titles still respect the row width via the max-width + flex-shrink
     below — overflow collapses gracefully via ellipsis-free truncation. */
  field-sizing:content;
}
.bkt-name-row .bkt-name-input{flex:0 1 auto;min-width:0;max-width:100%}
.bkt-name-input:focus{background:var(--surface-1);border-radius:3px;padding:2px 6px;margin:-2px -6px}
.bkt-headline{
  font-size:12px;color:var(--text-2);
  font-style:italic;line-height:1.5;
  display:block;word-wrap:break-word;
  font-family:var(--font-serif);
}
.bkt-chevron{width:14px;height:14px;color:var(--text-3);transition:transform .15s;flex-shrink:0;margin-top:8px;opacity:.6}
.bkt-chevron path{stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.bkt-chevron.closed{transform:rotate(0deg)}
.bkt-chevron.open{transform:rotate(180deg)}
.bkt-quotes{padding:2px 0 2px 15px}
.bkt-bank-group + .bkt-bank-group{
  margin-top:14px;
  padding-top:10px;
  border-top:1px solid var(--rule-3);
}
.bkt-bank-label{
  display:flex;align-items:center;gap:8px;
  margin:4px 0 10px;
  font-size:10px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;
  color:var(--text-3);
}
.bkt-bank-label-name{
  font-size:12px;font-weight:600;
  letter-spacing:0;text-transform:none;
  color:var(--ink);
}
.bkt-bank-quotes{display:block}

/* Emerging topic review (inside modal) */
.emg-review-panel{border:1px solid var(--rule-2);border-radius:var(--r-md);background:var(--paper-2);overflow:hidden}
.emg-review-header{padding:14px 16px;border-bottom:1px solid var(--rule-2);background:var(--surface-3);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.emg-review-title{font-family:var(--font-serif);font-size:16px;font-weight:700;color:var(--ink)}
.emg-review-subtitle{font-size:11.5px;color:var(--text-2);margin-top:3px;max-width:620px;line-height:1.5}
.emg-review-pill{font-size:10.5px;font-weight:700;color:var(--positive);background:var(--positive-soft);border-radius:999px;padding:4px 10px;white-space:nowrap}
.emg-review-grid{display:grid;gap:10px;padding:14px}
.emg-review-card{border:1px solid var(--rule-2);border-radius:var(--r-md);background:var(--surface-3);padding:14px}
.emg-review-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.emg-review-card-title{font-family:var(--font-serif);font-size:14px;font-weight:700;color:var(--ink)}
.emg-review-card-subtitle{font-size:11.5px;color:var(--text-3);margin-top:4px}
.emg-review-card-summary{font-size:12.5px;color:var(--text-1);line-height:1.6;margin-top:10px;font-family:var(--font-serif)}
.emg-review-card-actions{display:flex;justify-content:flex-end;margin-top:12px}

/* Config review */
.cfg-review-drawer{margin-top:14px;border:1px solid var(--rule-2);border-radius:var(--r-md);background:var(--paper-2);overflow:hidden}
.cfg-review-drawer summary{list-style:none;cursor:pointer;padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;background:var(--surface-3)}
.cfg-review-drawer summary::-webkit-details-marker{display:none}
.cfg-review-title{font-family:var(--font-serif);font-size:16px;font-weight:700;color:var(--ink)}
.cfg-review-subtitle{font-size:11.5px;color:var(--text-2);margin-top:3px;max-width:620px;line-height:1.5}
.cfg-review-pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.cfg-review-pill{font-size:10.5px;font-weight:700;color:var(--text-2);background:var(--surface-1);border-radius:999px;padding:4px 10px;white-space:nowrap;border:1px solid var(--rule-2)}
.cfg-review-body{padding:16px}
.cfg-review-section+.cfg-review-section{margin-top:18px}
.cfg-review-section h3{font-family:var(--font-serif);font-size:13px;font-weight:700;color:var(--ink);margin:0 0 10px}
.cfg-review-table{width:100%;border-collapse:collapse;font-size:11.5px}
.cfg-review-table th,.cfg-review-table td{border:1px solid var(--rule-2);padding:9px 10px;text-align:left;vertical-align:top}
.cfg-review-table th{background:var(--surface-3);color:var(--text-2);font-weight:700}
.cfg-review-table td{color:var(--text-1);line-height:1.55}
.cfg-review-empty{font-size:12px;color:var(--text-3);font-style:italic;padding:6px 0}
.cfg-review-detail{margin:0}
.cfg-review-detail summary{list-style:none;cursor:pointer;font-size:11.5px;font-weight:700;color:var(--accent);padding:0;background:none;display:inline-flex}
.cfg-review-detail summary::-webkit-details-marker{display:none}
.cfg-review-detail-body{margin-top:8px}
.cfg-review-note{font-size:11.5px;color:var(--text-2);margin-top:10px}
.cfg-review-evidence{margin-top:10px;display:grid;gap:6px}
.cfg-review-evidence-item{font-size:11.5px;line-height:1.55;color:var(--text-1);background:var(--surface-3);border-radius:var(--r-sm);padding:9px 11px;border-left:3px solid var(--rule)}
.cfg-config-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:11.5px}
.cfg-config-table th,.cfg-config-table td{border:1px solid var(--rule-2);padding:8px 9px;text-align:left;vertical-align:top}
.cfg-config-table th{width:140px;background:var(--surface-3);color:var(--text-2);font-weight:700}
.cfg-config-table td{white-space:pre-wrap}
.cfg-review-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
.cfg-review-help{font-size:11.5px;color:var(--text-2);line-height:1.6;margin:2px 0 12px}
.cfg-review-help code{background:var(--surface-1);padding:2px 6px;border-radius:3px;font-size:11px;font-family:ui-monospace,"SF Mono",Menlo,monospace}

/* Pass-1 update cards */
.cfg-update-list{display:grid;gap:12px}
.cfg-update-card{border:1px solid var(--rule-2);border-radius:var(--r-md);background:var(--surface-3);padding:14px}
.cfg-update-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}
.cfg-update-title{font-family:var(--font-serif);font-size:14px;font-weight:700;color:var(--ink)}
.cfg-update-reason{font-size:11.5px;color:var(--text-1);line-height:1.6;margin-bottom:12px}
.cfg-update-diff{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cfg-update-col-label{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}
.cfg-update-col-body{font-size:11.5px;line-height:1.6;color:var(--text-1);background:var(--paper-2);border:1px solid var(--rule-2);border-radius:var(--r-sm);padding:8px 10px;min-height:44px;font-family:var(--font-serif);white-space:pre-wrap}
.cfg-update-col-body-new{background:var(--positive-soft);border-color:rgba(31,111,63,.3);color:#0D5C30}
.cfg-copy-btn.btn-copied{background:var(--positive);border-color:var(--positive);color:#fff}

/* Pass-2 emerging cards */
.cfg-emerging-list{display:grid;gap:12px}
.cfg-emerging-card{border:1px solid var(--rule-2);border-radius:var(--r-md);background:var(--surface-3);padding:14px}
.cfg-emerging-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.cfg-emerging-title{font-family:var(--font-serif);font-size:14px;font-weight:700;color:var(--ink)}
.cfg-emerging-meta{font-size:10.5px;color:var(--text-3);margin-top:4px}
.cfg-emerging-reason{font-size:11.5px;color:var(--text-1);line-height:1.6;margin:10px 0 6px}
.cfg-emerging-row{margin-top:6px}
.cfg-emerging-row>summary{font-size:11.5px;font-weight:700;color:var(--accent);cursor:pointer;list-style:none;display:inline-flex}
.cfg-emerging-row>summary::-webkit-details-marker{display:none}

/* Enable toggle */
.cfg-enable-toggle{display:inline-flex;align-items:center;gap:8px;font-size:11.5px;font-weight:700;color:var(--ink);cursor:pointer;user-select:none;white-space:nowrap}
.cfg-enable-toggle input{appearance:none;-webkit-appearance:none;width:30px;height:16px;background:var(--rule);border-radius:9px;position:relative;cursor:pointer;transition:background .15s;flex-shrink:0;margin:0}
.cfg-enable-toggle input::after{content:"";position:absolute;top:1px;left:1px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.cfg-enable-toggle input:checked{background:var(--positive)}
.cfg-enable-toggle input:checked::after{transform:translateX(14px)}
.cfg-enable-toggle input:disabled{cursor:default}

/* Category highlight — sits inside .bkt-name-row, right after the name input. */
.bkt-focus{
  background:none;
  border:1px solid transparent;
  color:var(--text-3);
  cursor:pointer;
  padding:4px 6px;border-radius:var(--r-sm);
  line-height:0;flex-shrink:0;
  display:inline-flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s,border-color .15s;
}
.bkt-focus:hover{color:var(--accent);background:var(--accent-soft)}
.bkt-focus.active{color:#5A2A0E;background:var(--accent-soft);border-color:var(--accent)}
.bkt-focus svg{display:block;pointer-events:none}
#tp-highlight-pill{
  display:none;position:absolute;top:10px;right:14px;z-index:10;
  align-items:center;gap:4px;
  padding:4px 4px 4px 11px;
  background:#DBEAFE;
  border:1px solid #93C5FD;
  border-radius:999px;
  font-size:11px;color:#1E3A8A;font-weight:600;
  letter-spacing:.02em;
  box-shadow:0 2px 8px rgba(37,99,235,.18);
}
#tp-highlight-pill.active{display:inline-flex}
#tp-highlight-pill .tp-pill-clear{
  background:none;border:none;color:#1E3A8A;cursor:pointer;
  font-size:13px;line-height:1;padding:0;width:16px;height:16px;
  display:inline-flex;align-items:center;justify-content:center;
  border-radius:999px;
}
#tp-highlight-pill .tp-pill-clear:hover{background:rgba(30,58,138,.12);color:#1E3A8A}
.s-tok.tp-highlighted{
  background:#DBEAFE!important;
  border-left:none!important;
  padding-left:0!important;
  margin-left:0!important;
  border-radius:3px;
  box-decoration-break:clone;
  -webkit-box-decoration-break:clone;
}
/* Within a highlighted category, only sentences that are actually part of a
   report finding get a thick blue underline. This excludes QA question
   context, which can be status=selected but is never itself a finding card. */
.s-tok.tp-highlighted.tp-report-included{
  border-bottom-color:transparent;
  box-shadow:inset 0 -4px 0 var(--selection);
}
/* Single-finding selection on transcript sentences — outline (not border)
   so the inline text flow isn't pushed around. Mirrors the blue border on
   the corresponding q-card in the report preview, giving the user one
   visual "this is your selected finding" signal across both panes. */
.s-tok.tp-sent-selected{
  outline:2px solid #2563EB;
  outline-offset:1px;
  border-radius:3px;
}

/* ════════════════════════════════════════════════════════════════
   QUOTE CARDS
   ════════════════════════════════════════════════════════════════ */
.q-card{
  background:transparent;
  border:none;
  border-radius:0;
  margin-bottom:14px;
  overflow:visible;
  position:relative;
  padding-left:18px;
}
.q-card::before{
  content:"";
  position:absolute;
  left:0;top:8px;bottom:8px;
  width:2px;
  background:var(--rule);
  border-radius:2px;
}
.q-card:hover::before{background:var(--accent-line)}
.q-card.q-card-batch-inner{margin-bottom:8px}
.q-card.q-card-batch-inner::before{bottom:4px}
.q-card.q-card-batch-end{margin-bottom:14px}
.q-card.sortable-ghost{opacity:.4;background:var(--surface-1)}
.q-card.sortable-chosen{box-shadow:0 6px 20px rgba(15,27,45,.14);background:var(--surface-3)}
.q-card-header{
  padding:2px 0 6px;
  display:flex;align-items:center;gap:8px;
  background:transparent;
  border-bottom:none;
}
.drag-handle{color:var(--rule);cursor:grab;font-size:14px;flex-shrink:0;user-select:none;transition:color .15s}
.q-card:hover .drag-handle{color:var(--text-3)}
.drag-handle:active{cursor:grabbing}
.q-attrib{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:12px;
  font-family:var(--font-sans);
  font-size:9.5px;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--text-3);
  font-style:normal;
  padding:8px 0 0;
}
.q-attrib::before{
  content:"";
  display:block;
  width:48px;height:1px;
  background:var(--rule-2);
  flex-shrink:0;
}
.attrib-off .q-attrib{display:none}
.q-hdr-spacer{flex:1}
.q-del{
  background:none;border:none;
  color:var(--rule);
  cursor:pointer;font-size:16px;
  padding:0 4px;line-height:1;flex-shrink:0;
  transition:color .15s;
}
.q-card:hover .q-del{color:var(--text-3)}
.q-del:hover{color:var(--danger)!important}

/* Edit / Revert buttons (mirrors .q-del look) */
.q-edit,.q-revert{
  background:none;border:none;
  color:var(--rule);
  cursor:pointer;
  padding:0 4px;line-height:1;flex-shrink:0;
  display:inline-flex;align-items:center;justify-content:center;
  transition:color .15s;
}
.q-card:hover .q-edit,
.q-card:hover .q-revert{color:var(--text-3)}
.q-edit:hover{color:var(--accent)!important}
.q-revert:hover{color:var(--accent)!important}

/* "edited" pill — signals that the finding text is user-customised */
.q-edited-badge{
  font-size:9.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--accent);
  background:var(--accent-soft);
  padding:2px 6px;border-radius:3px;
  white-space:nowrap;
}

/* Inline edit UI */
.q-text.q-text-editing{max-height:none;overflow:visible}
.q-edit-area{
  width:100%;box-sizing:border-box;
  font-family:var(--font-serif);
  font-size:14px;line-height:1.7;color:var(--text-1);
  padding:8px 10px;
  border:1px solid var(--rule);
  border-radius:4px;
  background:var(--paper-2);
  resize:vertical;min-height:80px;
  letter-spacing:.003em;
}
.q-edit-area:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
.q-edit-actions{
  display:flex;justify-content:flex-end;gap:6px;
  padding:6px 0 0;
}
.q-edit-cancel,.q-edit-save{
  font-size:11.5px;font-weight:500;
  padding:4px 12px;border-radius:3px;cursor:pointer;
  border:1px solid var(--rule);
  background:var(--paper-2);color:var(--text-2);
  transition:background .15s,color .15s,border-color .15s;
}
.q-edit-cancel:hover{background:var(--surface-1)}
.q-edit-save{background:var(--accent);color:#fff;border-color:var(--accent)}
.q-edit-save:hover{background:var(--accent-hover);border-color:var(--accent-hover)}

/* Summarize toggle */
.fmt-toggle{display:inline-flex;align-items:center;gap:7px;font-size:10.5px;color:var(--text-3);cursor:pointer;user-select:none;white-space:nowrap;font-weight:500}
.fmt-toggle input{appearance:none;-webkit-appearance:none;width:24px;height:13px;background:var(--rule);border-radius:7px;position:relative;cursor:pointer;transition:background .15s;flex-shrink:0}
.fmt-toggle input::after{content:"";position:absolute;top:1px;left:1px;width:11px;height:11px;background:#fff;border-radius:50%;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.fmt-toggle input:checked{background:var(--accent)}
.fmt-toggle input:checked::after{transform:translateX(11px)}

/* Quote body text */
.q-text{
  padding:0;
  font-family:var(--font-serif);
  font-size:14px;line-height:1.7;
  color:var(--text-1);
  max-height:240px;overflow-y:auto;
  letter-spacing:.003em;
}
.q-text p{margin-bottom:8px}
.q-text p:last-child{margin-bottom:0}
.q-text .s-tok{background:none!important;border-bottom:none!important;color:inherit!important;padding:0!important;cursor:default}
.q-text .s-tok:hover{opacity:1}
.q-expand-btn{
  font-size:11px;color:var(--accent);cursor:pointer;
  padding:6px 0;display:block;text-align:left;
  background:none;border:none;width:auto;
  font-weight:600;
  margin-top:4px;
  border-top:none;
  letter-spacing:.02em;
}
.q-expand-btn:hover{color:var(--accent-hover)}

/* QA conversation context — editorial eyebrow + italic question. The
   "Q" pill belongs to the transcript panel; in the polished report the
   context reads as a small-caps lead-in followed by the analyst's quoted
   question, no UI badge required. */
.qa-card-q{
  padding:0 0 10px;margin-bottom:10px;
  background:transparent;
  border-bottom:none;
  font-size:11.5px;color:var(--text-3);
}
.qa-card-q-eyebrow{
  display:flex;
  align-items:center;
  gap:10px;
  font-family:var(--font-sans);
  font-size:9.5px;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--text-3);
  margin-bottom:6px;
}
.qa-card-q-eyebrow-name{color:var(--text-2)}
.qa-card-q-eyebrow::after{
  content:"";
  flex:1;
  height:1px;
  background:var(--rule-3);
}
.qa-card-q-text{
  font-family:var(--font-serif);
  font-size:13px;color:var(--text-2);
  margin-top:0;line-height:1.65;
  font-style:italic;
}
.qa-card-q-text::before{
  content:"\201C";
  font-size:18px;
  line-height:0;
  color:var(--rule);
  margin-right:4px;
  vertical-align:-2px;
}
.qa-card-q-text::after{
  content:"\201D";
  font-size:18px;
  line-height:0;
  color:var(--rule);
  margin-left:2px;
  vertical-align:-2px;
}

/* ════════════════════════════════════════════════════════════════
   BUTTONS
   ════════════════════════════════════════════════════════════════ */
.btn{
  font-family:var(--font-sans);
  font-size:12px;padding:7px 14px;
  border-radius:var(--r-sm);
  border:1px solid;
  cursor:pointer;font-weight:600;
  transition:background .15s,color .15s,border-color .15s,opacity .15s;
  white-space:nowrap;
  letter-spacing:.005em;
}
.btn:hover{opacity:1}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
.btn-secondary{background:var(--paper-2);color:var(--ink);border-color:var(--rule)}
.btn-secondary:hover{background:var(--surface-1);border-color:var(--rule)}
.btn-sm{font-size:11px;padding:4px 10px}
.btn-ghost{background:transparent;color:var(--text-on-ink-2);border-color:rgba(251,248,239,.2)}
.btn-ghost:hover{background:rgba(251,248,239,.1);color:#fff}

/* Add-to-report menu */
.atr-menu{
  position:fixed;background:var(--paper-2);
  border:1px solid var(--rule);
  border-radius:var(--r-md);
  box-shadow:var(--shadow-lg);
  z-index:9999;padding:6px;min-width:220px;
}
.atr-item{padding:9px 14px;cursor:pointer;font-size:12.5px;display:flex;align-items:center;gap:10px;border-radius:var(--r-sm);transition:background .1s}
.atr-item:hover{background:var(--surface-1)}
.atr-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* Header dropdown menu (Settings / Save) */
.hdr-menu{
  position:fixed;background:var(--paper-2);
  border:1px solid var(--rule);
  border-radius:var(--r-md);
  box-shadow:var(--shadow-lg);
  z-index:9999;padding:6px;min-width:200px;
  color:var(--ink);
}
.hdr-menu-item{
  padding:9px 14px;cursor:pointer;font-size:12.5px;
  display:flex;align-items:center;gap:10px;
  border-radius:var(--r-sm);transition:background .1s;
  color:var(--ink);
}
.hdr-menu-item:hover{background:var(--surface-1)}
.hdr-menu-toggle{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:9px 14px;font-size:12.5px;font-weight:500;color:var(--ink);
  cursor:pointer;user-select:none;
  border-radius:var(--r-sm);transition:background .1s;
}
.hdr-menu-toggle:hover{background:var(--surface-1)}
.hdr-menu-toggle input{
  appearance:none;-webkit-appearance:none;
  width:30px;height:16px;background:var(--rule);
  border-radius:9px;position:relative;cursor:pointer;
  transition:background .15s;flex-shrink:0;margin:0;
}
.hdr-menu-toggle input::after{
  content:"";position:absolute;top:1px;left:1px;
  width:14px;height:14px;background:#fff;
  border-radius:50%;transition:transform .15s;
  box-shadow:0 1px 2px rgba(0,0,0,.2);
}
.hdr-menu-toggle input:checked{background:var(--positive)}
.hdr-menu-toggle input:checked::after{transform:translateX(14px)}

.empty-bucket{padding:24px 16px;text-align:center;color:var(--text-3);font-size:12.5px;font-style:italic}
.in-report-tag{font-size:11px;color:var(--positive);font-weight:600}
.t-block-actions{margin-top:10px;display:flex;gap:8px;align-items:center}

/* ════════════════════════════════════════════════════════════════
   PRINT / PDF
   ════════════════════════════════════════════════════════════════ */
@media print{
  :root{--paper:#fff;--paper-2:#fff}
  @page{margin:20mm 16mm}
  body{background:#fff;color:#14213A;font-family:var(--font-serif)}
  #app-banner{display:none!important}
  #tab-bar{display:none!important}
  #transcript-wrap{display:none!important}
  #tp-resize{display:none!important}
  #report-header{display:none!important}
  #report-top-btn{display:none!important}
  #s-popover{display:none!important}
  .modal-overlay{display:none!important}
  .emg-bar{display:none!important}

  /* Old external banner is suppressed — the redesigned `.rpt-cover` now
     carries the banner image as the first printed page. */
  #banner-wrap{display:none!important}

  /* Banner + TOC share page 1: the cover image sits as a compact masthead
     above the TOC, then the TOC itself forces a page break so the body
     copy starts on page 2. */
  .rpt-cover{
    display:block!important;
    margin:0 0 24px!important;
    padding:0 0 18px!important;
    border:none!important;
    border-bottom:1px solid #D9D0BC!important;
    text-align:center;
    page-break-inside:avoid;
    page-break-after:avoid;break-after:avoid;
  }
  .rpt-cover img{
    width:100%!important;
    height:auto!important;
    max-width:none!important;
    max-height:168px;
    display:block;
    margin:0 auto;
  }
  .rpt-cover-copy{margin:16px auto 0!important;max-width:none!important;padding:0 4px!important}
  .rpt-cover-meta{font-size:11px!important;letter-spacing:.16em!important}
  .rpt-cover-title{font-size:28px!important;margin-top:8px!important}

  /* TOC: ends on its own page; reveal leaders + page numbers. */
  .rpt-toc{
    page-break-after:always;break-after:page;
    page-break-before:avoid;break-before:avoid;
    border-bottom:none;padding:0;margin:0;
  }
  .rpt-toc-title{font-size:22px;margin-bottom:20px;padding-bottom:10px}
  .rpt-toc-leader{display:inline-block!important;flex:1!important;opacity:1!important;border-bottom-color:#B8AD94!important}
  .rpt-toc-page{display:none!important}
  .rpt-toc-l1>a, .rpt-toc-l2>a{color:#14213A!important;text-decoration:none!important}
  /* `target-counter(attr(href), page)` resolves the fragment link to the
     page counter of the target — Chromium/WebKit populate this at print time.
     Kept as a single ::after on the anchor so the leader still sits to its
     left inside the flex row. */
  .rpt-toc-l1>a::after, .rpt-toc-l2>a::after{
    content: target-counter(attr(href), page);
    color:#7A7364;
    font-variant-numeric:tabular-nums;
    font-size:11.5px;
    min-width:22px;
    text-align:right;
    margin-left:6px;
    flex-shrink:0;
  }
  /* Start each L1 section on its own page so readers land on a clean header. */
  .rpt-l1{page-break-before:always;break-before:page}
  .rpt-l1:first-of-type{page-break-before:auto;break-before:auto}

  #content-area{display:block!important;background:#fff!important}
  #report-panel{overflow:visible!important;display:block;background:#fff!important}
  #report-body{overflow:visible!important;height:auto;padding:0!important;background:#fff!important}
  #report-page{box-shadow:none!important;padding:0!important;max-width:none!important;background:#fff!important}
  #report-page::before{display:none!important}
  body{overflow:visible!important;height:auto}
  #app{height:auto;overflow:visible}

  .rpt-l1{font-size:20px;padding:14px 0 8px;margin-bottom:12px;page-break-after:avoid;border-bottom-color:#B8AD94}
  .bkt-section{margin-bottom:14px;page-break-inside:avoid}
  .bkt-header{padding:4px 0;cursor:default;border-bottom:none;margin-bottom:6px}
  .bkt-bar{display:none!important}
  .bkt-chevron{display:none!important}
  .bkt-focus{display:none!important}
  .bkt-name-input{font-size:14.5px;cursor:default;background:transparent!important}
  .bkt-headline{font-size:11.5px;color:#5A5A5A}
  .bkt-quotes{padding:2px 0 2px 10px;display:block!important}

  .q-card{background:none!important;border:none!important;border-radius:0!important;margin-bottom:6px;page-break-inside:avoid;padding-left:14px;position:relative}
  .q-card.q-card-selected,
  .q-card.q-card-cat-highlighted{background:none!important;box-shadow:none!important}
  .q-card::before{
    content:"\2022";
    position:absolute;
    left:0;top:2px;
    font-size:12px;
    line-height:1.5;
    color:#333;
    background:none!important;
    width:auto!important;
    display:block!important;
  }
  .q-card.q-card-selected::before,
  .q-card.q-card-cat-highlighted::before{display:block!important}
  .q-card-header{display:none!important}
  .qa-card-q{display:none!important}
  .q-attrib{font-size:9.5px;padding:0;text-align:right;color:#5A5A5A}
  .attrib-off .q-attrib{display:none!important}
  .q-text{padding:2px 0;max-height:none!important;overflow:visible!important;font-size:11.5px;line-height:1.6;color:#14213A}
  .q-text .s-tok{background:none!important;border-bottom:none!important;color:#14213A!important;padding:0!important;cursor:default}
  .q-expand-btn{display:none!important}
  .empty-bucket{display:none!important}
}

// Transcript scope is UI-only. Default view shows only CM finding blocks;

function setTranscriptView(view) {
  if (view !== 'findings' && view !== 'full') return;
  if (_transcriptView === view) return;

let _bankSelectorFilter = '';

function getBankTickerLabel(bankId) {
  const bank = getCurrentBankData(bankId);
  const raw = bank.symbol || bank.ticker || bank.full_ticker || bankId || '';
  return String(raw).replace(/-[A-Z]{2,4}$/i, '');
}

function getBankGroupLabel(bankId) {
  const bank = getCurrentBankData(bankId);
  return bank.type || bank.group || 'Banks';
}

function getBankFindingCount(bankId) {
  const bank = getCurrentBankData(bankId);
  if (Number.isFinite(bank.finding_count)) return bank.finding_count;
  if (Array.isArray(bank.items)) return bank.items.length;
  return getAllSubquotes(bankId).length;
}

function getBankSelectorLabel(bankId = state && state.current_bank) {
  const bank = getCurrentBankData(bankId);
  const ticker = getBankTickerLabel(bankId);
  const label = bank.selector_label || ticker || bank.company_name || bank.name || bankId || 'Bank';
  const count = getBankFindingCount(bankId);
  return `${label}${Number.isFinite(count) ? ` · ${count}` : ''}`;
}

function renderBankSelectorMenu() {
  const bankIds = Object.keys(state.banks || {});
  const filtered = bankIds.filter(id => {
    const bank = getCurrentBankData(id);
    const haystack = [
      id,
      getBankTickerLabel(id),
      bank.company_name,
      bank.name,
      bank.full_ticker,
    ].filter(Boolean).join(' ').toLowerCase();
    return !_bankSelectorFilter || haystack.includes(_bankSelectorFilter);
  });
  if (!filtered.length) {
    return `<div class="bank-menu-empty">No banks match that search.</div>`;
  }

  const groups = new Map();
  filtered.forEach(id => {
    const group = getBankGroupLabel(id);
    if (!groups.has(group)) groups.set(group, []);
    groups.get(group).push(id);
  });

  return Array.from(groups.entries())
    .sort((a, b) => a[0].localeCompare(b[0]))
    .map(([group, ids]) => {
      const items = ids
        .sort((a, b) => getBankTickerLabel(a).localeCompare(getBankTickerLabel(b)))
        .map(id => {
          const bank = getCurrentBankData(id);
          return `<button type="button" class="bank-menu-item${id === state.current_bank ? ' active' : ''}"
              onclick="selectBank('${id}')">
            <span class="bank-menu-item-main">
              <span class="bank-menu-item-ticker">${esc(getBankTickerLabel(id))}</span>
              <span class="bank-menu-item-name">${esc(bank.company_name || bank.name || id)}</span>
            </span>
            <span class="bank-menu-item-count">${getBankFindingCount(id)}</span>
          </button>`;
        }).join('');
      return `<div class="bank-menu-group">
        <div class="bank-menu-group-title">${esc(group.replace(/_/g, ' '))}</div>
        ${items}
      </div>`;
    }).join('');
}

function closeBankSelector() {
  document.querySelectorAll('.bank-menu').forEach(menu => menu.remove());
  document.removeEventListener('click', closeBankSelectorOnOutsideClick);
}

function closeBankSelectorOnOutsideClick(evt) {
  if (evt.target.closest('.bank-menu') || evt.target.closest('.tp-bank-btn')) return;
  closeBankSelector();
}

function filterBankSelector(value) {
  _bankSelectorFilter = String(value || '').trim().toLowerCase();
  const body = document.getElementById('bank-menu-body');
  if (body) body.innerHTML = renderBankSelectorMenu();
}

function toggleBankSelector(btnEl) {
  const existing = document.querySelector('.bank-menu');
  if (existing) {
    closeBankSelector();
    return;
  }

  const menu = document.createElement('div');
  menu.className = 'bank-menu';
  menu.innerHTML = `
    <div class="bank-menu-header">
      <div class="bank-menu-title">Select Bank</div>
      <div class="bank-menu-subtitle">Switch the transcript pane without changing the report layout.</div>
      <input id="bank-menu-search" class="bank-menu-search" type="text" placeholder="Search by ticker or name"

    </div>
    <div class="bank-menu-scroll" id="bank-menu-body">${renderBankSelectorMenu()}</div>
  `;
  document.body.appendChild(menu);

  const rect = btnEl.getBoundingClientRect();
  const menuRect = menu.getBoundingClientRect();
  const left = Math.min(window.innerWidth - menuRect.width - 12, Math.max(12, rect.right - menuRect.width));
  const top = Math.min(window.innerHeight - menuRect.height - 12, rect.bottom + 6);
  menu.style.left = `${left}px`;
  menu.style.top = `${top}px`;

  setTimeout(() => {
    document.getElementById('bank-menu-search')?.focus();
    document.addEventListener('click', closeBankSelectorOnOutsideClick);
  }, 0);
}

// HEADER DROPDOWN MENUS (Settings + Save)
// ============================================================
// One menu at a time. Clicking the same trigger twice closes it; clicking
// a different trigger swaps contents. Outside clicks dismiss.
function toggleHeaderMenu(type, btnEl) {
  const existing = document.querySelector('.hdr-menu');
  const existingType = existing ? existing.dataset.type : null;
  closeHeaderMenus();
  if (existingType === type) return;

  const menu = document.createElement('div');
  menu.className = 'hdr-menu';
  menu.dataset.type = type;

  if (type === 'settings') {
    menu.innerHTML = `
      <label class="hdr-menu-toggle">
        <span>Show names</span>
        <input type="checkbox" ${_attribVisible ? 'checked' : ''} onchange="toggleAttrib()">
      </label>
      <label class="hdr-menu-toggle">
        <span>Show banner</span>
        <input type="checkbox" ${state.banner_visible ? 'checked' : ''} onchange="toggleBanner()">
      </label>
    `;
  } else if (type === 'save') {
    menu.innerHTML = `
      <div class="hdr-menu-item" onclick="closeHeaderMenus();saveReport()">&#128190; Save</div>
      <div class="hdr-menu-item" onclick="closeHeaderMenus();savePdf()">&#128196; PDF</div>
      <div class="hdr-menu-item" onclick="closeHeaderMenus();saveDocx()">&#128221; DOCX</div>
    `;
  } else {
    return;
  }

  document.body.appendChild(menu);
  const rect = btnEl.getBoundingClientRect();
  menu.style.top = (rect.bottom + 4) + 'px';
  menu.style.right = Math.max(8, window.innerWidth - rect.right) + 'px';

  // Defer so the current click doesn't immediately trip the outside-click handler.
  setTimeout(() => document.addEventListener('click', closeHeaderMenusOnOutsideClick), 0);
}

function closeHeaderMenus() {
  document.querySelectorAll('.hdr-menu').forEach(m => m.remove());
  document.removeEventListener('click', closeHeaderMenusOnOutsideClick);
}

function closeHeaderMenusOnOutsideClick(e) {
  if (e.target.closest('.hdr-menu') || e.target.closest('.hdr-menu-trigger')) return;
  closeHeaderMenus();
}

// ============================================================
function getCurrentBankData(bankId = state && state.current_bank) {
  return (state && state.banks && bankId && state.banks[bankId]) || {};
}

function getReportPeriodLabel() {
  const fq = (state && state.meta && state.meta.fiscal_quarter) || '';
  const fy = (state && state.meta && state.meta.fiscal_year) || '';
  return [fq, fy].filter(Boolean).join(' ');
}

function getBannerPeriodLabel() {
  const fq = (state && state.meta && state.meta.fiscal_quarter) || '';
  const fy = String((state && state.meta && state.meta.fiscal_year) || '');
  const shortYear = fy.length === 4 ? "'" + fy.slice(2) : fy;
  return fq && fy ? `${fq}${shortYear}` : '';
}

function getReportCoverMeta(bankId = state && state.current_bank) {
  const meta = (state && state.meta) || {};
  const coverEntity =
    meta.cover_entity ||
    meta.report_scope ||
    (getReportBankIds().length > 1
      ? `${getReportBankIds().length} Banks`
      : ((getCurrentBankData(bankId).company_name || getCurrentBankData(bankId).name || '')));
  return [coverEntity, getReportPeriodLabel()].filter(Boolean).join(' \u2014 ');
}

function getReportCoverTitle() {
  return (((state || {}).meta || {}).report_title) || 'Capital Markets Readthrough';
}

function getCmMainTitle() {
  const meta = ((state || {}).meta) || {};
  if (meta.cm_main_title) return meta.cm_main_title;
  const fq = meta.fiscal_quarter || '';
  const fy = String(meta.fiscal_year || '');
  const shortYear = fy.length === 4 ? fy.slice(2) : fy;
  return fq && shortYear
    ? `Read Through For Capital Markets: ${fq}/${shortYear} Select Banks`
    : getReportCoverTitle();
}

function getSectionSubtitle(sectionName) {
  const meta = ((state || {}).meta) || {};
  const sectionSubtitles = meta.section_subtitles || {};
  if (sectionName === 'Outlook') {
    return sectionSubtitles.outlook || sectionSubtitles.Outlook || 'Outlook: Capital markets activity';
  }
  if (sectionName === 'Q&A') {
    return (
      sectionSubtitles.qa ||
      sectionSubtitles['Q&A'] ||
      'Conference calls: Capital markets questions'
    );
  }
  return sectionSubtitles[sectionName] || '';
}

function getBucketDisplayTitle(bucket) {
  return (((state || {}).bucket_user_titles || {})[bucket.id] || bucket.name || '').trim();
}

function getReportExportTitle(bankId = state && state.current_bank) {
  return [getReportCoverMeta(bankId), getReportCoverTitle()].filter(Boolean).join(' \u2014 ');
}

function normalizeSectionName(name) {
  const raw = String(name || '').trim();
  return raw || 'Q&A';
}

function getReportBankIds() {
  return (state && state.report_bank_order && state.report_bank_order.length)
    ? state.report_bank_order
    : Object.keys((state && state.banks) || {});
}

function getOrderedSections() {
  const sectionRank = {'Outlook': 0, 'Q&A': 1, 'Other': 2};
  const sectionOrder = [...new Set(
    state.buckets
      .filter(bucket => getReportBankIds().some(bankId => getReportSubquotes(bankId, bucket.id).length > 0))
      .map(bucket => normalizeSectionName(bucket.report_section))
  )].sort((a, b) => (sectionRank[a] ?? 99) - (sectionRank[b] ?? 99) || a.localeCompare(b));
  return sectionOrder.map(secName => ({
    name: secName,
    buckets: state.buckets.filter(bucket =>
      normalizeSectionName(bucket.report_section) === secName &&
      getReportBankIds().some(bankId => getReportSubquotes(bankId, bucket.id).length > 0)
    ),
  })).filter(s => s.buckets.length);
}

function getReportBucketGroups(bucketId) {
  return getReportBankIds().map(bankId => ({
    bankId,
    quotes: getReportSubquotes(bankId, bucketId).map(sq => ({ ...sq, bank_id: bankId })),
  })).filter(group => group.quotes.length > 0);
}

function renderTabs() {
  const bar = document.getElementById('tab-bar');
  const meta = document.getElementById('banner-meta');
  const period = getBannerPeriodLabel();
  const currentBank = getCurrentBankData();
  const bankName = currentBank.company_name || currentBank.name || '';

  if (meta) {
    meta.innerHTML = bankName
      ? `<span class="banner-sep"></span>${esc(bankName)}${period ? `<span class="banner-period">${esc(period)}</span>` : ''}`
      : '';

  bar.style.display = 'none';
  bar.innerHTML = '';
}
function selectBank(id) {
  state.current_bank = id;
  closeBankSelector();

  renderCurrentBank();
