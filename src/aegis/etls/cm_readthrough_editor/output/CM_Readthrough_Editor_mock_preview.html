// ============================================================
// TRANSCRIPT PANEL — COLLAPSE / VIEW MODES
// ============================================================
let _tpSavedWidth = null;
function toggleTranscript() {
  const wrap = document.getElementById('transcript-wrap');
  const resize = document.getElementById('tp-resize');
  const isCollapsed = wrap.classList.contains('tp-collapsed');
  if (isCollapsed) {
    openTranscriptPanel();
  } else {
    _tpSavedWidth = wrap.style.width || '40%';
    wrap.classList.add('tp-collapsed');
    wrap.style.width = '';
    resize.classList.add('tp-hidden');
  }
}

// Force the transcript panel open. Used by the category highlight feature so
// clicking the focus icon on a bucket never leaves the user staring at a
// collapsed rail.
function openTranscriptPanel() {
  const wrap = document.getElementById('transcript-wrap');
  const resize = document.getElementById('tp-resize');
  if (!wrap.classList.contains('tp-collapsed')) return;
  wrap.classList.remove('tp-collapsed');
  wrap.style.width = _tpSavedWidth || '40%';
  resize.classList.remove('tp-hidden');
}

// Toggle highlight for a bucket. Clicking the same bucket's focus icon
// twice clears the highlight; clicking a different one switches target.
function toggleCategoryHighlight(bucketId) {
  if (state.highlighted_bucket_id === bucketId) {
    clearCategoryHighlight();
    return;
  }
  state.highlighted_bucket_id = bucketId;
  openTranscriptPanel();
  renderTranscriptBody();
  renderCurrentBank();
  updateHighlightPill();
  scrollToFirstHighlightedSentence();
}

function clearCategoryHighlight() {
  if (!state.highlighted_bucket_id) return;
  state.highlighted_bucket_id = null;
  renderTranscriptBody();
  renderCurrentBank();
  updateHighlightPill();
}

function updateHighlightPill() {
  const pill = document.getElementById('tp-highlight-pill');
  if (!pill) return;
  if (state.highlighted_bucket_id) {
    pill.classList.add('active');
  } else {
    pill.classList.remove('active');
  }
}

// Scroll the transcript body to the first highlighted sentence so the user
// lands on the category's first footprint rather than wherever the panel
// was previously scrolled.
function scrollToFirstHighlightedSentence() {
  const highlightedBucketId = state.highlighted_bucket_id;
  if (!highlightedBucketId) return;

  const firstIncluded = getReportSubquotes(state.current_bank, highlightedBucketId)[0];
  const firstIncludedSid = firstIncluded && getSubquoteSentenceIds(firstIncluded)[0];
  if (firstIncludedSid) {
    const includedEl = document.querySelector(
      `#transcript-body .s-tok[data-sid="${firstIncludedSid}"]`
    );
    if (includedEl) {
      includedEl.scrollIntoView({behavior:'smooth', block:'center'});
      return;
    }
  }

  const first = document.querySelector('#transcript-body .tp-highlighted');
  if (first) first.scrollIntoView({behavior:'smooth', block:'center'});
}

// Reverse-direction jump: clicking anywhere on a finding in the report
// scrolls the transcript to that finding. All classification is reachable
// only from the transcript-side popover; report clicks never open it. If
// the user clicked directly on a sentence span, jump to THAT sentence so
// the transcript lands on the exact text they pointed at. Otherwise fall
// back to the first sentence of the finding.
function scrollTranscriptToFinding(card, preferredSentEl) {
  const bankId = card.dataset.bankId || state.current_bank;
  const sqId = card.dataset.subquoteId || '';
  const sq = getAllSubquotes(bankId).find(item => item.id === sqId);
  if (sq && sq.type === 'qa' && sq.render_mode !== 'question' && sq.conv_id) {
    _expandedQaAnswers.add(sq.conv_id);
    renderTranscriptPanel();
  }
  const sentEl = preferredSentEl || card.querySelector('.s-tok[data-sid]');
  if (!sentEl) return;
  const sid = sentEl.dataset.sid;
  openTranscriptPanel();
  const el = document.querySelector(`#transcript-body .s-tok[data-sid="${sid}"]`);
  if (!el) return;
  el.scrollIntoView({behavior:'smooth', block:'center'});
  el.classList.add('s-highlight');
  setTimeout(() => el.classList.remove('s-highlight'), 900);
}

function handleReportCardClick(e) {
  if (e.target.closest('button')) return;
  if (e.target.closest('input, textarea, label, select, a')) return;
  const card = e.target.closest('.q-card');
  if (!card) return;
  const clickedSent = e.target.closest('.s-tok[data-sid]');
  const bankId = card.dataset.bankId || state.current_bank;
  if (state.current_bank !== bankId) {
    state.current_bank = bankId;
    renderTabs();
    renderTranscriptPanel();
  }
  // Toggle single-finding selection: clicking the same card a second time
  // clears it, matching the "click to un-highlight" feel of the category
  // highlighter icon.
  const sqId = card.dataset.subquoteId;
  const isSame = state.selected_subquote_id === sqId && state.selected_subquote_bank_id === bankId;
  setSelectedFinding(isSame ? null : sqId, isSame ? null : bankId);
  scrollTranscriptToFinding(card, clickedSent);
}

// Locate which report finding (subquote) a transcript sentence belongs to.
// Returns null if the sentence isn't part of any finding in the current bank.
function findSubquoteIdForSid(sid) {
  const all = getAllSubquotes(state.current_bank);
  const hit = all.find(sq => getSubquoteSentenceIds(sq).includes(sid));
  return hit ? hit.id : null;
}

// Set of transcript sentence IDs belonging to the currently-selected finding.
// Maintained alongside state.selected_subquote_id by setSelectedFinding and
// read by tSpan on transcript re-renders so the blue border survives full
// transcript rebuilds (bank switch, status edit, etc.).
let _selectedFindingSids = null;

// Single-finding selection is persistent — it survives popover close and only
// changes when the user explicitly selects a different finding (or clicks the
// same one again). We update DOM classes directly to avoid a full re-render
// that would tear down the sortable instances on every click.
function setSelectedFinding(sqId, bankId = state.current_bank) {
  state.selected_subquote_id = sqId || null;
  state.selected_subquote_bank_id = sqId ? bankId : null;

  // Refresh the sid cache so transcript borders track the new selection.
  if (state.selected_subquote_id) {
    const sq = getAllSubquotes(bankId)
      .find(s => s.id === state.selected_subquote_id);
    _selectedFindingSids = sq ? new Set(getSubquoteSentenceIds(sq)) : null;
  } else {
    _selectedFindingSids = null;
  }

  // Report-side card border
  document.querySelectorAll('.q-card.q-card-selected')
    .forEach(el => el.classList.remove('q-card-selected'));
  if (state.selected_subquote_id) {
    const card = document.querySelector(
      `.q-card[data-subquote-id="${state.selected_subquote_id}"][data-bank-id="${state.selected_subquote_bank_id}"]`
    );
    if (card) card.classList.add('q-card-selected');
  }

  // Transcript-side sentence borders — every sentence that makes up the
  // selected finding gets the same blue outline as the report card.
  document.querySelectorAll('#transcript-body .s-tok.tp-sent-selected')
    .forEach(el => el.classList.remove('tp-sent-selected'));
  if (_selectedFindingSids) {
    _selectedFindingSids.forEach(sid => {
      document.querySelectorAll(`#transcript-body .s-tok[data-sid="${sid}"]`)
        .forEach(el => el.classList.add('tp-sent-selected'));
    });
  }
}

// ── Resize handle for transcript panel ──
(function initResize() {
  document.addEventListener('DOMContentLoaded', () => {
    const handle = document.getElementById('tp-resize');
    const wrap = document.getElementById('transcript-wrap');
    if (!handle || !wrap) return;
    let startX, startW;
    handle.addEventListener('mousedown', e => {
      e.preventDefault();
      startX = e.clientX;
      startW = wrap.offsetWidth;
      handle.classList.add('active');
      const onMove = ev => {
        const delta = ev.clientX - startX;
        const newW = Math.max(200, Math.min(startW + delta, window.innerWidth * 0.7));
        wrap.style.width = newW + 'px';
      };
      const onUp = () => {
        handle.classList.remove('active');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
})();

// ============================================================
// TRANSCRIPT PANEL — RENDER
// ============================================================
function renderTranscriptPanel() {
  renderTranscriptBody();
}

function getBucket(bid) {
  return state.buckets.find(b => b.id === bid) ||
         {id:'unassigned',name:'Unassigned',color_bg:'#FAFAFA',color_accent:'#9E9E9E'};
}

function bucketLabel(bucket) {
  return (state.bucket_user_titles && state.bucket_user_titles[bucket.id]) || bucket.name || 'Unassigned';
}

function bucketAppliesTo(bucket, transcriptSection) {
  const applies = (bucket && bucket.transcript_sections) || 'ALL';
  if (applies === 'MD_QA_ANSWER') {
    return transcriptSection === 'MD' || transcriptSection === 'QA_ANSWER';
  }
  if (applies === 'QA_QUESTION') {
    return transcriptSection === 'QA_QUESTION';
  }
  return applies === 'ALL' || applies === transcriptSection;
}

function getSentenceBucketIds(sent, bankId = state.current_bank) {
  const ids = new Set();
  if (!sent) return [];
  const primary = effectivePrimary(sent.sid, bankId);
  if (primary) ids.add(primary);
  if (sent.selected_bucket_id) ids.add(sent.selected_bucket_id);
  if (sent.primary) ids.add(sent.primary);
  (sent.candidate_bucket_ids || []).forEach(id => { if (id) ids.add(id); });
  return [...ids];
}

function sentenceHasBucketInReportSection(sent, reportSection, bankId = state.current_bank) {
  return getSentenceBucketIds(sent, bankId).some(id => {
    const bucket = getBucket(id);
    return (bucket.report_section || '') === reportSection;
  });
}

function getQuestionFindingSentences(conv, bankId = state.current_bank) {
  return (conv && conv.question_sentences || []).filter(sent =>
    sentenceHasBucketInReportSection(sent, 'Q&A', bankId)
  );
}

function getAnswerFindingSentences(conv, bankId = state.current_bank) {
  return (conv && conv.answer_sentences || []).filter(sent =>
    sentenceHasBucketInReportSection(sent, 'Outlook', bankId)
  );
}

function getSentenceContext(sid) {
  const bank = state.banks[state.current_bank] || {};
  for (const blk of (bank.md_blocks || [])) {
    if ((blk.sentences || []).some(s => s.sid === sid)) {
      return {transcriptSection:'MD', editable:true, role:'md'};
    }
  }
  for (const conv of (bank.qa_conversations || [])) {
    const questionSentence = (conv.question_sentences || []).find(s => s.sid === sid);
    if (questionSentence) {
      return {
        transcriptSection:'QA_QUESTION',
        editable: sentenceHasBucketInReportSection(questionSentence, 'Q&A'),
        role:'qa_question',
      };
    }
    const answerSentence = (conv.answer_sentences || []).find(s => s.sid === sid);
    if (answerSentence) {
      return {
        transcriptSection:'QA_ANSWER',
        editable: sentenceHasBucketInReportSection(answerSentence, 'Outlook'),
        role:'qa_answer',
      };
    }
  }
  return {transcriptSection:'ALL', editable:false, role:'unknown'};
}

function getApplicableBucketsForSentence(sid) {
  const ctx = getSentenceContext(sid);
  const currentBucketId = effectivePrimary(sid);
  return {
    context: ctx,
    buckets: state.buckets.filter(bucket =>
      bucket.id === currentBucketId || bucketAppliesTo(bucket, ctx.transcriptSection))
  };
}

function nextBucketColors() {
  const count = state.buckets.length;
  return DYNAMIC_BUCKET_COLORS[count % DYNAMIC_BUCKET_COLORS.length] || {bg:'#ECEFF1', accent:'#546E7A'};
}

function insertBucket(bucket) {
  if (!state.buckets) state.buckets = [];
  state.buckets.push(bucket);
}

function createBucketFromRow(row, options={}) {
  if (state.next_bucket_seq == null) {
    state.next_bucket_seq = state.buckets.filter(b => /^bucket_\d+$/.test(b.id)).length;
  }
  const colors = nextBucketColors();
  const bucketId = `bucket_${state.next_bucket_seq++}`;
  const bucket = {
    id: bucketId,
    name: (row.category_name || '').trim(),
    report_section: row.report_section || 'Outlook',
    transcript_sections: row.transcript_sections || 'ALL',
    description: row.category_description || '',
    color_bg: colors.bg,
    color_accent: colors.accent,
    generated_headline: options.generated_headline || '',
    source: options.source || 'suggested',
  };
  insertBucket(bucket);
  return bucket;
}

function getSentenceReviewStatus(sid, bankId = state.current_bank) {
  const bs = getBankState(bankId);
  if (bs.sentence_status_overrides && bs.sentence_status_overrides[sid]) {
    return bs.sentence_status_overrides[sid];
  }
  const sent = findSentence(sid);
  return (sent && sent.status) || 'candidate';
}

function setSentenceReviewStatus(sids, status, bankId = state.current_bank) {
  const bs = getBankState(bankId);
  if (!bs.sentence_status_overrides) bs.sentence_status_overrides = {};
  (Array.isArray(sids) ? sids : [sids]).forEach(sid => {
    bs.sentence_status_overrides[sid] = status;
  });
}

function effectivePrimary(sid, bankId = state.current_bank) {
  const bs = getBankState(bankId);
  return (bs.sentence_user_primary && bs.sentence_user_primary[sid]) ||
         findSentence(sid)?.selected_bucket_id ||
         findSentence(sid)?.primary || '';
}

function renderTranscriptBody() {
  renderTranscriptBodyBlocks();
}

// ── Helpers: inclusion check + consecutive-category grouping ──
function computeIncludedSids(bankId) {
  const inc = new Set();
  const bank = state.banks[bankId] || {};
  (bank.md_blocks || []).forEach(blk => {
    (blk.sentences || []).forEach(sent => {
      if (getSentenceReviewStatus(sent.sid, bankId) === 'selected') inc.add(sent.sid);
    });
  });
  (bank.qa_conversations || []).forEach(conv => {
    [...getQuestionFindingSentences(conv, bankId), ...getAnswerFindingSentences(conv, bankId)].forEach(sent => {
      if (getSentenceReviewStatus(sent.sid, bankId) === 'selected') {
        inc.add(sent.sid);
      }
    });
  });
  return inc;
}
function renderGroupedSpans(groups, btype, inc) {
  return groups.map((g, i) => {
    const bullet = i > 0 ? '<span class="t-gbullet">&bull;</span>' : '';
    return bullet + g.sents.map(s => tSpan(s, btype, inc)).join(' ');
  }).join(' ');
}

// ── Render sentences with paragraph breaks ──
function tSpansWithParas(sentences, btype, inc) {
  let html = '', lastPara = -1;
  sentences.forEach(s => {
    const pi = s.para_idx != null ? s.para_idx : 0;
    if (lastPara >= 0 && pi !== lastPara) html += '<span class="t-para-break"></span>';
    lastPara = pi;
    html += tSpan(s, btype, inc) + ' ';
  });
  return html;
}

function getConversationFindingSentences(conv) {
  if (!conv) return [];
  return [
    ...getQuestionFindingSentences(conv, state.current_bank),
    ...getAnswerFindingSentences(conv, state.current_bank),
  ];
}

function getSubquoteFindingSentences(sq) {
  if (!sq) return [];
  if (sq.type === 'md') return sq.sentences || [];
  return sq.render_mode === 'question'
    ? (sq.question_sentences || [])
    : (sq.answer_sentences || []);
}

// Body text for a speaker block / QA turn. The layout stays in speaker-block
// form for CM editor; only the block set changes between filtered and full.
function tFindingsBody(sentences, btype, inc) {
  return tSpansWithParas(sentences, btype, inc);
}

// ── Transcript sentence span (included/excluded styling) ──
function tSpan(sent, blockType, inc) {
  const bid = effectivePrimary(sent.sid);
  const isQa = blockType === 'qa';
  const status = getSentenceReviewStatus(sent.sid);
  const cls = status === 'selected'
    ? 's-incl'
    : status === 'candidate'
      ? 's-cand'
      : status === 'context'
        ? 's-ctx'
        : 's-excl';
  const matchesHighlightedBucket = !!(
    state.highlighted_bucket_id && (
      bid === state.highlighted_bucket_id ||
      ((sent.candidate_bucket_ids || []).includes(state.highlighted_bucket_id))
    )
  );
  // When a category is focused from the report preview, highlight every
  // sentence tied to that category across all three statuses, even when the
  // sentence is only a candidate for that bucket and has not been promoted
  // into the report yet.
  const highlightCls = matchesHighlightedBucket ? ' tp-highlighted' : '';
  const reportIncludedCls =
    state.highlighted_bucket_id && bid === state.highlighted_bucket_id && inc && inc.has(sent.sid)
      ? ' tp-report-included' : '';
  // Single-finding selection: outline every sentence that belongs to the
  // selected subquote. Kept in sync with setSelectedFinding via the cached
  // _selectedFindingSids Set; this path covers full re-renders that bypass
  // the click-driven DOM toggle.
  const selectCls = _selectedFindingSids && _selectedFindingSids.has(sent.sid)
    ? ' tp-sent-selected' : '';
  const scores64 = btoa(unescape(encodeURIComponent(JSON.stringify(sent.scores))));
  return `<span class="s-tok ${cls}${isQa?' qa-sent':''}${highlightCls}${reportIncludedCls}${selectCls}"
    data-sid="${sent.sid}" data-btype="${blockType}" data-primary="${bid}" data-scores="${scores64}"
    onclick="showSentencePopover(event,this)">${esc(sent.text)}</span>`;
}
// ── Report-panel sentence span (per-bucket color styling) ──
function sentenceSpan(sent, blockType) {
  const bid = effectivePrimary(sent.sid);
  const bkt = getBucket(bid);
  const isQa = blockType === 'qa';
  const scores64 = btoa(unescape(encodeURIComponent(JSON.stringify(sent.scores))));
  return `<span class="s-tok${isQa?' qa-sent':''}"
    data-sid="${sent.sid}" data-btype="${blockType}" data-primary="${bid}" data-scores="${scores64}"
    style="background:${bkt.color_bg};border-bottom-color:${bkt.color_accent}"
    onclick="showSentencePopover(event,this)">${esc(sent.text)}</span>`;
}

// ── View: Blocks ──
function renderTranscriptBodyBlocks() {
  const bank = state.banks[state.current_bank];
  const inc = computeIncludedSids(state.current_bank);
  const visibleMdBlocks = _transcriptView === 'full'
    ? (bank.md_blocks || [])
    : (bank.md_blocks || []).filter(blk => blk.has_findings);
  const visibleQaConversations = _transcriptView === 'full'
    ? (bank.qa_conversations || [])
    : (bank.qa_conversations || []).filter(conv => conv.has_findings);
  let html = '';
  let firstSection = '';
  if (visibleMdBlocks.length) {
    if (!firstSection) firstSection = 'Management Discussion';
    html += `<div class="t-section-header" data-section="Management Discussion">Management Discussion</div>`;
    visibleMdBlocks.forEach(blk => {
      const sentHtml = tFindingsBody(blk.sentences, 'md', inc);
      html += `<div class="t-block">
        <div class="t-block-header"><span class="t-speaker-name">${esc(blk.speaker)}</span>
        ${blk.speaker_title ? `<span class="t-speaker-title">${esc(blk.speaker_title)}</span>` : ''}</div>
        <div class="t-block-text">${sentHtml}</div></div>`;
    });
  }
  if (visibleQaConversations.length) {
    if (!firstSection) firstSection = 'Questions & Answers';
    html += `<div class="t-section-header" data-section="Questions &amp; Answers">Questions &amp; Answers</div>`;
    visibleQaConversations.forEach((conv, ci) => {
      html += renderQAConvBlocks(conv, inc, ci);
    });
  }
  if (!visibleMdBlocks.length && !visibleQaConversations.length) {
    html += `<div class="t-block"><div class="t-block-text">No capital markets findings were extracted for this bank. Use "Show full transcript" to review the full call.</div></div>`;
    firstSection = 'Transcript';
  }
  const tb = document.getElementById('transcript-body');
  const bankLabel = getBankSelectorLabel();
  const scopeLabel = _transcriptView === 'findings' ? 'Show full transcript' : 'Show findings only';
  tb.innerHTML = `<div id="tp-section-label">`
    + `<span id="tp-section-text">${esc(firstSection)}</span>`
    + `<button type="button" class="tp-scope-btn" onclick="toggleTranscriptView()" title="${escAttr(scopeLabel)}" aria-label="${escAttr(scopeLabel)}">${esc(scopeLabel)}</button>`
    + `<button type="button" class="tp-bank-btn" onclick="toggleBankSelector(this)" title="Select bank" aria-label="Select bank">`
    + `<span class="tp-bank-btn-label">${esc(bankLabel)}</span>`
    + `<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>`
    + `</button>`
    + `</div><div id="tp-scroll">${html}</div>`;
  bindTpSectionLabelScroll();
}

// Keep #tp-section-label in sync with the section currently at the top of
// #tp-scroll. Headers inside the scroll carry data-section; we find the last
// one whose top has crossed the scroll viewport's top edge.
function bindTpSectionLabelScroll() {
  const scrollEl = document.getElementById('tp-scroll');
  // Target the inner text span, not the outer label — the label now also
  // holds the view-toggle buttons, which would be wiped if we assigned to
  // label.textContent on every scroll tick.
  const textEl = document.getElementById('tp-section-text');
  if (!scrollEl || !textEl) return;
  const headers = Array.from(scrollEl.querySelectorAll('.t-section-header'));
  if (headers.length <= 1) return;
  const update = () => {
    const viewportTop = scrollEl.getBoundingClientRect().top;
    let current = headers[0].dataset.section;
    for (const h of headers) {
      if (h.getBoundingClientRect().top - viewportTop <= 0) current = h.dataset.section;
    }
    if (textEl.textContent !== current) textEl.textContent = current;
  };
  scrollEl.addEventListener('scroll', update, { passive: true });
  update();
}

// Build the per-turn rows for the Blocks view, preserving the back-and-forth
// order of the original transcript.
function _qaConvTurns(conv) {
  return Array.isArray(conv.turns) ? conv.turns : [];
}

function _qaTurnLabel(turn) {
  if (turn.role === 'q') {
    const name = turn.speaker || 'Analyst';
    return turn.speaker_affiliation ? `${name} (${turn.speaker_affiliation})` : name;
  }
  const name = turn.speaker || 'Executive';
  return turn.speaker_title ? `${name}, ${turn.speaker_title}` : name;
}

function getQaAnswerSpeakerMeta(conv, sent) {
  if (sent && (sent.speaker || sent.speaker_title || sent.speaker_affiliation)) {
    return {
      name: sent.speaker || conv.executive_name || 'Executive',
      title: sent.speaker_title || conv.executive_title || '',
      affiliation: sent.speaker_affiliation || conv.executive_affiliation || '',
    };
  }

  const sid = sent && sent.sid;
  if (sid) {
    const answerTurn = _qaConvTurns(conv).find(turn =>
      turn.role === 'a' && (turn.sentences || []).some(item => item.sid === sid)
    );
    if (answerTurn) {
      return {
        name: answerTurn.speaker || conv.executive_name || 'Executive',
        title: answerTurn.speaker_title || conv.executive_title || '',
        affiliation: answerTurn.speaker_affiliation || conv.executive_affiliation || '',
      };
    }
  }

  return {
    name: conv.executive_name || 'Executive',
    title: conv.executive_title || '',
    affiliation: conv.executive_affiliation || '',
  };
}

function getSubquoteSpeakerMeta(sq) {
  if (!sq) {
    return { name: 'Unknown Speaker', title: '', affiliation: '' };
  }
  if (sq.type === 'md') {
    return {
      name: sq.speaker || 'Unknown Speaker',
      title: sq.speaker_title || '',
      affiliation: sq.speaker_affiliation || '',
    };
  }
  if (sq.render_mode === 'question') {
    return {
      name: sq.analyst_name || 'Analyst',
      title: '',
      affiliation: sq.analyst_affiliation || '',
    };
  }
  return {
    name: sq.executive_name || 'Executive',
    title: sq.executive_title || '',
    affiliation: sq.executive_affiliation || '',
  };
}

function getSubquoteSpeakerKey(sq) {
  const meta = getSubquoteSpeakerMeta(sq);
  return [meta.name, meta.title, meta.affiliation].join('||');
}

// QA findings from the same analyst conversation share a single eyebrow
// ("In response to...") and question summary in the rendered report, so they
// need to cluster by conv_id — not by executive speaker. MD blocks have no
// conversation, so they keep clustering by speaker.
function getSubquoteClusterKey(sq) {
  if (sq && sq.type === 'qa') return 'qa::' + (sq.conv_id || sq.id);
  return 'md::' + getSubquoteSpeakerKey(sq);
}

function clusterSubquotesBySpeaker(quotes) {
  const order = [];
  const byKey = new Map();
  quotes.forEach(sq => {
    const key = getSubquoteClusterKey(sq);
    if (!byKey.has(key)) {
      byKey.set(key, []);
      order.push(key);
    }
    byKey.get(key).push(sq);
  });
  return order.flatMap(key => {
    const cluster = byKey.get(key) || [];
    // Within a QA cluster, re-sort by sid so the bullets read in natural
    // conversation order (af0, af1, af2…) instead of the importance order
    // inherited from the outer sort.
    if (key.startsWith('qa::') && cluster.length > 1) {
      return [...cluster].sort((a, b) =>
        a.id.localeCompare(b.id, undefined, { numeric: true })
      );
    }
    return cluster;
  });
}

function toggleQaAnswer(convId) {
  if (_expandedQaAnswers.has(convId)) _expandedQaAnswers.delete(convId);
  else _expandedQaAnswers.add(convId);
  renderTranscriptBody();
}

function buildSpeakerBatchMeta(quotes) {
  const meta = new Map();
  quotes.forEach((sq, idx) => {
    const key = getSubquoteClusterKey(sq);
    const prevKey = idx > 0 ? getSubquoteClusterKey(quotes[idx - 1]) : null;
    const nextKey = idx < quotes.length - 1 ? getSubquoteClusterKey(quotes[idx + 1]) : null;
    meta.set(sq.id, {
      showAttribution: key !== nextKey,
      // First subquote of a cluster prints the eyebrow + question; the rest
      // render as plain bullets under it. For MD the flag is harmless (the
      // card never renders a QA eyebrow), but keeping it uniform simplifies
      // the call sites.
      showQaContext: key !== prevKey,
      batchClass: key === nextKey ? 'q-card-batch-inner' : 'q-card-batch-end',
    });
  });
  return meta;
}

function renderQAConvBlocks(conv, inc, convIdx) {
  const turns = _qaConvTurns(conv);
  const questionTurns = turns.filter(turn => turn.role === 'q');
  const answerTurns = turns.filter(turn => turn.role === 'a');
  const showAnswers = _expandedQaAnswers.has(conv.id);
  const visibleTurns = showAnswers || !questionTurns.length ? turns : questionTurns;
  const turnsHtml = visibleTurns.map(turn => {
    const label = _qaTurnLabel(turn);
    const sentHtml = tFindingsBody(turn.sentences || [], 'qa', inc);
    const cls = turn.role === 'q' ? 't-qa-q' : 't-qa-a';
    const lblCls = turn.role === 'q' ? 'q' : 'a';
    const lblText = turn.role === 'q' ? 'Q' : 'A';
    return `<div class="${cls}"><span class="qa-lbl ${lblCls}">${lblText}</span><span class="qa-person">${esc(label)}</span>
      <div class="t-qa-text">${sentHtml}</div></div>`;
  }).join('');
  const toggleHtml = answerTurns.length
    ? `<div class="t-qa-toggle-row"><button type="button" class="t-qa-toggle" onclick="toggleQaAnswer('${conv.id}')">${showAnswers ? 'Hide answer' : 'Show answer'}</button></div>`
    : '';
  return `<div class="t-qa-group">
    <div class="t-qa-num-label">Question ${convIdx + 1}</div>
    ${turnsHtml}${toggleHtml}</div>`;
}

// ============================================================
// SENTENCE POPOVER
// ============================================================
function renderPopoverScoreRow(bucket, score, sid, options={}) {
  const readonly = !!options.readonly;
  const current = !!options.current;
  const scoreText = Number.isFinite(score) ? score.toFixed(1) : '—';
  const cls = `s-score-row${current?' current':''}${readonly?' readonly':''}`;
  const onclick = readonly ? '' : `onclick="reassignSentence('${sid}','${bucket.id}')"`;
  // Pipe the bucket's own accent color into a CSS custom property so the
  // left-edge bar on the current row matches the dot / transcript highlight.
  const style = current ? ` style="--cur-accent:${bucket.color_accent}"` : '';
  return `<div class="${cls}"${style} ${onclick}>
    <div class="s-score-dot" style="background:${bucket.color_accent}"></div>
    <div class="s-score-main">
      <div class="s-score-name">${esc(bucketLabel(bucket))}</div>
    </div>
    <div class="s-score-val">${scoreText}</div>
    <div class="s-score-check">${current ? '&#10003;' : ''}</div>
  </div>`;
}

function togglePopoverAll(evt) {
  evt.stopPropagation();
  const panel = document.getElementById('s-pop-all');
  const btn = document.getElementById('s-pop-all-btn');
  if (!panel || !btn) return;
  const open = panel.style.display === 'block';
  panel.style.display = open ? 'none' : 'block';
  btn.textContent = open ? btn.dataset.showLabel : btn.dataset.hideLabel;
  btn.classList.toggle('expanded', !open);
}

// Add Category modal — opened from the report header's plus button.
// Creates a standalone bucket from a name + optional subtitle. The bucket
// applies to all transcript sections (ALL) so it shows up in every sentence
// popover's "Show all classifications" list; the user then reassigns
// findings to it from the transcript side.
function openAddCategoryModal() {
  const modal = document.getElementById('add-category-modal');
  if (!modal) return;
  document.getElementById('add-category-form').reset();
  const err = document.getElementById('add-cat-error');
  err.textContent = '';
  err.classList.add('hidden');
  modal.classList.add('active');
  // Defer focus so the browser paints the modal before we steal focus into it.
  setTimeout(() => { document.getElementById('add-cat-name')?.focus(); }, 0);
}

function closeAddCategoryModal() {
  document.getElementById('add-category-modal')?.classList.remove('active');
}

function handleAddCategoryBackdropClick(evt) {
  if (evt.target.id === 'add-category-modal') closeAddCategoryModal();
}

function submitAddCategoryForm(evt) {
  evt.preventDefault();
  const name = (document.getElementById('add-cat-name').value || '').trim();
  const subtitle = (document.getElementById('add-cat-subtitle').value || '').trim();
  const err = document.getElementById('add-cat-error');
  if (!name) {
    err.textContent = 'Category name is required.';
    err.classList.remove('hidden');
    return;
  }
  createBucketFromRow({
    category_name: name,
    category_description: '',
    transcript_sections: 'ALL',
    report_section: 'Outlook',
  }, {
    generated_headline: subtitle,
    source: 'suggested',
  });
  closeAddCategoryModal();
  renderCurrentBank();
}

function setActiveSentenceStatus(status) {
  if (!_activeSid) return;
  const context = getSentenceContext(_activeSid);
  if (!context.editable) return;
  setSentenceReviewStatus(_activeSid, status);
  if (status === 'selected' && !effectivePrimary(_activeSid)) {
    const sent = findSentence(_activeSid);
    const fallback = (sent && sent.candidate_bucket_ids && sent.candidate_bucket_ids[0]) || '';
    if (fallback) {
      const bs = getBankState(state.current_bank);
      if (!bs.sentence_user_primary) bs.sentence_user_primary = {};
      bs.sentence_user_primary[_activeSid] = fallback;
    }
  }
  document.getElementById('s-popover').style.display = 'none';
  _activeSid = null;
  renderCurrentBank();
}

// Build the three status-icon toggle buttons for the popover header. Each
// button reflects the current review status (only one is `.active` at a
// time) and clicking it routes through setActiveSentenceStatus, which also
// closes the popover and triggers a re-render. Readonly mode (analyst
// question sentences) shows the icons disabled so the layout stays stable.
function renderStatusIconsHtml(currentStatus, readonly) {
  const items = [
    { status: 'selected',  label: 'Mark as selected for report',  svg: STATUS_SELECTED_SVG },
    { status: 'candidate', label: 'Mark as candidate only',       svg: STATUS_CANDIDATE_SVG },
    { status: 'rejected',  label: 'Mark as rejected',             svg: STATUS_REJECTED_SVG },
  ];
  return items.map(item => {
    const active = item.status === currentStatus;
    const disabled = readonly;
    const cls = `s-status-icon${active ? ' active' : ''}${disabled ? ' disabled' : ''}`;
    const onclick = disabled ? '' : ` onclick="setActiveSentenceStatus('${item.status}')"`;
    const aria = disabled ? ' aria-disabled="true"' : ` aria-pressed="${active}"`;
    return `<button type="button" class="${cls}" data-status="${item.status}" title="${item.label}" aria-label="${item.label}"${onclick}${aria}>${item.svg}</button>`;
  }).join('');
}

function showSentencePopover(evt, el) {
  evt.stopPropagation();
  const sid    = el.dataset.sid;
  const scores = JSON.parse(decodeURIComponent(escape(atob(el.dataset.scores))));
  const sent   = findSentence(sid);
  if (!sent) return;

  _activeSid = sid;

  // Cross-highlight: find this sentence in the report panel and scroll to it
  highlightInReport(sid);

  const bucketState = getApplicableBucketsForSentence(sid);
  const readonly = !bucketState.context.editable;
  const currentStatus = getSentenceReviewStatus(sid);

  // Header: status icons + importance chip. The chip reads the raw 0–10
  // score off the sentence; if missing (older state files) we hide it rather
  // than print 0.0 which would be misleading.
  document.getElementById('s-pop-status-icons').innerHTML =
    renderStatusIconsHtml(currentStatus, readonly);
  const impEl = document.getElementById('s-pop-importance');
  const impVal = Number(sent.importance_score);
  if (Number.isFinite(impVal) && impVal > 0) {
    impEl.innerHTML = `Score<span class="s-score-num">${impVal.toFixed(1)}</span>`;
    impEl.classList.remove('hidden');
  } else {
    impEl.classList.add('hidden');
  }

  // Readonly note replaces the category list for analyst question sentences;
  // otherwise it stays hidden.
  const noteEl = document.getElementById('s-pop-readonly-note');
  const scoresEl = document.getElementById('s-pop-scores');
  if (readonly) {
    noteEl.textContent = 'Analyst question sentences are context only \u2014 they are not classified into a category and never become a finding on their own.';
    noteEl.classList.remove('hidden');
    scoresEl.classList.add('hidden');
    scoresEl.innerHTML = '';
  } else {
    noteEl.classList.add('hidden');
    scoresEl.classList.remove('hidden');

    const curPrimary = effectivePrimary(sid);
    const applicableBuckets = bucketState.buckets;
    // Sort the full applicable list by score desc once — this is also the
    // order used in the expanded view. The top slice is "top 3 + the current
    // bucket if it wasn't already in the top 3", and the remaining slice is
    // everything else.
    const scoredRows = applicableBuckets
      .map(bucket => ({ bucket, score: scores[bucket.id] || 0 }))
      .sort((a, b) =>
        (b.bucket.id === curPrimary) - (a.bucket.id === curPrimary) ||
        b.score - a.score ||
        bucketLabel(a.bucket).localeCompare(bucketLabel(b.bucket))
      );
    const topIds = new Set(scoredRows.slice(0, 3).map(row => row.bucket.id));
    topIds.add(curPrimary);
    const topRows = scoredRows.filter(row => topIds.has(row.bucket.id));
    const remainingRows = scoredRows.filter(row => !topIds.has(row.bucket.id));
    const remainingCount = remainingRows.length;

    const renderRow = ({bucket, score}) => renderPopoverScoreRow(bucket, score, sid, {
      readonly,
      current: bucket.id === curPrimary,
    });
    const topHtml = topRows.map(renderRow).join('');
    const remainingHtml = remainingRows.map(renderRow).join('');

    // Single continuous list. Top rows are always visible; remaining rows
    // live inside #s-pop-all (display:none) and the expand button flips that
    // to block so they slot in immediately after the top rows.
    const expandBtnHtml = remainingCount ? `
      <button id="s-pop-all-btn" class="s-expand-btn"
              data-show-label="Show all classifications (+${remainingCount})"
              data-hide-label="Show fewer classifications"
              onclick="togglePopoverAll(event)">
        Show all classifications (+${remainingCount})
      </button>` : '';

    scoresEl.innerHTML = `
      <div class="s-score-section">
        ${topHtml || '<div class="s-score-row readonly"><div class="s-score-main"><div class="s-score-name">No scores available</div></div></div>'}
        <div id="s-pop-all">${remainingHtml}</div>
        ${expandBtnHtml}
      </div>
    `;
  }

  // Position near click
  const pop = document.getElementById('s-popover');
  pop.style.display = 'block';
  const pw = Math.min(320, window.innerWidth - 16), ph_est = 440;
  let left = evt.clientX + 8;
  let top  = evt.clientY + 8;
  if (left + pw > window.innerWidth - 8)  left = evt.clientX - pw - 8;
  if (top + ph_est > window.innerHeight - 8) top = evt.clientY - ph_est - 8;
  pop.style.left = Math.max(8, left) + 'px';
  pop.style.top  = Math.max(8, top)  + 'px';
}

function highlightInReport(sid) {
  // Clear the transient flash on any previously-flashed sentence. The
  // persistent card-level selection is handled via setSelectedFinding below,
  // which manages its own DOM class lifecycle.
  document.querySelectorAll('#report-body .s-highlight').forEach(el => el.classList.remove('s-highlight'));
  // Promote the sentence's parent finding to "selected" (blue border). Skip
  // when the sentence has no corresponding finding — e.g. analyst questions
  // or rejected-only sentences — so an incidental click doesn't clear the
  // user's existing selection.
  const sqId = findSubquoteIdForSid(sid);
  if (sqId) setSelectedFinding(sqId, state.current_bank);
  // Briefly flash the matching sentence span in the report so the user sees
  // the cross-navigation target.
  const match = document.querySelector(
    `#report-body .q-card[data-bank-id="${state.current_bank}"] .s-tok[data-sid="${sid}"]`
  );
  if (match) {
    match.classList.add('s-highlight');
    match.scrollIntoView({behavior:'smooth', block:'center'});
  }
}

function maybeClosePopover(evt) {
  const pop = document.getElementById('s-popover');
  if (pop.style.display !== 'none' && !pop.contains(evt.target)) {
    pop.style.display = 'none';
    _activeSid = null;
    // Clear only the transient sentence flash — the persistent
    // q-card-selected border stays until the user picks another finding.
    document.querySelectorAll('#report-body .s-highlight').forEach(el => el.classList.remove('s-highlight'));
  }
}

// ============================================================
// SENTENCE REASSIGNMENT (MD only) — Option A: immediate full re-render
// ============================================================
function reassignSentence(sid, newBucketId) {
  const {context} = getApplicableBucketsForSentence(sid);
  const targetBucket = getBucket(newBucketId);
  if (!context.editable || !bucketAppliesTo(targetBucket, context.transcriptSection)) return;
  const bs = getBankState(state.current_bank);
  if (!bs.sentence_user_primary) bs.sentence_user_primary = {};
  bs.sentence_user_primary[sid] = newBucketId;
  setSentenceReviewStatus(sid, 'selected');
  document.getElementById('s-popover').style.display = 'none';
  _activeSid = null;
  renderCurrentBank(); // full re-render: transcript colors + report groupings
}

// ============================================================
// SUB-QUOTE COMPUTATION (programmatic from sentence data)
// ============================================================

/**
 * Group consecutive sentences with the same effective primary into sub-quotes.
 * Sub-quote ID = "SQ_" + first sentence SID.
 */
function computeMDSubquotes(blk, bs) {
  const groups = [];
  let cur = null;

  for (const sent of blk.sentences) {
    if (getSentenceReviewStatus(sent.sid) !== 'selected') {
      if (cur) { groups.push(cur); cur = null; }
      continue;
    }
    const ep = (bs.sentence_user_primary && bs.sentence_user_primary[sent.sid]) ||
      sent.selected_bucket_id || sent.primary;
    if (!ep) {
      if (cur) { groups.push(cur); cur = null; }
      continue;
    }
    // Check for whole-subquote bucket override (from drag-drop)
    const sqid = cur ? cur.id : `SQ_${sent.sid}`;
    const bucketOverride = bs.subquote_bucket_overrides && bs.subquote_bucket_overrides[sqid];
    const effectiveBucket = bucketOverride || ep;

    if (!cur || cur.effective_bucket !== effectiveBucket) {
      if (cur) groups.push(cur);
      cur = {
        id: `SQ_${sent.sid}`,
        type: 'md',
        block_id: blk.id,
        speaker: blk.speaker,
        speaker_title: blk.speaker_title || '',
        effective_bucket: effectiveBucket,
        sentences: [sent],
      };
    } else {
      cur.sentences.push(sent);
    }
  }
  if (cur) groups.push(cur);
  return groups;
}

function _computeQaSubquotesForMode(conv, bs, findings, mode, bankId) {
  if (!findings.length) return [];
  const questionMode = mode === 'question';
  const groups = [];
  let cur = null;

  for (const sent of findings) {
    if (getSentenceReviewStatus(sent.sid, bankId) !== 'selected') {
      if (cur) {
        delete cur._speaker_key;
        groups.push(cur);
        cur = null;
      }
      continue;
    }
    const effectiveBucket =
      (bs.sentence_user_primary && bs.sentence_user_primary[sent.sid]) ||
      sent.selected_bucket_id ||
      sent.primary ||
      '';
    const speakerMeta = questionMode
      ? {
          name: conv.analyst_name || 'Analyst',
          title: '',
          affiliation: conv.analyst_affiliation || '',
        }
      : getQaAnswerSpeakerMeta(conv, sent);
    const speakerKey = [
      speakerMeta.name,
      speakerMeta.title,
      speakerMeta.affiliation,
    ].join('||');
    if (!effectiveBucket) {
      if (cur) {
        delete cur._speaker_key;
        groups.push(cur);
        cur = null;
      }
      continue;
    }
    if (!cur || cur.effective_bucket !== effectiveBucket || cur._speaker_key !== speakerKey) {
      if (cur) {
        delete cur._speaker_key;
        groups.push(cur);
      }
      cur = {
        id: `SQ_${sent.sid}`,
        type: 'qa',
        render_mode: questionMode ? 'question' : 'answer',
        conv_id: conv.id,
        analyst_name: conv.analyst_name,
        analyst_affiliation: conv.analyst_affiliation,
        executive_name: speakerMeta.name,
        executive_title: speakerMeta.title,
        executive_affiliation: speakerMeta.affiliation,
        analyst_question_summary: conv.analyst_question_summary || '',
        effective_bucket: effectiveBucket,
        question_sentences: questionMode ? [sent] : (conv.question_sentences || []),
        answer_sentences: questionMode ? [] : [sent],
        _speaker_key: speakerKey,
      };
    } else if (questionMode) {
      cur.question_sentences.push(sent);
    } else {
      cur.answer_sentences.push(sent);
    }
  }

  if (cur) {
    delete cur._speaker_key;
    groups.push(cur);
  }
  return groups;
}

/**
 * For QA conversations, produce two finding streams:
 * - analyst-question findings for the merged Q&A report section
 * - management-answer findings for the Outlook report section
 */
function computeQASubquotes(conv, bs, bankId = state.current_bank) {
  return [
    ..._computeQaSubquotesForMode(conv, bs, getQuestionFindingSentences(conv, bankId), 'question', bankId),
    ..._computeQaSubquotesForMode(conv, bs, getAnswerFindingSentences(conv, bankId), 'answer', bankId),
  ];
}

function getAllSubquotes(bankId) {
  const bank = state.banks[bankId];
  const bs   = getBankState(bankId);
  const result = [];
  (bank.md_blocks || []).forEach(blk => result.push(...computeMDSubquotes(blk, bs)));
  (bank.qa_conversations || []).forEach(conv => result.push(...computeQASubquotes(conv, bs, bankId)));
  return result;
}

function getSubquoteImportance(sq) {
  const sents = getSubquoteFindingSentences(sq);
  if (!sents || !sents.length) return 0;
  return Math.max(...sents.map(s => s.importance_score || 0));
}

function getSubquoteFormats(sq, fmt) {
  const sents = getSubquoteFindingSentences(sq);
  if (!sents) return '';
  const key = fmt === 'verbatim' ? 'text' : fmt;
  return sents.map(s => s[key] || s.text || '').join(' ').trim();
}

function getSubquoteBucketScore(sq) {
  const bucketId = sq.effective_bucket;
  const sents = getSubquoteFindingSentences(sq);
  if (!bucketId || !sents || !sents.length) return 0;
  return Math.max(...sents.map(s => Number((s.scores || {})[bucketId] || 0)));
}

function getSubquoteSentenceIds(sq) {
  const sents = getSubquoteFindingSentences(sq);
  return (sents || []).map(s => s.sid);
}

function isSubquoteForceIncluded(sq, bs) {
  return getSubquoteSentenceIds(sq).some(sid => getSentenceReviewStatus(sid) === 'selected');
}

function getReportSubquotes(bankId, bucketId) {
  const bs  = getBankState(bankId);
  const all = getAllSubquotes(bankId);
  let eligible = all.filter(sq =>
    sq.effective_bucket === bucketId &&
    getSubquoteSentenceIds(sq).some(sid => getSentenceReviewStatus(sid, bankId) === 'selected')
  );

  const order = bs.bucket_subquote_order && bs.bucket_subquote_order[bucketId];
  if (order && order.length) {
    const ordered = [];
    order.forEach(id => {
      const sq = eligible.find(x => x.id === id);
      if (sq) ordered.push(sq);
    });
    eligible.forEach(sq => { if (!order.includes(sq.id)) ordered.push(sq); });
    return ordered;
  }
  const ranked = [...eligible].sort((a, b) =>
    getSubquoteImportance(b) - getSubquoteImportance(a) ||
    getSubquoteBucketScore(b) - getSubquoteBucketScore(a) ||
    a.id.localeCompare(b.id)
  );
  return clusterSubquotesBySpeaker(ranked);
}

function getConfigChangeProposals(bankId) {

// Copy a string to the clipboard. Uses the async Clipboard API when available
// and falls back to a synthetic textarea for older browsers / local files.
function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    return navigator.clipboard.writeText(text).catch(() => _copyViaTextarea(text));
  }
  return Promise.resolve(_copyViaTextarea(text));
}
function _copyViaTextarea(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch (e) { /* ignore */ }
  document.body.removeChild(ta);
}

function copyProposedDescription(proposalId, btn) {
  const proposals = getConfigChangeProposals(state.current_bank);
  const proposal = proposals.find(item => item.id === proposalId);
  if (!proposal) return;
  const desc = (proposal.proposed_row || {}).category_description || '';
  copyToClipboard(desc).then(() => {
    if (!btn) return;
    const prev = btn.textContent;
    btn.textContent = 'Copied';
    btn.classList.add('btn-copied');
    setTimeout(() => { btn.textContent = prev; btn.classList.remove('btn-copied'); }, 1200);
  });
}

// Enable an emerging-topic proposal: create the bucket at the end of its
// report section, move every linked finding out of its current bucket into
// the new one, and normalize each finding's status to `candidate` so the
// user reviews them in their new home.
//
// Before reassigning, record each evidence's prior bucket + status on the
// proposal itself so disableEmergingCategory can restore the original state.
function enableEmergingCategory(proposalId, options = {}) {
  const proposals = getConfigChangeProposals(state.current_bank);
  const proposal = proposals.find(item => item.id === proposalId);
  if (!proposal || proposal.change_type !== 'new_category') return;

  // Idempotent: if we've already enabled this one, just re-render (unless the
  // caller asked us to stay silent during auto-enable on load).
  if (proposal.adopted_bucket_id && state.buckets.some(b => b.id === proposal.adopted_bucket_id)) {
    if (!options.silent) renderCurrentBank();
    return;
  }

  const bucket = createBucketFromRow(proposal.proposed_row || {}, {
    source: 'emerging',
  });
  proposal.adopted_bucket_id = bucket.id;

  const bs = getBankState(state.current_bank);
  if (!bs.sentence_user_primary) bs.sentence_user_primary = {};

  // Snapshot the pre-reassignment state so "disable" is a true reverse op.
  // sentence_user_primary may not yet have an entry for an evidence id — in
  // that case the effective bucket comes from the sentence's own
  // selected_bucket_id / primary, so we resolve via effectivePrimary.
  const originalAssignments = {};
  const originalStatuses = {};
  (proposal.linked_evidence_ids || []).forEach(evidenceId => {
    const hadExplicit = Object.prototype.hasOwnProperty.call(bs.sentence_user_primary, evidenceId);
    originalAssignments[evidenceId] = hadExplicit
      ? { kind: 'explicit', value: bs.sentence_user_primary[evidenceId] }
      : { kind: 'derived', value: effectivePrimary(evidenceId) };
    originalStatuses[evidenceId] = getSentenceReviewStatus(evidenceId);
    bs.sentence_user_primary[evidenceId] = bucket.id;
    // Emerging topics default to ON, so every linked finding is promoted to
    // 'selected' under the new bucket — this is what puts the category into
    // the TOC and the preview body. disableEmergingCategory restores the
    // snapshotted original status, so flipping the topic off reverts each
    // finding (including ones that were originally rejected or in review).
    setSentenceReviewStatus(evidenceId, 'selected');
  });
  proposal._original_assignments = originalAssignments;
  proposal._original_statuses = originalStatuses;

  if (!options.silent) renderCurrentBank();
}

// Reverse enableEmergingCategory: restore each evidence's prior bucket +
// status, then drop the emerging bucket from state.buckets. Clearing
// adopted_bucket_id makes the proposal re-enable-able.
function disableEmergingCategory(proposalId, options = {}) {
  const proposals = getConfigChangeProposals(state.current_bank);
  const proposal = proposals.find(item => item.id === proposalId);
  if (!proposal || proposal.change_type !== 'new_category') return;
  if (!proposal.adopted_bucket_id) {
    if (!options.silent) renderCurrentBank();
    return;
  }

  const bucketId = proposal.adopted_bucket_id;
  const bs = getBankState(state.current_bank);
  const originalAssignments = proposal._original_assignments || {};
  const originalStatuses = proposal._original_statuses || {};

  (proposal.linked_evidence_ids || []).forEach(evidenceId => {
    const prior = originalAssignments[evidenceId];
    if (prior && prior.kind === 'explicit') {
      bs.sentence_user_primary[evidenceId] = prior.value;
    } else if (bs.sentence_user_primary) {
      // The evidence never had an explicit override — drop the key so the
      // sentence falls back to its own selected_bucket_id/primary.
      delete bs.sentence_user_primary[evidenceId];
    }
    if (Object.prototype.hasOwnProperty.call(originalStatuses, evidenceId)) {
      setSentenceReviewStatus(evidenceId, originalStatuses[evidenceId]);
    }
  });

  // Remove the emerging bucket and any derived per-bank state that referenced
  // it (order maps, subquote bucket overrides). Skip it if the user has since
  // renamed it or reassigned other sentences — for now we trust the round trip.
  state.buckets = state.buckets.filter(b => b.id !== bucketId);
  if (bs.bucket_subquote_order) delete bs.bucket_subquote_order[bucketId];
  if (bs.subquote_bucket_overrides) {
    Object.keys(bs.subquote_bucket_overrides).forEach(sqid => {
      if (bs.subquote_bucket_overrides[sqid] === bucketId) {
        delete bs.subquote_bucket_overrides[sqid];
      }
    });
  }

  proposal.adopted_bucket_id = null;
  delete proposal._original_assignments;
  delete proposal._original_statuses;

  if (!options.silent) renderCurrentBank();
}

// One-time auto-enable on first load: emerging topics default to ON so the
// report opens with the proposed new categories already in place. The user
// can flip any of them off via the bar at the top of the draft preview.
let _emergingDefaultsApplied = false;
function applyEmergingTopicDefaults() {
  if (_emergingDefaultsApplied) return;
  _emergingDefaultsApplied = true;
  Object.keys((state.config_change_proposals || {}).by_bank || {}).forEach(bankId => {
    const prevBank = state.current_bank;
    state.current_bank = bankId;
    const proposals = getConfigChangeProposals(bankId).filter(
      p => p.change_type === 'new_category' && !p.adopted_bucket_id
    );
    proposals.forEach(p => enableEmergingCategory(p.id, { silent: true }));
    state.current_bank = prevBank;
  });
}

// Modal body: list of description-update proposals. Each card shows the old
// vs new description side-by-side with a Copy button. The "emerging topics"
// proposals live in a separate modal so the two concerns stay focused.
function renderConfigChangesModalBody() {
  const updates = getConfigChangeProposals(state.current_bank).filter(
    item => item.change_type === 'update_existing'
  );
  if (!updates.length) {
    return `<div class="modal-empty">No description updates proposed for this call.</div>`;
  }
  return `<div class="cfg-update-list">
    ${updates.map(item => {
      const proposed = item.proposed_row || {};
      const current = item.current_row || {};
      return `<div class="cfg-update-card">
        <div class="cfg-update-head">
          <div class="cfg-update-title">${esc(item.target_category_name || current.category_name || '')}</div>
          <button class="btn btn-primary btn-sm cfg-copy-btn"
                  onclick="copyProposedDescription('${item.id}', this)">
            Copy new description
          </button>
        </div>
        <div class="cfg-update-reason">${esc(item.change_summary || '')}</div>
        <div class="cfg-update-diff">
          <div class="cfg-update-col">
            <div class="cfg-update-col-label">Current</div>
            <div class="cfg-update-col-body">${esc(current.category_description || '')}</div>
          </div>
          <div class="cfg-update-col">
            <div class="cfg-update-col-label">Proposed</div>
            <div class="cfg-update-col-body cfg-update-col-body-new">${esc(proposed.category_description || '')}</div>
          </div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// Modal body: list of emerging-topic proposals with an Enable/Enabled toggle
// on each card. The toggle is the "authoritative" control — the compact bar
// at the top of the report draft mirrors the same state.
function renderEmergingTopicsModalBody() {
  const proposals = getConfigChangeProposals(state.current_bank).filter(
    item => item.change_type === 'new_category'
  );
  if (!proposals.length) {
    return `<div class="modal-empty">No emerging topics detected for this call.</div>`;
  }
  return `<div class="cfg-emerging-list">
    ${proposals.map(item => {
      const adopted = isEmergingAdopted(item);
      const linkedCount = (item.linked_evidence_ids || []).length;
      const proposed = item.proposed_row || {};
      return `<div class="cfg-emerging-card">
        <div class="cfg-emerging-head">
          <div>
            <div class="cfg-emerging-title">${esc(item.target_category_name || proposed.category_name || 'Emerging topic')}</div>
            <div class="cfg-emerging-meta">${esc(proposed.report_section || 'Outlook')} · ${esc(proposed.transcript_sections || 'ALL')} · ${linkedCount} finding${linkedCount === 1 ? '' : 's'} to reassign</div>
          </div>
          <label class="cfg-enable-toggle" title="${adopted ? 'Enabled in this report' : 'Not yet enabled'}">
            <input type="checkbox" ${adopted ? 'checked' : ''}
                   onchange="toggleEmergingCategory('${item.id}', this.checked)">
            <span>${adopted ? 'Enabled' : 'Enable'}</span>
          </label>
        </div>
        <div class="cfg-emerging-reason">${esc(item.change_summary || '')}</div>
        <details class="cfg-emerging-row">
          <summary>Config row to add</summary>
          ${renderConfigRowTable(proposed)}
        </details>
      </div>`;
    }).join('')}
  </div>`;
}

// Shortcut: "is this emerging proposal currently reflected in state.buckets?"
function isEmergingAdopted(proposal) {
  return !!proposal.adopted_bucket_id &&
    state.buckets.some(b => b.id === proposal.adopted_bucket_id);
}

// Routed both from the modal cards and from the bar at the top of the draft.
function toggleEmergingCategory(proposalId, wantEnabled) {
  if (wantEnabled) {
    enableEmergingCategory(proposalId);
  } else {
    disableEmergingCategory(proposalId);
  }
}

// ============================================================
// HEADER BUTTONS — BADGES + MODAL
// ============================================================
function updateHeaderBadges() {
  const proposals = getConfigChangeProposals(state.current_bank);
  const updates = proposals.filter(p => p.change_type === 'update_existing').length;
  const emerging = proposals.filter(p => p.change_type === 'new_category').length;
  _setBadge('config-changes-btn', 'config-changes-badge', updates);
  _setBadge('emerging-topics-btn', 'emerging-topics-badge', emerging);
}

function _setBadge(btnId, badgeId, count) {
  const btn = document.getElementById(btnId);
  const badge = document.getElementById(badgeId);
  if (!btn || !badge) return;
  if (count > 0) {
    btn.classList.remove('btn-disabled');
    btn.removeAttribute('aria-disabled');
    badge.textContent = count > 99 ? '99+' : String(count);
    badge.classList.remove('hidden');
  } else {
    btn.classList.add('btn-disabled');
    btn.setAttribute('aria-disabled', 'true');
    badge.textContent = '0';
    badge.classList.add('hidden');
  }
}

function openConfigChangesModal() {
  const btn = document.getElementById('config-changes-btn');
  if (btn && btn.classList.contains('btn-disabled')) return;
  _openProposalModal(
    'Config Proposals',
    'Description edits for existing categories, generated from the indexed findings. Copy the new description into the config sheet to adopt it.',
    renderConfigChangesModalBody()
  );
}

function openEmergingTopicsModal() {
  const btn = document.getElementById('emerging-topics-btn');
  if (btn && btn.classList.contains('btn-disabled')) return;
  _openProposalModal(
    'Emerging Topics',
    'New themes detected outside the current taxonomy. Enabled topics appear as new sections in the report and pull linked findings into them.',
    renderEmergingTopicsModalBody()
  );
}

function _openProposalModal(title, subtitle, bodyHtml) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-subtitle').textContent = subtitle;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('proposal-modal').classList.add('active');
}

function closeProposalModal() {
  document.getElementById('proposal-modal').classList.remove('active');
}

function handleModalBackdropClick(evt) {
  // Close only when the click lands on the backdrop, not on the modal box.
  if (evt.target.id === 'proposal-modal') closeProposalModal();
}

document.addEventListener('keydown', evt => {
  if (evt.key !== 'Escape') return;
  // Close whichever modal is active — both register the 'active' class on
  // their overlay. If neither is open, closing is a no-op.
  closeProposalModal();
  closeAddCategoryModal();
});

// ============================================================
// REPORT PANEL
// ============================================================
function renderReportPanel() {
  applyEmergingTopicDefaults();
  updateHeaderBadges();
  // If the currently-open modal is showing proposal content, refresh its body
  // so toggle flips from the bar stay in sync with the modal view.
  const modal = document.getElementById('proposal-modal');
  if (modal && modal.classList.contains('active')) {
    const title = document.getElementById('modal-title').textContent;
    if (title === 'Emerging Topics') {
      document.getElementById('modal-body').innerHTML = renderEmergingTopicsModalBody();
    } else if (title === 'Config Proposals') {
      document.getElementById('modal-body').innerHTML = renderConfigChangesModalBody();
    }
  }
  renderReportSections();
}

// The banner image doubles as a cover block inside the report paper; the TOC
// sits directly beneath it. `renderBannerCover` only emits markup when the
// banner toggle is on so the cover tracks the same visibility as the print
// masthead / screen banner.
function renderBannerCover() {
  const hasBanner = !!(state.banner_visible && state.banner_src);
  const metaText = getReportCoverMeta();
  const titleText = getCmMainTitle();
  if (!hasBanner && !metaText && !titleText) return '';
  return `<div class="rpt-cover${hasBanner ? '' : ' rpt-cover-noimg'}">
    ${hasBanner ? `<img src="${escAttr(state.banner_src)}" alt="Banner">` : ''}
    <div class="rpt-cover-copy">
      ${metaText ? `<div class="rpt-cover-meta">${esc(metaText)}</div>` : ''}
      ${titleText ? `<div class="rpt-cover-title">${esc(titleText)}</div>` : ''}
    </div>
  </div>`;
}

function sanitizeId(s) { return String(s).toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, ''); }

// Editorial TOC — renders L1 report-section headings with nested L2 bucket
// titles. Each anchor points at a `#sec_…` or `#bs_…` fragment; `target-counter`
// resolves the page number at print time, and on screen we hide the leader +
// page span so the rows read as clean clickable navigation.
function renderTableOfContents(orderedSections) {
  if (!orderedSections.length) return '';
  let html = `<nav class="rpt-toc" aria-label="Table of contents">
    <div class="rpt-toc-title">Contents</div>
    <ul class="rpt-toc-list">`;
  orderedSections.forEach(({name: secName, buckets}) => {
    const secId = 'sec_' + sanitizeId(secName);
    html += `<li class="rpt-toc-l1"><a href="#${secId}">
      <span class="rpt-toc-label">${esc(secName)}</span>
      <span class="rpt-toc-leader" aria-hidden="true"></span>
      <span class="rpt-toc-page" data-target="#${secId}"></span>
    </a>`;
    if (buckets.length) {
      html += `<ul class="rpt-toc-sublist">`;
      buckets.forEach(bucket => {
        const title = (state.bucket_user_titles || {})[bucket.id] || bucket.name;
        html += `<li class="rpt-toc-l2"><a href="#bs_${bucket.id}">
          <span class="rpt-toc-label">${esc(title)}</span>
          <span class="rpt-toc-leader" aria-hidden="true"></span>
          <span class="rpt-toc-page" data-target="#bs_${bucket.id}"></span>
        </a></li>`;
      });
      html += `</ul>`;
    }
    html += `</li>`;
  });
  html += `</ul></nav>`;
  return html;
}

function renderReportSections() {
  destroySortables();
  const orderedSections = getOrderedSections();

  let html = `<section class="rpt-sheet rpt-sheet-portrait" id="report-top">
    ${renderBannerCover()}
    ${renderTableOfContents(orderedSections)}
  </section>`;
  orderedSections.forEach(section => {
    html += renderCmSectionSheet(section);
  });
  document.getElementById('report-page').innerHTML = html;
  initSortables();
}

function renderCmSectionSheet(section) {
  const secId = 'sec_' + sanitizeId(section.name);
  const tableHtml = section.name === 'Outlook'
    ? renderCmOutlookTable(section.buckets)
    : renderCmQaTable(section.buckets);
  return `<section class="rpt-sheet rpt-sheet-landscape" id="${secId}">
    ${renderCmPageHeader(section.name)}
    ${tableHtml}
  </section>`;
}

function renderCmPageHeader(sectionName) {
  const subtitle = getSectionSubtitle(sectionName);
  return `<div class="cm-page-header">
    <div class="cm-main-title">${esc(getCmMainTitle())}</div>
    ${subtitle ? `<div class="cm-section-subtitle">${esc(subtitle)}</div>` : ''}
  </div>`;
}

function renderCmOutlookTable(sectionBuckets) {
  const anchoredBuckets = new Set();
  const rows = getReportBankIds().map(bankId => {
    const categoryHtml = sectionBuckets.map(bucket => {
      const quotes = getReportSubquotes(bankId, bucket.id).map(sq => ({ ...sq, bank_id: bankId }));
      if (!quotes.length) return '';
      const anchorAttr = anchoredBuckets.has(bucket.id) ? '' : ` id="bs_${bucket.id}"`;
      anchoredBuckets.add(bucket.id);
      return `<div class="cm-outlook-category"${anchorAttr}>
        <div class="cm-category-title">${esc(getBucketDisplayTitle(bucket))}:</div>
        ${bucket.generated_headline ? `<div class="cm-category-headline">${esc(bucket.generated_headline)}</div>` : ''}
        ${quotes.map(sq => renderCmOutlookFinding(sq, bucket, bankId)).join('')}
      </div>`;
    }).filter(Boolean).join('');
    if (!categoryHtml) return '';
    return `<tr>
      <td class="cm-bank-cell">${esc(getBankTickerLabel(bankId))}</td>
      <td class="cm-outlook-cell">${categoryHtml}</td>
    </tr>`;
  }).filter(Boolean).join('');
  if (!rows) {
    return '<div class="cm-empty">No outlook findings selected.</div>';
  }
  return `<table class="cm-table cm-table-outlook">
    <colgroup>
      <col class="cm-col-bank">
      <col>
    </colgroup>
    <thead>
      <tr>
        <th>Banks</th>
        <th>Investment Banking and Trading Outlook</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderCmQaTable(sectionBuckets) {
  const rows = [];
  sectionBuckets.forEach(bucket => {
    const bankGroups = getReportBucketGroups(bucket.id);
    bankGroups.forEach((group, idx) => {
      rows.push(`<tr${idx === 0 ? ` id="bs_${bucket.id}"` : ''}>
        <td class="cm-theme-cell">${idx === 0 ? esc(getBucketDisplayTitle(bucket)) : ''}</td>
        <td class="cm-bank-cell">${esc(getBankTickerLabel(group.bankId))}</td>
        <td>
          <div class="cm-question-list">
            ${group.quotes.map(sq => renderCmQaFinding(sq, bucket, group.bankId)).join('')}
          </div>
        </td>
      </tr>`);
    });
  });
  if (!rows.length) {
    return '<div class="cm-empty">No Q&A findings selected.</div>';
  }
  return `<table class="cm-table cm-table-qa">
    <colgroup>
      <col class="cm-col-theme">
      <col class="cm-col-question-bank">
      <col>
    </colgroup>
    <thead>
      <tr>
        <th>Themes</th>
        <th>Banks</th>
        <th>Relevant Questions</th>
      </tr>
    </thead>
    <tbody>${rows.join('')}</tbody>
  </table>`;
}

function renderCmFindingHeaderActions(sq, bankId) {
  const edited = !!getSubquoteTextOverride(sq.id, getBankState(bankId));
  const revertBtnHtml = edited
    ? `<button class="q-revert" onclick="event.stopPropagation();revertSubquoteEdit('${sq.id}', '${bankId}')" title="Revert to original text">${REVERT_SVG}</button>`
    : '';
  const editBtnHtml = `<button class="q-edit" onclick="event.stopPropagation();editSubquote('${sq.id}', '${bankId}')" title="Edit text">${EDIT_SVG}</button>`;
  return `<div class="q-card-header">
    <span class="q-hdr-spacer"></span>
    ${editBtnHtml}
    ${revertBtnHtml}
    <button class="q-del" onclick="event.stopPropagation();deleteSubquote('${sq.id}', '${bankId}')" title="Remove from report">&#215;</button>
  </div>`;
}

function renderCmOutlookFinding(sq, bucket, bankId) {
  const cardStateCls = [];
  if (state.highlighted_bucket_id && state.highlighted_bucket_id === bucket.id) {
    cardStateCls.push('q-card-cat-highlighted');
  }
  if (state.selected_subquote_id === sq.id && state.selected_subquote_bank_id === bankId) {
    cardStateCls.push('q-card-selected');
  }
  const cardClsAttr = cardStateCls.length ? ' ' + cardStateCls.join(' ') : '';
  return `<div class="cm-finding q-card${cardClsAttr}" data-subquote-id="${sq.id}" data-bank-id="${bankId}">
    ${renderCmFindingHeaderActions(sq, bankId)}
    <div class="cm-quote-line">
      <span class="cm-quote-mark">"</span><div class="q-text cm-inline-text">${renderSubquoteText(sq, 'verbatim', getBankState(bankId), bankId)}</div><span class="cm-quote-mark">"</span>
    </div>
  </div>`;
}

function renderCmQaFinding(sq, bucket, bankId) {
  const cardStateCls = [];
  if (state.highlighted_bucket_id && state.highlighted_bucket_id === bucket.id) {
    cardStateCls.push('q-card-cat-highlighted');
  }
  if (state.selected_subquote_id === sq.id && state.selected_subquote_bank_id === bankId) {
    cardStateCls.push('q-card-selected');
  }
  const cardClsAttr = cardStateCls.length ? ' ' + cardStateCls.join(' ') : '';
  return `<div class="cm-question-item q-card${cardClsAttr}" data-subquote-id="${sq.id}" data-bank-id="${bankId}">
    <span class="cm-question-bullet">&bull;</span>
    <div class="cm-question-body">
      ${renderCmFindingHeaderActions(sq, bankId)}
      <div class="q-text">${renderSubquoteText(sq, 'verbatim', getBankState(bankId), bankId)}</div>
    </div>
  </div>`;
}

function renderBucketBankGroup(group, bucket) {
  const bank = getCurrentBankData(group.bankId);
  const ticker = getBankTickerLabel(group.bankId);
  const speakerBatchMeta = buildSpeakerBatchMeta(group.quotes);
  return `<div class="bkt-bank-group" data-bank-id="${group.bankId}">
    <div class="bkt-bank-label">
      <span>${esc(ticker)}</span>
      <span class="bkt-bank-label-name">${esc(bank.company_name || bank.name || group.bankId)}</span>
    </div>
    <div class="bkt-bank-quotes" data-bucket-id="${bucket.id}" data-bank-id="${group.bankId}">
      ${group.quotes.map(sq => renderSubquoteCard(sq, bucket, speakerBatchMeta.get(sq.id) || {})).join('')}
    </div>
  </div>`;
}

function renderSubquoteCard(sq, bucket, displayMeta = {}) {
  const bankId = sq.bank_id || state.current_bank;
  const bs     = getBankState(bankId);
  // fmt is now a 2-value toggle: 'verbatim' (off) or 'condensed' (on = summarize).
  const fmt    = (bs.subquote_formats && bs.subquote_formats[sq.id]) || 'verbatim';
  const summarizeOn = fmt === 'condensed';
  const isMD   = sq.type === 'md';
  const isEdited = !!getSubquoteTextOverride(sq.id, bs);

  const textContent = renderSubquoteText(sq, fmt, bs);
  // When edited, the text is custom — "Show more" truncation is based on
  // the override length, not the original verbatim length.
  const measureLen = isEdited
    ? getSubquoteTextOverride(sq.id, bs).length
    : getSubquoteFormats(sq, 'verbatim').length;
  const isLong = measureLen > 600;
  const expandBtn = isLong
    ? `<button class="q-expand-btn" onclick="expandCard(this)">Show more &#9662;</button>`
    : '';

  // Attribution line
  const speakerMeta = getSubquoteSpeakerMeta(sq);
  const attribName = speakerMeta.name;
  const attribTitle = speakerMeta.title;
  const attribLine = attribTitle
    ? `${attribName}, ${attribTitle}`
    : (speakerMeta.affiliation ? `${attribName} (${speakerMeta.affiliation})` : attribName);
  const questionMode = !isMD && sq.render_mode === 'question';

  // QA card shows the analyst question as context above the executive
  // answer text. Prefer the model-generated `analyst_question_summary` (a
  // single short clause) over the raw verbatim question, which can run on
  // for paragraphs and bury the actual context. The verbatim text is kept
  // as the title attribute so the user can hover to see the original.
  // Only the first card of each QA cluster emits the eyebrow — subsequent
  // findings in the same conversation render as plain bullets beneath it.
  let qaContextHtml = '';
  if (!isMD && !questionMode && displayMeta.showQaContext !== false) {
    const verbatim = (sq.question_sentences || []).map(s => s.text).join(' ');
    const summary = (sq.analyst_question_summary || '').trim();
    const questionText = summary || verbatim;
    const verbatimTitle = summary ? ` title="${escAttr(verbatim)}"` : '';
    const analystName = esc(sq.analyst_name || 'Analyst');
    const analystAffil = sq.analyst_affiliation
      ? ` <span style="opacity:.7">(${esc(sq.analyst_affiliation)})</span>`
      : '';
    qaContextHtml = `
    <div class="qa-card-q">
      <div class="qa-card-q-eyebrow">
        <span>In response to</span>
        <span class="qa-card-q-eyebrow-name">${analystName}${analystAffil}</span>
      </div>
      <div class="qa-card-q-text"${verbatimTitle}>${esc(questionText)}</div>
    </div>`;
  }

  // When the user has edited the finding, the Summarize toggle no longer
  // applies (the text is custom) — hide it and surface a "Revert" affordance
  // instead. Revert deletes the override, restoring the sentence-derived view.
  const summarizeToggleHtml = isEdited ? '' : `
    <label class="fmt-toggle" onclick="event.stopPropagation()">
      <input type="checkbox" ${summarizeOn ? 'checked' : ''}
             onchange="switchFmt('${sq.id}', '${bankId}', this.checked ? 'condensed' : 'verbatim')">
      <span>Summarize</span>
    </label>`;
  const editedBadgeHtml = isEdited
    ? `<span class="q-edited-badge" title="Text has been manually edited">edited</span>`
    : '';
  const revertBtnHtml = isEdited
    ? `<button class="q-revert" onclick="revertSubquoteEdit('${sq.id}', '${bankId}')" title="Revert to original text">${REVERT_SVG}</button>`
    : '';
  const editBtnHtml = `<button class="q-edit" onclick="editSubquote('${sq.id}', '${bankId}')" title="Edit text">${EDIT_SVG}</button>`;

  // Card-level state classes. Category highlight (blue fill + border) wins
  // over the single-finding border when both would apply — the box-shadow is
  // identical either way, so we just add both without concern for layering.
  const cardStateCls = [];
  if (state.highlighted_bucket_id && state.highlighted_bucket_id === bucket.id) {
    cardStateCls.push('q-card-cat-highlighted');
  }
  if (state.selected_subquote_id === sq.id && state.selected_subquote_bank_id === bankId) {
    cardStateCls.push('q-card-selected');
  }
  if (displayMeta.batchClass) {
    cardStateCls.push(displayMeta.batchClass);
  }
  const cardClsAttr = cardStateCls.length ? ' ' + cardStateCls.join(' ') : '';
  const attribHtml = displayMeta.showAttribution === false
    ? ''
    : `<div class="q-attrib"><span>${esc(attribLine)}</span></div>`;

  return `
<div class="q-card${cardClsAttr}" data-subquote-id="${sq.id}" data-bank-id="${bankId}">
  <div class="q-card-header">
    <span class="drag-handle">&#8942;</span>
    ${summarizeToggleHtml}
    ${editedBadgeHtml}
    <span class="q-hdr-spacer"></span>
    ${editBtnHtml}
    ${revertBtnHtml}
    <button class="q-del" onclick="deleteSubquote('${sq.id}', '${bankId}')" title="Remove from report">&#215;</button>
  </div>
  ${qaContextHtml}
  <div class="q-text">${textContent}</div>
  ${expandBtn}
  ${attribHtml}
</div>`;
}

function getSubquoteTextOverride(sqid, bs) {
  if (!bs || !bs.subquote_text_overrides) return null;
  const v = bs.subquote_text_overrides[sqid];
  return (typeof v === 'string' && v.length) ? v : null;
}

function renderSubquoteText(sq, fmt, bs, bankId = sq.bank_id || state.current_bank) {
  // User-edited override: render as plain paragraphs, no sentence spans.
  // The original remains derivable from sq.sentences/sq.answer_sentences,
  // so "revert" is just deleting this override key.
  const override = getSubquoteTextOverride(sq.id, bs);
  if (override) {
    return override.split(/\n\n+/).filter(Boolean)
      .map(p => `<p>${esc(p.trim())}</p>`).join('') || `<p>${esc(override)}</p>`;
  }

  const useSpans = fmt === 'verbatim' || fmt === 'condensed';
  const sents = getSubquoteFindingSentences(sq);
  const isQA = sq.type === 'qa';

  if (!sents) return '';

  if (useSpans) {
    // Report-panel sentence spans are read-only. Classification is reachable
    // only from the transcript side — clicks here bubble up to the delegated
    // handler on #report-body, which scrolls the transcript to this finding.
    return `<p>${sents.map(s => {
      const bid = effectivePrimary(s.sid, bankId);
      const bkt = getBucket(bid);
      const text = fmt === 'condensed' ? (s.condensed || s.text) : s.text;
      return `<span class="s-tok${isQA?' qa-sent':''}"
        data-sid="${s.sid}" data-btype="${isQA?'qa':'md'}"
        data-primary="${bid}"
        style="background:${bkt.color_bg};border-bottom-color:${bkt.color_accent}">${esc(text)}</span>`;
    }).join(' ')}</p>`;
  }

  // Non-span formats — plain text, no spans
  const text = sents.map(s => s[fmt] || s.text || '').join(' ').trim();
  return text.split(/\n\n+/).filter(Boolean).map(p => `<p>${esc(p.trim())}</p>`).join('');
}

function expandCard(btn) {
  btn.closest('.q-card').querySelector('.q-text').style.maxHeight = 'none';
  btn.remove();
}

// ============================================================
// DRAG & DROP (Sortable.js — subquote level)
// ============================================================
function destroySortables() {
  sortableInstances.forEach(s => s.destroy());
  sortableInstances = [];
}
function initSortables() {
  if (typeof Sortable === 'undefined') return;
  document.querySelectorAll('.bkt-bank-quotes').forEach(container => {
    const bankId = container.dataset.bankId || '';
    sortableInstances.push(Sortable.create(container, {
      group: `report-subquotes-${bankId}`,
      animation: 150,
      handle: '.drag-handle',
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      onEnd(evt) {
        const sqid = evt.item.dataset.subquoteId;
        const from = evt.from.dataset.bucketId;
        const to   = evt.to.dataset.bucketId;
        handleSubquoteDrop(sqid, from, to, evt.to.dataset.bankId || bankId);
      },
    }));
  });
}

function handleSubquoteDrop(sqid, fromBid, toBid, bankId = state.current_bank) {
  const bs = getBankState(bankId);
  const sq = getAllSubquotes(bankId).find(x => x.id === sqid);
  const targetBucket = getBucket(toBid);
  const transcriptSection = sq && sq.type === 'md' ? 'MD' : 'QA';

  if (!sq || !bucketAppliesTo(targetBucket, transcriptSection)) {
    renderReportPanel();
    if (bankId === state.current_bank) renderTranscriptBody();
    return;
  }

  if (fromBid !== toBid) {
    if (!bs.subquote_bucket_overrides) bs.subquote_bucket_overrides = {};
    bs.subquote_bucket_overrides[sqid] = toBid;
    if (!bs.sentence_user_primary) bs.sentence_user_primary = {};
    const sents = getSubquoteFindingSentences(sq);
    (sents || []).forEach(s => {
      bs.sentence_user_primary[s.sid] = toBid;
      setSentenceReviewStatus(s.sid, 'selected', bankId);
    });
  }

  const targetEl = document.getElementById(`bq_${toBid}`);
  if (targetEl) {
    const ids = [...targetEl.querySelectorAll('[data-subquote-id]')].map(el => el.dataset.subquoteId);
    if (!bs.bucket_subquote_order) bs.bucket_subquote_order = {};
    bs.bucket_subquote_order[toBid] = ids;
  }
  if (fromBid !== toBid) {
    const fromEl = document.getElementById(`bq_${fromBid}`);
    if (fromEl) {
      const ids = [...fromEl.querySelectorAll('[data-subquote-id]')].map(el => el.dataset.subquoteId);
      if (!bs.bucket_subquote_order) bs.bucket_subquote_order = {};
      bs.bucket_subquote_order[fromBid] = ids;
    }
  }
  renderReportPanel();
  if (bankId === state.current_bank) renderTranscriptBody();
}
