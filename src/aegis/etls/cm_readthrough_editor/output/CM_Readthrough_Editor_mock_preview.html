function switchFmt(sqid, bankId, fmt) {
  const bs = getBankState(bankId);
  if (!bs.subquote_formats) bs.subquote_formats = {};
  bs.subquote_formats[sqid] = fmt;

  const card = document.querySelector(`[data-subquote-id="${sqid}"][data-bank-id="${bankId}"]`);
  if (!card) return;
  const sq  = getAllSubquotes(bankId).find(x => x.id === sqid);
  if (!sq) return;

  const textDiv = card.querySelector('.q-text');
  textDiv.innerHTML = renderSubquoteText(sq, fmt, bs, bankId);
}

function deleteSubquote(sqid, bankId) {
  const sq = getAllSubquotes(bankId).find(x => x.id === sqid);
  if (!sq) return;

  const sents = getSubquoteFindingSentences(sq);
  setSentenceReviewStatus((sents || []).map(s => s.sid), 'rejected', bankId);

  // Surgical DOM removal to avoid full re-render
  const card = document.querySelector(`[data-subquote-id="${sqid}"][data-bank-id="${bankId}"]`);
  if (card) card.remove();
  // Update transcript block colors
  renderReportPanel();
  if (bankId === state.current_bank) renderTranscriptBody();
}

// ------------------------------------------------------------
// MANUAL FINDING EDITS
// ------------------------------------------------------------
// A user-edited finding stores its override plain text on the bank state
// (bs.subquote_text_overrides[sqid]). The original is always derivable from
// the sentence data, so "revert" is implemented as simply deleting the key.
// The sentence-level spans/highlighting are dropped while an override is in
// effect — custom text has no 1:1 mapping back to source sentences.
function getSubquotePlainText(sq, fmt, bs) {
  // Seed the edit textarea with whatever text the user is currently seeing.
  // If already edited, seed with the override so further edits compound.
  const override = getSubquoteTextOverride(sq.id, bs);
  if (override) return override;
  return subquoteTextForDocx(sq, fmt);
}

function editSubquote(sqid, bankId) {
  const sq = getAllSubquotes(bankId).find(x => x.id === sqid);
  if (!sq) return;
  const bs = getBankState(bankId);
  const fmt = (bs.subquote_formats && bs.subquote_formats[sqid]) || 'verbatim';
  const seedText = getSubquotePlainText(sq, fmt, bs);

  const card = document.querySelector(`[data-subquote-id="${sqid}"][data-bank-id="${bankId}"]`);
  if (!card) return;
  // If a textarea is already open (double-click), don't re-open.
  if (card.querySelector('.q-edit-area')) return;

  const textDiv = card.querySelector('.q-text');
  if (!textDiv) return;

  // Stash the pre-edit HTML so Cancel can restore without a full re-render.
  textDiv.dataset.preEditHtml = textDiv.innerHTML;
  textDiv.classList.add('q-text-editing');

  const rowsGuess = Math.min(20, Math.max(4, (seedText.match(/\n/g) || []).length + Math.ceil(seedText.length / 90)));
  textDiv.innerHTML = `
    <textarea class="q-edit-area" rows="${rowsGuess}" aria-label="Edit finding text">${esc(seedText)}</textarea>
    <div class="q-edit-actions">
      <button class="q-edit-cancel" onclick="cancelSubquoteEdit('${sqid}', '${bankId}')">Cancel</button>
      <button class="q-edit-save" onclick="saveSubquoteEdit('${sqid}', '${bankId}')">Save</button>
    </div>
  `;
  const ta = textDiv.querySelector('textarea');
  if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }

  // Expand any truncated region so the full text is visible while editing.
  textDiv.style.maxHeight = 'none';
  const existingExpand = card.querySelector('.q-expand-btn');
  if (existingExpand) existingExpand.style.display = 'none';
}

function cancelSubquoteEdit(sqid, bankId) {
  const card = document.querySelector(`[data-subquote-id="${sqid}"][data-bank-id="${bankId}"]`);
  if (!card) return;
  const textDiv = card.querySelector('.q-text');
  if (!textDiv) return;
  if (textDiv.dataset.preEditHtml !== undefined) {
    textDiv.innerHTML = textDiv.dataset.preEditHtml;
    delete textDiv.dataset.preEditHtml;
  }
  textDiv.classList.remove('q-text-editing');
  textDiv.style.maxHeight = '';
  const existingExpand = card.querySelector('.q-expand-btn');
  if (existingExpand) existingExpand.style.display = '';
}

function saveSubquoteEdit(sqid, bankId) {
  const card = document.querySelector(`[data-subquote-id="${sqid}"][data-bank-id="${bankId}"]`);
  if (!card) return;
  const ta = card.querySelector('.q-edit-area');
  if (!ta) return;
  const newText = (ta.value || '').trim();
  if (!newText) {
    // Empty text is treated as cancel — deleting the finding has its own
    // affordance (the × button) and shouldn't happen by accident here.
    cancelSubquoteEdit(sqid, bankId);
    return;
  }

  const bs = getBankState(bankId);
  if (!bs.subquote_text_overrides) bs.subquote_text_overrides = {};
  bs.subquote_text_overrides[sqid] = newText;

  // Full re-render of the card so header toggles/badges reflect edited state.
  renderReportPanel();
  if (bankId === state.current_bank) renderTranscriptBody();
}

function revertSubquoteEdit(sqid, bankId) {
  const bs = getBankState(bankId);
  if (!bs.subquote_text_overrides) return;
  if (!(sqid in bs.subquote_text_overrides)) return;
  delete bs.subquote_text_overrides[sqid];
  renderReportPanel();
  if (bankId === state.current_bank) renderTranscriptBody();
}

function showAddMenu(convId, anchor) {
  document.querySelectorAll('.atr-menu').forEach(m => m.remove());
  const menu = document.createElement('div');
  menu.className = 'atr-menu';
  state.buckets.forEach(b => {
    const item = document.createElement('div');
    item.className = 'atr-item';
    item.innerHTML = `<span class="atr-dot" style="background:${b.color_accent}"></span>${esc(bucketLabel(b))}`;
    item.onclick = () => { addConvToReport(convId, b.id); menu.remove(); };
    menu.appendChild(item);
  });

  const rect = anchor.getBoundingClientRect();
  menu.style.top  = (rect.bottom + 4) + 'px';
  menu.style.left = Math.min(rect.left, window.innerWidth - 220) + 'px';
  document.body.appendChild(menu);
  setTimeout(() => {
    const close = e => { if (!menu.contains(e.target)) { menu.remove(); document.removeEventListener('mousedown', close); } };
    document.addEventListener('mousedown', close);
  }, 50);
}

function addConvToReport(convId, bucketId) {
  const bs = getBankState(state.current_bank);
  const bank = state.banks[state.current_bank];
  const conv = (bank.qa_conversations || []).find(c => c.id === convId);
  if (!conv) return;
  const bucket = getBucket(bucketId);
  const findings = bucket.report_section === 'Outlook'
    ? getAnswerFindingSentences(conv, state.current_bank)
    : getQuestionFindingSentences(conv, state.current_bank);

  if (!bs.sentence_user_primary) bs.sentence_user_primary = {};
  findings.forEach(s => {
    bs.sentence_user_primary[s.sid] = bucketId;
    setSentenceReviewStatus(s.sid, 'selected');
  });

  renderReportSections();
  renderTranscriptBody();
}

  const chev = document.getElementById(`bkv_${id}`);
  if (!el) return;
  const hidden = el.style.display === 'none';

    chev.classList.add(hidden ? 'open' : 'closed');
  }
}

function getBankState(bankId) {
  if (!state.bank_states) state.bank_states = {};
  if (!state.bank_states[bankId]) {
    state.bank_states[bankId] = {
      sentence_user_primary: {},
      sentence_status_overrides: {},
      subquote_bucket_overrides: {}, bucket_subquote_order: {}, subquote_formats: {},
      subquote_text_overrides: {},
    };
  }
  return state.bank_states[bankId];
}

function findSentence(sid) {
  for (const bank of Object.values(state.banks)) {
    for (const blk of (bank.md_blocks || [])) {
      const s = blk.sentences.find(x => x.sid === sid);
      if (s) return s;
    }
    for (const conv of (bank.qa_conversations || [])) {
      const s = [...conv.question_sentences, ...conv.answer_sentences].find(x => x.sid === sid);
      if (s) return s;
    }
  }
  return null;
}

// ============================================================
// SAVE
// ============================================================
function saveReport() {
  const ts = new Date().toISOString().replace(/[:.]/g,'').slice(0,15);
  const stateJson = JSON.stringify(state, null, 2).replace(/<\/script>/gi, '<\\/script>');
  const newHtml = __HTML_TPL__.replace(
    /\/\* __BEGIN_STATE__ \*\/[\s\S]*?\/\* __END_STATE__ \*\//,
    `/* __BEGIN_STATE__ */\n${stateJson}\n/* __END_STATE__ */`
  );
  const blob = new Blob([newHtml], {type:'text/html;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `cm_readthrough_${ts}.html`; a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
// PDF / DOCX EXPORT
// ============================================================
// Export happens fully client-side from the saved HTML so the user can refine
// the draft first, then download a clean PDF or DOCX that matches the edited
// state rather than the original ETL output.
function ensurePdfLibrary() {
  if (window.jspdf && window.jspdf.jsPDF) return Promise.resolve(window.jspdf);
  if (window._jspdfLibPromise) return window._jspdfLibPromise;
  window._jspdfLibPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js';
    s.crossOrigin = 'anonymous';
    s.onload = () => (
      window.jspdf && window.jspdf.jsPDF
        ? resolve(window.jspdf)
        : reject(new Error('jsPDF loaded but window.jspdf.jsPDF is unavailable'))
    );
    s.onerror = () => reject(new Error('Failed to load jsPDF from unpkg'));
    document.head.appendChild(s);
  });
  return window._jspdfLibPromise;
}

function ensureDocxLibrary() {
  if (window.docx) return Promise.resolve(window.docx);
  if (window._docxLibPromise) return window._docxLibPromise;
  window._docxLibPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/docx@8.5.0/build/index.umd.js';
    s.crossOrigin = 'anonymous';
    s.onload = () => (
      window.docx
        ? resolve(window.docx)
        : reject(new Error('docx library loaded but window.docx is undefined'))
    );
    s.onerror = () => reject(new Error('Failed to load docx library from unpkg'));
    document.head.appendChild(s);
  });
  return window._docxLibPromise;
}

// Rasterise SVG/PNG/JPEG banners to PNG bytes + data URL so both jsPDF and
// DOCX ImageRun can share the same in-browser asset preparation path.
function rasterizeImageForExport(src, maxWidth = 1600) {
  return new Promise((resolve) => {
    if (!src) return resolve(null);
    const img = new Image();
    img.onload = () => {
      try {
        const scale = Math.min(1, maxWidth / Math.max(1, img.naturalWidth || img.width));
        const w = Math.round((img.naturalWidth || img.width) * scale) || maxWidth;
        const h = Math.round((img.naturalHeight || img.height) * scale) || 200;
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/png');
        canvas.toBlob(async (blob) => {
          if (!blob) return resolve(null);
          const ab = await blob.arrayBuffer();
          resolve({ data: new Uint8Array(ab), dataUrl, width: w, height: h });
        }, 'image/png');
      } catch (e) {
        console.warn('rasterizeImageForExport failed:', e);
        resolve(null);
      }
    };
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

// Extract plain text for exports — mirrors the screen-format toggle but strips
// browser-only highlighting spans. User text overrides win over sentence data.
function subquoteTextForDocx(sq, fmt, bs) {
  const bankState = bs || (state && state.current_bank ? getBankState(state.current_bank) : null);
  const override = bankState ? getSubquoteTextOverride(sq.id, bankState) : null;
  if (override) return override;
  const sents = getSubquoteFindingSentences(sq);
  if (!sents || !sents.length) return '';
  const key = fmt === 'verbatim' ? 'text' : (fmt || 'text');
  return sents.map(s => (s[key] || s.text || '').trim()).filter(Boolean).join(' ');
}

function getFindingAttribution(sq) {
  const isMD = sq.type === 'md';
  const questionMode = !isMD && sq.render_mode === 'question';
  const affiliation = questionMode ? (sq.analyst_affiliation || '') : '';
  const name = isMD
    ? sq.speaker
    : questionMode
      ? (sq.analyst_name || 'Analyst')
      : (sq.executive_name || 'Executive');
  const title = isMD
    ? (sq.speaker_title || '')
    : questionMode
      ? ''
      : (sq.executive_title || '');
  if (title) return `${name}, ${title}`;
  if (affiliation) return `${name} (${affiliation})`;
  return name;
}

function sanitizeFilenamePart(value, fallback = 'report') {
  const normalized = String(value || '')
    .trim()
    .replace(/[<>:"/\\|?*\x00-\x1F]+/g, ' ')
    .replace(/\s+/g, ' ')
    .replace(/[. ]+$/g, '')
    .trim();
  return normalized || fallback;
}

function formatExportTimestamp(date = new Date()) {
  const pad = num => String(num).padStart(2, '0');
  return [
    date.getFullYear(),
    pad(date.getMonth() + 1),
    pad(date.getDate()),
  ].join('-') + ' ' + [
    pad(date.getHours()),
    pad(date.getMinutes()),
    pad(date.getSeconds()),
  ].join('-');
}

function buildExportFilename(ext, bankId = state && state.current_bank) {
  const bank = getCurrentBankData(bankId);
  const bankLabel = sanitizeFilenamePart(bank.company_name || bank.ticker || bankId, 'Bank');
  const periodLabel = sanitizeFilenamePart(getReportPeriodLabel(), 'Period');
  const reportScope = sanitizeFilenamePart(
    [bankLabel, periodLabel].filter(Boolean).join(' '),
    bankLabel || periodLabel || 'Report'
  );
  const timestamp = sanitizeFilenamePart(formatExportTimestamp(), 'Date Time');
  const extension = String(ext || '').replace(/^\.+/, '') || 'txt';
  return `CM Readthrough - ${reportScope} - ${timestamp}.${extension}`;
}

function pdfWrapText(doc, text, maxWidth, fontName, fontStyle, fontSize) {
  const blocks = String(text || '')
    .replace(/\r\n/g, '\n')
    .split(/\n+/)
    .map(part => part.trim())
    .filter(Boolean);
  if (!blocks.length) return [];
  doc.setFont(fontName, fontStyle);
  doc.setFontSize(fontSize);
  return blocks.flatMap(part => doc.splitTextToSize(part, maxWidth)).filter(Boolean);
}

function drawPdfLines(doc, lines, x, y, lineHeight, options = {}) {
  if (!lines.length) return y;
  lines.forEach((line, idx) => {
    doc.text(line, x, y + (idx * lineHeight), options);
  });
  return y + (lines.length * lineHeight);
}

// Numerals for the editorial spine. CSS does the work in the HTML preview;
// PDF and DOCX have to format the numbers manually because they don't read
// CSS counters.
function toRomanNumeral(n) {
  const numerals = [
    ['M', 1000], ['CM', 900], ['D', 500], ['CD', 400],
    ['C', 100], ['XC', 90], ['L', 50], ['XL', 40],
    ['X', 10], ['IX', 9], ['V', 5], ['IV', 4], ['I', 1],
  ];
  let value = Math.max(1, Math.floor(Number(n) || 1));
  let result = '';
  for (const [letter, magnitude] of numerals) {
    while (value >= magnitude) { result += letter; value -= magnitude; }
  }
  return result;
}

function padTwoDigit(n) {
  const v = Math.max(0, Math.floor(Number(n) || 0));
  return v < 10 ? '0' + v : String(v);
}

// Returns null when the subquote isn't a QA finding or has no question text.
// Used by both the PDF and DOCX renderers so the editorial eyebrow + italic
// quote treatment stays consistent across formats.
function getQaContextParts(sq) {
  if (!sq || sq.type !== 'qa' || sq.render_mode === 'question') return null;
  const verbatim = (sq.question_sentences || []).map(s => s.text).join(' ').trim();
  const summary = (sq.analyst_question_summary || '').trim();
  const question = summary || verbatim;
  if (!question) return null;
  const analystName = (sq.analyst_name || 'Analyst').trim();
  const analystAffil = (sq.analyst_affiliation || '').trim();
  const eyebrowName = analystAffil ? `${analystName} (${analystAffil})` : analystName;
  return { eyebrow: 'In response to', name: eyebrowName, question };
}

function getPdfLayout(doc) {
  const pageWidth = doc.internal.pageSize.getWidth();
  const pageHeight = doc.internal.pageSize.getHeight();
  // Use narrower export margins than the screen preview so PDF lines carry
  // more text across the page without changing the on-screen editing layout.
  // contentTopBody leaves room for the running header on body pages; the
  // cover and TOC use the looser contentTop so the masthead breathes.
  const marginLeft = 28;
  const marginRight = 28;
  const contentTop = 42;
  const contentTopBody = 64;
  const contentBottom = pageHeight - 42;
  return {
    pageWidth,
    pageHeight,
    marginLeft,
    marginRight,
    contentTop,
    contentTopBody,
    contentBottom,
    contentWidth: pageWidth - marginLeft - marginRight,
    footerY: pageHeight - 18,
    runningHeaderY: 30,
    runningHeaderRuleY: 40,
    accent: { r: 178, g: 90, b: 30 },      // --accent
    rule:   { r: 217, g: 208, b: 188 },    // --rule
    rule2:  { r: 231, g: 223, b: 204 },    // --rule-2
    text3:  { r: 122, g: 115, b: 100 },    // --text-3
    text2:  { r: 74,  g: 82,  b: 104 },    // --text-2
    ink:    { r: 15,  g: 27,  b: 45 },     // --ink
    cover: {
      bannerMaxHeight: 150,
      bannerGap: 18,
      metaFontSize: 10.5,
      metaLineHeight: 13,
      metaPadding: 8,
      titleFontSize: 26,
      titleLineHeight: 28,
      dividerBefore: 14,
      dividerAfter: 18,
      titleAccentWidth: 36,
    },
    toc: {
      headingFontSize: 16,
      headingLineHeight: 20,
      headingGapAfter: 10,
      level1FontSize: 13,
      level1LineHeight: 16,
      level2FontSize: 11.5,
      level2LineHeight: 14,
      level2Indent: 28,
      pageNumberWidth: 26,
      entryGap: 4,
      ordinalWidth: 30,
    },
    section: {
      fontSize: 18,
      lineHeight: 22,
      gapAfter: 12,
      ordinalFontSize: 10,
      ordinalGap: 12,
      ordinalRulePad: 10,
    },
    bucket: {
      titleFontSize: 14,
      titleLineHeight: 17,
      headlineFontSize: 11,
      headlineLineHeight: 14,
      gapAfter: 10,
      ordinalFontSize: 10,
      ordinalGap: 10,
    },
    finding: {
      textIndent: 18,
      bodyFontSize: 11.5,
      bodyLineHeight: 15,
      contextFontSize: 10.5,
      contextLineHeight: 13,
      eyebrowFontSize: 8.5,
      eyebrowLineHeight: 11,
      eyebrowGap: 4,
      attribFontSize: 8.5,
      attribLineHeight: 11,
      attribRuleWidth: 36,
      gapAfter: 10,
    },
  };
}

function getPdfBannerMetrics(raster, layout) {
  if (!raster) return null;
  const scale = Math.min(
    layout.contentWidth / Math.max(1, raster.width),
    layout.cover.bannerMaxHeight / Math.max(1, raster.height)
  );
  return {
    width: Math.max(1, raster.width * scale),
    height: Math.max(1, raster.height * scale),
  };
}

function getPdfCoverMetrics(doc, layout, raster) {
  const banner = getPdfBannerMetrics(raster, layout);
  const metaLines = pdfWrapText(
    doc,
    getReportCoverMeta(),
    layout.contentWidth,
    'helvetica',
    'bold',
    layout.cover.metaFontSize
  );
  const titleLines = pdfWrapText(
    doc,
    getReportCoverTitle(),
    layout.contentWidth,
    'times',
    'bold',
    layout.cover.titleFontSize
  );
  let height = 0;
  if (banner) height += banner.height + layout.cover.bannerGap;
  if (metaLines.length) {
    // Top hairline + padding + lines + padding + bottom hairline
    height += (layout.cover.metaPadding * 2)
      + (metaLines.length * layout.cover.metaLineHeight)
      + 1;
  }
  if (metaLines.length && titleLines.length) height += 18;
  if (titleLines.length) {
    height += titleLines.length * layout.cover.titleLineHeight;
    // Title accent rule + spacing
    height += 12 + 2 + 4;
  }
  if (banner || metaLines.length || titleLines.length) {
    height += layout.cover.dividerBefore + 1 + layout.cover.dividerAfter;
  }
  return { banner, metaLines, titleLines, height };
}

function getPdfTocEntries(orderedSections) {
  const entries = [];
  orderedSections.forEach(({ name, buckets }) => {
    entries.push({ level: 1, label: name, targetId: 'sec_' + sanitizeId(name) });
    buckets.forEach(bucket => {
      entries.push({
        level: 2,
        label: (state.bucket_user_titles || {})[bucket.id] || bucket.name,
        targetId: `bs_${bucket.id}`,
      });
    });
  });
  return entries;
}

function measurePdfTocEntry(doc, entry, layout) {
  const indent = entry.level === 2 ? layout.toc.level2Indent : 0;
  const fontSize = entry.level === 1 ? layout.toc.level1FontSize : layout.toc.level2FontSize;
  const fontStyle = entry.level === 1 ? 'bold' : 'normal';
  const lineHeight = entry.level === 1 ? layout.toc.level1LineHeight : layout.toc.level2LineHeight;
  const lines = pdfWrapText(
    doc,
    entry.label,
    layout.contentWidth - indent - layout.toc.pageNumberWidth - 10,
    'times',
    fontStyle,
    fontSize
  );
  return { lines, lineHeight, height: (lines.length * lineHeight) + layout.toc.entryGap };
}

function measurePdfSectionHeading(doc, sectionName, layout) {
  // Reserve a fixed gutter for the Roman ordinal + vertical separator so
  // wrapped heading lines hang under the title (not under the ordinal).
  const gutter = 48;
  const lines = pdfWrapText(
    doc,
    sectionName,
    layout.contentWidth - gutter,
    'times',
    'bold',
    layout.section.fontSize
  );
  return {
    lines,
    gutter,
    height: (lines.length * layout.section.lineHeight) + layout.section.gapAfter,
  };
}

function measurePdfBucketHeader(doc, bucket, layout) {
  // Reserve a fixed gutter so the title and headline sit right of the
  // ordinal number. Wrapped lines align under each other.
  const gutter = 30;
  const title = (state.bucket_user_titles || {})[bucket.id] || bucket.name;
  const titleLines = pdfWrapText(
    doc,
    title,
    layout.contentWidth - gutter,
    'times',
    'bold',
    layout.bucket.titleFontSize
  );
  const headlineLines = bucket.generated_headline
    ? pdfWrapText(
        doc,
        bucket.generated_headline,
        layout.contentWidth - gutter,
        'times',
        'italic',
        layout.bucket.headlineFontSize
      )
    : [];
  let height = titleLines.length * layout.bucket.titleLineHeight;
  if (headlineLines.length) height += 4 + (headlineLines.length * layout.bucket.headlineLineHeight);
  height += layout.bucket.gapAfter;
  return { titleLines, headlineLines, gutter, height };
}

function measurePdfFinding(doc, sq, bs, layout, displayMeta = {}) {
  const fmt = (bs.subquote_formats && bs.subquote_formats[sq.id]) || 'verbatim';
  const text = subquoteTextForDocx(sq, fmt, bs);
  const contentWidth = layout.contentWidth - layout.finding.textIndent;
  // Suppress the eyebrow + question on follow-on findings from the same QA
  // conversation so the exported PDF mirrors the HTML grouping (one question,
  // multiple bullet findings).
  const qaParts = displayMeta.showQaContext === false ? null : getQaContextParts(sq);
  // Eyebrow line: "IN RESPONSE TO   ANALYST NAME (AFFIL)" — measured on a
  // single uppercase line. We size it with helvetica-bold + char-spacing
  // so the small-caps feel comes through in the export.
  const eyebrowText = qaParts
    ? `${qaParts.eyebrow.toUpperCase()}   ${qaParts.name.toUpperCase()}`
    : '';
  const eyebrowLines = eyebrowText
    ? pdfWrapText(
        doc,
        eyebrowText,
        contentWidth,
        'helvetica',
        'bold',
        layout.finding.eyebrowFontSize
      )
    : [];
  const questionLines = qaParts
    ? pdfWrapText(
        doc,
        `\u201C${qaParts.question}\u201D`,
        contentWidth,
        'times',
        'italic',
        layout.finding.contextFontSize
      )
    : [];
  const textLines = pdfWrapText(
    doc,
    text,
    contentWidth,
    'times',
    'normal',
    layout.finding.bodyFontSize
  );
  const attribLines = _attribVisible
    ? pdfWrapText(
        doc,
        getFindingAttribution(sq).toUpperCase(),
        layout.contentWidth - layout.finding.attribRuleWidth - 12,
        'helvetica',
        'bold',
        layout.finding.attribFontSize
      )
    : [];
  let height = 0;
  if (eyebrowLines.length) height += (eyebrowLines.length * layout.finding.eyebrowLineHeight) + layout.finding.eyebrowGap;
  if (questionLines.length) height += (questionLines.length * layout.finding.contextLineHeight) + 4;
  height += textLines.length * layout.finding.bodyLineHeight;
  if (attribLines.length) height += 6 + (attribLines.length * layout.finding.attribLineHeight);
  height += layout.finding.gapAfter;
  return { eyebrowLines, questionLines, textLines, attribLines, height };
}

function buildPdfTocPages(doc, tocEntries, layout, coverMetrics) {
  const pages = [[]];
  let y = layout.contentTop
    + coverMetrics.height
    + layout.toc.headingLineHeight
    + layout.toc.headingGapAfter;

  tocEntries.forEach(entry => {
    const metrics = measurePdfTocEntry(doc, entry, layout);
    if (pages[pages.length - 1].length && y + metrics.height > layout.contentBottom) {
      pages.push([]);
      y = layout.contentTop + layout.toc.headingLineHeight + layout.toc.headingGapAfter;
    }
    pages[pages.length - 1].push(entry);
    y += metrics.height;
  });

  return pages;
}

function buildPdfBodyPlan(doc, orderedSections, bankId, layout) {
  const bs = getBankState(bankId);
  let page = 1;
  let y = layout.contentTopBody;
  const pageMap = new Map();

  orderedSections.forEach((section, sectionIdx) => {
    if (sectionIdx > 0) {
      page += 1;
      y = layout.contentTopBody;
    }

    pageMap.set('sec_' + sanitizeId(section.name), page);
    y += measurePdfSectionHeading(doc, section.name, layout).height;

    section.buckets.forEach(bucket => {
      const quotes = getReportSubquotes(bankId, bucket.id);
      if (!quotes.length) return;
      const batchMeta = buildSpeakerBatchMeta(quotes);

      const headerMetrics = measurePdfBucketHeader(doc, bucket, layout);
      const firstFindingHeight = quotes.length
        ? measurePdfFinding(doc, quotes[0], bs, layout, batchMeta.get(quotes[0].id) || {}).height
        : 0;
      const bucketStartHeight = headerMetrics.height + firstFindingHeight;
      if (y + bucketStartHeight > layout.contentBottom && y > layout.contentTopBody) {
        page += 1;
        y = layout.contentTopBody;
      }

      pageMap.set(`bs_${bucket.id}`, page);
      y += headerMetrics.height;

      quotes.forEach(sq => {
        const findingMetrics = measurePdfFinding(doc, sq, bs, layout, batchMeta.get(sq.id) || {});
        if (y + findingMetrics.height > layout.contentBottom && y > layout.contentTopBody) {
          page += 1;
          y = layout.contentTopBody;
        }
        y += findingMetrics.height;
      });
      y += 4;
    });
  });

  return { pageMap, pageCount: page };
}

function drawPdfCoverIntro(doc, layout, coverMetrics, raster) {
  let y = layout.contentTop;
  if (coverMetrics.banner && raster) {
    const x = layout.marginLeft + ((layout.contentWidth - coverMetrics.banner.width) / 2);
    doc.addImage(raster.dataUrl, 'PNG', x, y, coverMetrics.banner.width, coverMetrics.banner.height);
    y += coverMetrics.banner.height + layout.cover.bannerGap;
  }

  // Meta line wrapped in paired hairlines — masthead nameplate device.
  if (coverMetrics.metaLines.length) {
    const metaPad = layout.cover.metaPadding;
    const metaBlockHeight = (coverMetrics.metaLines.length * layout.cover.metaLineHeight);
    const metaTextWidth = Math.max(
      ...coverMetrics.metaLines.map(line => doc.getTextWidth(line))
    );
    const ruleSpan = Math.min(layout.contentWidth, Math.max(220, metaTextWidth + 60));
    const ruleStartX = (layout.pageWidth - ruleSpan) / 2;
    const ruleEndX = ruleStartX + ruleSpan;

    doc.setDrawColor(layout.rule.r, layout.rule.g, layout.rule.b);
    doc.setLineWidth(0.5);
    // Top hairline above the meta text
    doc.line(ruleStartX, y, ruleEndX, y);
    y += metaPad;

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(layout.cover.metaFontSize);
    doc.setTextColor(layout.text3.r, layout.text3.g, layout.text3.b);
    if (typeof doc.setCharSpace === 'function') doc.setCharSpace(0.8);
    y = drawPdfLines(
      doc,
      coverMetrics.metaLines,
      layout.pageWidth / 2,
      y,
      layout.cover.metaLineHeight,
      { align: 'center' }
    );
    if (typeof doc.setCharSpace === 'function') doc.setCharSpace(0);
    y += metaPad - (layout.cover.metaLineHeight - layout.cover.metaFontSize);
    // Bottom hairline
    doc.line(ruleStartX, y, ruleEndX, y);
  }

  if (coverMetrics.metaLines.length && coverMetrics.titleLines.length) y += 18;

  if (coverMetrics.titleLines.length) {
    doc.setFont('times', 'bold');
    doc.setFontSize(layout.cover.titleFontSize);
    doc.setTextColor(layout.ink.r, layout.ink.g, layout.ink.b);
    y = drawPdfLines(
      doc,
      coverMetrics.titleLines,
      layout.pageWidth / 2,
      y,
      layout.cover.titleLineHeight,
      { align: 'center' }
    );
    // Accent rule under title — anchors the masthead.
    y += 12;
    const accentX = (layout.pageWidth - layout.cover.titleAccentWidth) / 2;
    doc.setFillColor(layout.accent.r, layout.accent.g, layout.accent.b);
    doc.rect(accentX, y, layout.cover.titleAccentWidth, 2, 'F');
    y += 4;
  }

  if (coverMetrics.banner || coverMetrics.metaLines.length || coverMetrics.titleLines.length) {
    y += layout.cover.dividerBefore;
    doc.setDrawColor(layout.rule.r, layout.rule.g, layout.rule.b);
    doc.setLineWidth(0.5);
    doc.line(layout.marginLeft, y, layout.pageWidth - layout.marginRight, y);
    y += layout.cover.dividerAfter;
  }
  return y;
}

function drawPdfTocHeading(doc, layout, y, label) {
  doc.setFont('times', 'bold');
  doc.setFontSize(layout.toc.headingFontSize);
  doc.setTextColor(15, 27, 45);
  doc.text(label, layout.marginLeft, y);
  y += layout.toc.headingLineHeight;
  doc.setDrawColor(231, 223, 204);
  doc.line(layout.marginLeft, y - 5, layout.pageWidth - layout.marginRight, y - 5);
  return y + layout.toc.headingGapAfter;
}

function drawPdfTocEntries(doc, layout, entries, actualPageMap, y) {
  entries.forEach(entry => {
    const metrics = measurePdfTocEntry(doc, entry, layout);
    const indent = entry.level === 2 ? layout.toc.level2Indent : 0;
    const x = layout.marginLeft + indent;
    doc.setTextColor(entry.level === 1 ? 15 : 74, entry.level === 1 ? 27 : 82, entry.level === 1 ? 45 : 104);
    y = drawPdfLines(doc, metrics.lines, x, y, metrics.lineHeight);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(11);
    doc.setTextColor(122, 115, 100);
    const pageNumber = actualPageMap.get(entry.targetId);
    if (pageNumber != null) {
      doc.text(
        String(pageNumber),
        layout.pageWidth - layout.marginRight,
        y - metrics.lineHeight,
        { align: 'right' }
      );
    }
    y += layout.toc.entryGap;
  });
  return y;
}

function drawPdfSectionHeading(doc, layout, sectionName, sectionNumber, y) {
  const metrics = measurePdfSectionHeading(doc, sectionName, layout);
  const headingX = layout.marginLeft + metrics.gutter;
  const ruleX = headingX - 14;

  // Roman numeral ordinal in accent (small caps via Helvetica-bold +
  // explicit char-spacing for an editorial small-caps feel).
  const ordinalText = toRomanNumeral(sectionNumber) + '.';
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(layout.section.ordinalFontSize);
  doc.setTextColor(layout.accent.r, layout.accent.g, layout.accent.b);
  if (typeof doc.setCharSpace === 'function') doc.setCharSpace(0.6);
  doc.text(ordinalText, layout.marginLeft, y);
  if (typeof doc.setCharSpace === 'function') doc.setCharSpace(0);

  // Vertical separator rule — sized to the first line cap-height so it
  // reads as a typographic device, not a divider.
  doc.setDrawColor(layout.rule.r, layout.rule.g, layout.rule.b);
  doc.setLineWidth(0.6);
  doc.line(ruleX, y - layout.section.fontSize + 4, ruleX, y + 2);

  // Heading text
  doc.setFont('times', 'bold');
  doc.setFontSize(layout.section.fontSize);
  doc.setTextColor(layout.ink.r, layout.ink.g, layout.ink.b);
  y = drawPdfLines(doc, metrics.lines, headingX, y, layout.section.lineHeight);

  doc.setDrawColor(184, 173, 148);
  doc.setLineWidth(0.5);
  doc.line(layout.marginLeft, y - 6, layout.pageWidth - layout.marginRight, y - 6);
  return y + layout.section.gapAfter;
}

function drawPdfBucketHeader(doc, layout, bucket, bucketNumber, y) {
  const metrics = measurePdfBucketHeader(doc, bucket, layout);
  const titleX = layout.marginLeft + metrics.gutter;

  // Two-digit ordinal — accent color, tabular nums for clean column.
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(layout.bucket.ordinalFontSize);
  doc.setTextColor(layout.accent.r, layout.accent.g, layout.accent.b);
  doc.text(padTwoDigit(bucketNumber), layout.marginLeft, y);

  doc.setFont('times', 'bold');
  doc.setFontSize(layout.bucket.titleFontSize);
  doc.setTextColor(layout.ink.r, layout.ink.g, layout.ink.b);
  y = drawPdfLines(doc, metrics.titleLines, titleX, y, layout.bucket.titleLineHeight);

  if (metrics.headlineLines.length) {
    y += 4;
    doc.setFont('times', 'italic');
    doc.setFontSize(layout.bucket.headlineFontSize);
    doc.setTextColor(layout.text2.r, layout.text2.g, layout.text2.b);
    y = drawPdfLines(
      doc,
      metrics.headlineLines,
      titleX,
      y,
      layout.bucket.headlineLineHeight
    );
  }
  return y + layout.bucket.gapAfter;
}

function drawPdfFinding(doc, layout, sq, bs, y, displayMeta = {}) {
  const metrics = measurePdfFinding(doc, sq, bs, layout, displayMeta);
  const textX = layout.marginLeft + layout.finding.textIndent;

  // Editorial eyebrow — "IN RESPONSE TO   ANALYST NAME (AFFIL)" — small
  // caps in helvetica-bold with extra char-spacing.
  if (metrics.eyebrowLines.length) {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(layout.finding.eyebrowFontSize);
    doc.setTextColor(layout.text3.r, layout.text3.g, layout.text3.b);
    if (typeof doc.setCharSpace === 'function') doc.setCharSpace(0.8);
    y = drawPdfLines(
      doc,
      metrics.eyebrowLines,
      textX,
      y,
      layout.finding.eyebrowLineHeight
    );
    if (typeof doc.setCharSpace === 'function') doc.setCharSpace(0);
    y += layout.finding.eyebrowGap;
  }

  // Italic question text in opening/closing curly quotes
  if (metrics.questionLines.length) {
    doc.setFont('times', 'italic');
    doc.setFontSize(layout.finding.contextFontSize);
    doc.setTextColor(layout.text2.r, layout.text2.g, layout.text2.b);
    y = drawPdfLines(
      doc,
      metrics.questionLines,
      textX,
      y,
      layout.finding.contextLineHeight
    );
    y += 4;
  }

  // Body bullet + text
  doc.setFillColor(20, 33, 58);
  doc.circle(layout.marginLeft + 5, y - 4, 1.4, 'F');
  doc.setFont('times', 'normal');
  doc.setFontSize(layout.finding.bodyFontSize);
  doc.setTextColor(20, 33, 58);
  y = drawPdfLines(doc, metrics.textLines, textX, y, layout.finding.bodyLineHeight);

  // Attribution: small caps with thin lead-in rule
  if (metrics.attribLines.length) {
    y += 8;
    const ruleY = y - (layout.finding.attribFontSize / 2) - 1;
    const ruleEndX = layout.pageWidth - layout.marginRight - layout.finding.attribRuleWidth - 8;
    doc.setDrawColor(layout.rule2.r, layout.rule2.g, layout.rule2.b);
    doc.setLineWidth(0.5);
    doc.line(ruleEndX, ruleY, ruleEndX + layout.finding.attribRuleWidth, ruleY);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(layout.finding.attribFontSize);
    doc.setTextColor(layout.text3.r, layout.text3.g, layout.text3.b);
    if (typeof doc.setCharSpace === 'function') doc.setCharSpace(0.8);
    y = drawPdfLines(
      doc,
      metrics.attribLines,
      layout.pageWidth - layout.marginRight,
      y,
      layout.finding.attribLineHeight,
      { align: 'right' }
    );
    if (typeof doc.setCharSpace === 'function') doc.setCharSpace(0);
  }

  return y + layout.finding.gapAfter;
}

function drawPdfPageNumbers(doc, layout) {
  const totalPages = doc.getNumberOfPages();
  for (let pageNum = 1; pageNum <= totalPages; pageNum += 1) {
    doc.setPage(pageNum);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(layout.text3.r, layout.text3.g, layout.text3.b);
    doc.text(String(pageNum), layout.pageWidth - layout.marginRight, layout.footerY, { align: 'right' });
  }
}

// Editorial running header — publication name (left) + current section
// (right), separated from the body by a hairline rule. Drawn only on body
// pages; the cover and TOC stay clean.
function drawPdfRunningHeader(doc, layout, leftLabel, rightLabel) {
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8.5);
  doc.setTextColor(layout.text3.r, layout.text3.g, layout.text3.b);
  if (typeof doc.setCharSpace === 'function') doc.setCharSpace(0.8);
  if (leftLabel) {
    doc.text(String(leftLabel).toUpperCase(), layout.marginLeft, layout.runningHeaderY);
  }
  if (rightLabel) {
    doc.text(
      String(rightLabel).toUpperCase(),
      layout.pageWidth - layout.marginRight,
      layout.runningHeaderY,
      { align: 'right' }
    );
  }
  if (typeof doc.setCharSpace === 'function') doc.setCharSpace(0);
  doc.setDrawColor(layout.rule2.r, layout.rule2.g, layout.rule2.b);
  doc.setLineWidth(0.4);
  doc.line(
    layout.marginLeft,
    layout.runningHeaderRuleY,
    layout.pageWidth - layout.marginRight,
    layout.runningHeaderRuleY
  );
}

function renderPdfBody(doc, layout, orderedSections, bankId, runningHeaderLeft) {
  const bs = getBankState(bankId);

  const startBodyPage = (sectionLabel) => {
    doc.addPage();
    drawPdfRunningHeader(doc, layout, runningHeaderLeft, sectionLabel);
    return layout.contentTopBody;
  };

  orderedSections.forEach((section, sectionIdx) => {
    let y = startBodyPage(section.name);
    y = drawPdfSectionHeading(doc, layout, section.name, sectionIdx + 1, y);

    let bucketNum = 0;
    section.buckets.forEach(bucket => {
      const quotes = getReportSubquotes(bankId, bucket.id);
      if (!quotes.length) return;
      bucketNum += 1;
      const batchMeta = buildSpeakerBatchMeta(quotes);

      const headerMetrics = measurePdfBucketHeader(doc, bucket, layout);
      const firstFindingHeight = quotes.length
        ? measurePdfFinding(doc, quotes[0], bs, layout, batchMeta.get(quotes[0].id) || {}).height
        : 0;
      if (y + headerMetrics.height + firstFindingHeight > layout.contentBottom && y > layout.contentTopBody) {
        y = startBodyPage(section.name);
      }

      y = drawPdfBucketHeader(doc, layout, bucket, bucketNum, y);

      quotes.forEach(sq => {
        const meta = batchMeta.get(sq.id) || {};
        const findingMetrics = measurePdfFinding(doc, sq, bs, layout, meta);
        if (y + findingMetrics.height > layout.contentBottom && y > layout.contentTopBody) {
          y = startBodyPage(section.name);
        }
        y = drawPdfFinding(doc, layout, sq, bs, y, meta);
      });
      y += 4;
    });
  });
}

async function savePdf() {
  let pdfLib;
  try {
    pdfLib = await ensurePdfLibrary();
  } catch (e) {
    alert('Could not load the PDF library from the internet.\n\n' + e.message);
    return;
  }

  const { jsPDF } = pdfLib;
  const bankId = state.current_bank;
  const orderedSections = getOrderedSections(bankId);
  const raster = state.banner_visible && state.banner_src
    ? await rasterizeImageForExport(state.banner_src, 1800)
    : null;

  const doc = new jsPDF({
    orientation: 'portrait',
    unit: 'pt',
    format: 'letter',
    compress: true,
  });
  const layout = getPdfLayout(doc);
  const coverMetrics = getPdfCoverMetrics(doc, layout, raster);
  const tocEntries = getPdfTocEntries(orderedSections);
  const tocPages = buildPdfTocPages(doc, tocEntries, layout, coverMetrics);
  const bodyPlan = buildPdfBodyPlan(doc, orderedSections, bankId, layout);
  const actualPageMap = new Map(
    [...bodyPlan.pageMap.entries()].map(([targetId, pageNum]) => [targetId, pageNum + tocPages.length])
  );

  doc.setProperties({
    title: getReportExportTitle(bankId) || 'Capital Markets Readthrough',
    subject: 'Capital Markets Readthrough',
    creator: 'CM Readthrough Editor',
  });

  let tocY = drawPdfCoverIntro(doc, layout, coverMetrics, raster);
  tocY = drawPdfTocHeading(doc, layout, tocY, 'Contents');
  drawPdfTocEntries(doc, layout, tocPages[0] || [], actualPageMap, tocY);

  for (let idx = 1; idx < tocPages.length; idx += 1) {
    doc.addPage();
    let y = drawPdfTocHeading(doc, layout, layout.contentTop, 'Contents (continued)');
    drawPdfTocEntries(doc, layout, tocPages[idx], actualPageMap, y);
  }

  // Running header pulls the publication name from the cover meta — same
  // string that anchors the masthead. Falls back to a generic label.
  const runningHeaderLeft = (getReportCoverMeta(bankId) || 'Capital Markets Readthrough').trim();
  renderPdfBody(doc, layout, orderedSections, bankId, runningHeaderLeft);
  drawPdfPageNumbers(doc, layout);

  doc.save(buildExportFilename('pdf', bankId));
}

async function saveDocx() {
  const btn = document.getElementById('docx-btn');
  const origHtml = btn ? btn.innerHTML : '';
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = 'Building DOCX&hellip;';
  }

  let docxLib;
  try {
    docxLib = await ensureDocxLibrary();
  } catch (e) {
    alert('Could not load the DOCX library from the internet.\n\n' + e.message);
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = origHtml;
    }
    return;
  }

  const {
    Document, Packer, Paragraph, TextRun, HeadingLevel,
    ImageRun, AlignmentType, PageBreak, TableOfContents, LevelFormat,
    BorderStyle,
  } = docxLib;

  const bankId = state.current_bank;
  const bs = getBankState(bankId);
  const orderedSections = getOrderedSections(bankId);
  const titleText = getReportCoverMeta(bankId) || 'Capital Markets Readthrough';
  const subtitleText = getReportCoverTitle();
  const children = [];

  if (state.banner_visible && state.banner_src) {
    const raster = await rasterizeImageForExport(state.banner_src, 1800);
    if (raster) {
      let pxWidth = Math.min(620, raster.width);
      let pxHeight = Math.round(raster.height * (pxWidth / raster.width));
      if (pxHeight > 150) {
        const scale = 150 / pxHeight;
        pxWidth = Math.round(pxWidth * scale);
        pxHeight = Math.round(pxHeight * scale);
      }
      children.push(new Paragraph({
        alignment: AlignmentType.CENTER,
        spacing: { before: 0, after: 180 },
        children: [new ImageRun({
          data: raster.data,
          transformation: { width: pxWidth, height: pxHeight },
        })],
      }));
    }
  }

  // Cover meta line — paired hairlines top + bottom for masthead authority.
  // titleText carries the publication metadata ("Company Name — Period");
  // subtitleText is the actual report title that follows.
  children.push(new Paragraph({
    alignment: AlignmentType.CENTER,
    spacing: { before: 60, after: 60 },
    border: {
      top:    { style: BorderStyle.SINGLE, size: 4, color: 'D9D0BC', space: 8 },
      bottom: { style: BorderStyle.SINGLE, size: 4, color: 'D9D0BC', space: 8 },
    },
    children: [new TextRun({
      text: titleText.toUpperCase(),
      bold: true,
      size: 22,
      color: '7A7364',
      characterSpacing: 56,
    })],
  }));
  children.push(new Paragraph({
    heading: HeadingLevel.TITLE,
    alignment: AlignmentType.CENTER,
    spacing: { before: 240, after: 80 },
    children: [new TextRun({ text: subtitleText, bold: true, size: 40 })],
  }));
  // Accent rule under title — narrow centered colored bar (rendered as a
  // bottom border on a narrow indented paragraph). Anchors the masthead.
  children.push(new Paragraph({
    alignment: AlignmentType.CENTER,
    spacing: { before: 80, after: 320 },
    indent: { left: 4500, right: 4500 },
    border: {
      bottom: { style: BorderStyle.SINGLE, size: 16, color: 'B25A1E', space: 1 },
    },
    children: [new TextRun({ text: '', size: 4 })],
  }));

  children.push(new Paragraph({
    heading: HeadingLevel.HEADING_1,
    spacing: { before: 0, after: 120 },
    children: [new TextRun({ text: 'Contents', bold: true })],
  }));
  children.push(new TableOfContents('Contents', {
    hyperlink: true,
    headingStyleRange: '1-2',
  }));
  children.push(new Paragraph({ children: [new PageBreak()] }));

  orderedSections.forEach(({ name: secName, buckets: sectionBuckets }, sIdx) => {
    if (sIdx > 0) children.push(new Paragraph({ children: [new PageBreak()] }));
    // L1 heading: Roman numeral ordinal in accent color, vertical separator,
    // then the section name. The bold on the name comes from the heading
    // style; the ordinal is set with explicit run formatting in accent.
    const romanText = toRomanNumeral(sIdx + 1) + '.';
    children.push(new Paragraph({
      heading: HeadingLevel.HEADING_1,
      spacing: { before: 240, after: 160 },
      children: [
        new TextRun({ text: romanText + '   ', color: 'B25A1E', bold: true }),
        new TextRun({ text: secName, bold: true }),
      ],
    }));

    let bucketNum = 0;
    sectionBuckets.forEach(bucket => {
      const quotes = getReportSubquotes(bankId, bucket.id);
      if (!quotes.length) return;
      bucketNum += 1;
      const batchMeta = buildSpeakerBatchMeta(quotes);
      const title = (state.bucket_user_titles || {})[bucket.id] || bucket.name;

      children.push(new Paragraph({
        heading: HeadingLevel.HEADING_2,
        spacing: { before: 200, after: 80 },
        children: [
          new TextRun({ text: padTwoDigit(bucketNum) + '   ', color: 'B25A1E', bold: true }),
          new TextRun({ text: title, bold: true }),
        ],
      }));
      if (bucket.generated_headline) {
        children.push(new Paragraph({
          spacing: { before: 0, after: 140 },
          children: [new TextRun({
            text: bucket.generated_headline,
            italics: true,
            color: '4A5268',
          })],
        }));
      }

      quotes.forEach(sq => {
        const fmt = (bs.subquote_formats && bs.subquote_formats[sq.id]) || 'verbatim';
        const text = subquoteTextForDocx(sq, fmt, bs);
        if (!text) return;

        // QA context — small-caps eyebrow + italic question, mirroring HTML/PDF.
        // Only render for the first subquote of each QA cluster; follow-on
        // findings in the same conversation appear as bare bullets beneath.
        const meta = batchMeta.get(sq.id) || {};
        const qaParts = meta.showQaContext === false ? null : getQaContextParts(sq);
        if (qaParts) {
          children.push(new Paragraph({
            spacing: { before: 120, after: 30 },
            indent: { left: 360 },
            children: [
              new TextRun({
                text: qaParts.eyebrow.toUpperCase() + '   ',
                bold: true,
                size: 16,
                color: '7A7364',
                characterSpacing: 36,
              }),
              new TextRun({
                text: qaParts.name.toUpperCase(),
                bold: true,
                size: 16,
                color: '4A5268',
                characterSpacing: 36,
              }),
            ],
          }));
          children.push(new Paragraph({
            spacing: { before: 0, after: 60 },
            indent: { left: 360 },
            children: [new TextRun({
              text: '\u201C' + qaParts.question + '\u201D',
              italics: true,
              color: '4A5268',
              size: 20,
            })],
          }));
        }

        children.push(new Paragraph({
          bullet: { level: 0 },
          spacing: { before: 40, after: 40 },
          children: [new TextRun({ text })],
        }));

        if (_attribVisible) {
          // Small-caps attribution — leading em-dash stands in for the
          // visual lead-in rule used in HTML/PDF.
          children.push(new Paragraph({
            alignment: AlignmentType.RIGHT,
            spacing: { before: 80, after: 160 },
            children: [
              new TextRun({
                text: '\u2014\u2014\u2014   ',
                color: 'D9D0BC',
                size: 16,
              }),
              new TextRun({
                text: getFindingAttribution(sq).toUpperCase(),
                bold: true,
                size: 14,
                color: '7A7364',
                characterSpacing: 36,
              }),
            ],
          }));
        }
      });
    });
  });

  const doc = new Document({
    creator: 'CM Readthrough Editor',
    title: getReportExportTitle(bankId) || 'Capital Markets Readthrough',
    description: subtitleText,
    styles: {
      default: {
        document: { run: { font: 'Georgia', size: 22 } },
        heading1: {
          run: { font: 'Georgia', size: 32, bold: true, color: '0F1B2D' },
          paragraph: { spacing: { before: 320, after: 160 } },
        },
        heading2: {
          run: { font: 'Georgia', size: 26, bold: true, color: '0F1B2D' },
          paragraph: { spacing: { before: 200, after: 80 } },
        },
        title: { run: { font: 'Georgia', size: 44, bold: true, color: '0F1B2D' } },
      },
    },
    numbering: {
      config: [{
        reference: 'default-bullets',
        levels: [{
          level: 0,
          format: LevelFormat.BULLET,
          text: '\u2022',
          alignment: AlignmentType.LEFT,
          style: { paragraph: { indent: { left: 360, hanging: 260 } } },
        }],
      }],
    },
    sections: [{
      properties: {
        page: {
          margin: {
            top: 1080,
            right: 720,
            bottom: 1080,
            left: 720,
          },
        },
      },
      children,
    }],
  });

  try {
    const blob = await Packer.toBlob(doc);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = buildExportFilename('docx', bankId);
    a.click();
    URL.revokeObjectURL(url);
  } catch (e) {
    alert('Failed to build DOCX: ' + e.message);
    console.error(e);
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = origHtml;
    }
  }
}

// ============================================================
// UTILITIES
// ============================================================
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escAttr(s) { return esc(s); }
</script>
</body>
</html>
