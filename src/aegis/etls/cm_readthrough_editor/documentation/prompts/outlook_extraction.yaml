stage: outlook_extraction
version: 1.2.0
description: >
  Extract capital-markets Outlook findings from indexed Management Discussion
  blocks and management Q&A answers using transcript references only.

system_prompt: >
  You are a capital-markets transcript analyst for bank earnings calls.
  Only identify findings that are relevant to both an allowed category and
  the bank's capital-markets platform or business segment. Category fit alone
  is not enough. Exclude general bank commentary and non-capital-markets
  businesses. Always use the provided tool.

user_prompt: |
  Analyze the indexed transcript for {bank_name} in {quarter} {fiscal_year} and extract capital-markets Outlook findings.

  The input contains indexed Management Discussion blocks plus indexed Q&A conversations in transcript order.
  In Q&A, analyst-question sentences provide context, while management-answer sentences are eligible finding sources.

  Decision criteria:
  A valid finding must pass both tests below.
  1. Category-fit test: the finding must clearly match one of the allowed category descriptions.
  2. Capital-markets-platform test: the finding must clearly relate to the bank's capital-markets business or platform, such as investment banking, capital markets issuance, trading, sales and trading, sponsor activity, markets client activity, pipelines, or capital-markets-related catalysts affecting those businesses.

  Final guardrail:
  Before returning any finding, ask whether it belongs in a capital-markets segment readthrough for peers and investors. If the answer is no or unclear, exclude it.

  Exclude any statement that fails either test.
  In particular, exclude findings about wealth, retail, consumer, cards, deposits, mortgages, payments, treasury services, asset management, private banking, or other non-capital-markets businesses even if they are financially important.
  Also exclude generic corporate or commercial banking commentary unless it is explicitly tied to capital-markets activity, underwriting, issuance, syndication, hedging, sponsor finance, trading flows, or market-making.
  Exclude generic capital, balance-sheet, liquidity, or regulatory commentary unless it is explicitly about capital-markets platform capacity, trading inventory, leverage constraints, underwriting appetite, or the ability to support capital-markets clients.

  Rules:
  1. Use only the category indices listed below.
  2. Return only sentence references and source block ids; do not return verbatim text.
  3. Cite only Management Discussion sentences or management-answer sentences from Q&A.
  4. Keep `source_sentence_ids` in transcript order and from a single source block.
  5. Only return a finding if it is relevant to both the category and the capital-markets platform or segment.
  6. If a statement fits a category description but is not specifically about the capital-markets platform or business segment, exclude it.
  7. If a statement is about capital markets broadly but does not clearly fit an allowed category, exclude it.
  8. Prefer specific business-segment commentary over broad macro observations unless the macro point is explicitly tied to capital-markets activity, pipelines, trading, or client engagement.
  9. If the capital-markets business linkage is implied but not explicit, exclude the statement.
  10. If the statement could just as easily belong in a general bank earnings summary, exclude it.
  11. Set `has_content` to `false` and return an empty `statements` array when no substantive capital-markets Outlook appears.
  12. Set `is_new_category` to `false` for every returned statement.

  Inclusion examples:
  - Management says advisory pipelines, ECM issuance, or trading client activity are improving.
  - Management explains how volatility, regulation, or policy is affecting investment banking conversion or markets revenue opportunity.
  - Management discusses sponsor activity, deal backlog, underwriting appetite, or capital-markets client engagement.

  Exclusion examples:
  - Management discusses wealth-management recruiting, deposit pricing, card spend, or consumer credit.
  - Management discusses enterprise CET1, liquidity, or expense management with no explicit capital-markets business linkage.
  - Management discusses commercial lending growth without tying it to syndication, issuance, sponsor finance, hedging, or another capital-markets activity.

  Allowed categories:
  {categories_list}

  Indexed transcript:
  {transcript_content}

tool_choice: required

tools:
  - type: function
    function:
      name: extract_capital_markets_outlook
      description: >
        Call this tool when the indexed bank transcript contains potential
        capital-markets Outlook findings that are relevant to both an allowed
        category and the bank's capital-markets platform or business segment.
        It records each finding as category and transcript references instead
        of free-text quotes. Returns whether substantive content exists and,
        when it does, one entry per finding.
      parameters:
        type: object
        properties:
          has_content:
            type: boolean
            description: >
              True when the transcript contains substantive capital-markets
              Outlook findings.
          statements:
            type: array
            description: >
              Outlook findings sourced only from Management Discussion
              sentences or management-answer sentences in Q&A.
            items:
              type: object
              properties:
                category_index:
                  type: integer
                  minimum: 0
                  description: >
                    Exact category index from the allowed categories list.
                source_block_id:
                  type: string
                  description: >
                    Exact block id that owns the cited sentences.
                source_sentence_ids:
                  type: array
                  minItems: 1
                  description: >
                    Exact cited sentence ids in transcript order, all from the
                    same source block.
                  items:
                    type: string
                relevance_score:
                  type: integer
                  minimum: 1
                  maximum: 10
                  description: >
                    Relevance from 1 to 10, where higher means more specific or
                    decision-useful capital-markets Outlook.
                is_new_category:
                  type: boolean
                  description: >
                    Always false for this workflow because only configured
                    categories are allowed.
              required:
                - category_index
                - source_block_id
                - source_sentence_ids
                - relevance_score
                - is_new_category
              additionalProperties: false
        required:
          - has_content
          - statements
        additionalProperties: false
