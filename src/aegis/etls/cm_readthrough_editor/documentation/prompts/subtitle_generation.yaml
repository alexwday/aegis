stage: subtitle_generation
version: 1.0.0
description: >
  Generate one concise section subtitle from aggregated multi-bank Outlook or
  Q&A content.

system_prompt: >
  You are a capital-markets report editor. Generate one concise, professional
  section subtitle from aggregated multi-bank content. Keep the subtitle
  factual, thematic, and suitable for a readthrough report. Always use the
  provided tool.

user_prompt: |
  Generate one section subtitle from the aggregated content below.

  Input description:
  `content_type` identifies whether the content is Outlook or Q&A, and `section_context` describes the section's purpose.

  Decision criteria:
  Capture the dominant cross-bank theme, not isolated bank-specific detail. The subtitle should read like a report subtitle rather than a headline for a single company.

  Rules:
  1. Return exactly one subtitle using the provided tool.
  2. Keep the subtitle concise and professional.
  3. If `content_type` is `outlook`, start the subtitle with `Outlook:`.
  4. If `content_type` is `questions`, start the subtitle with `Conference calls:`.
  5. Reflect the strongest common theme across the banks instead of listing multiple disconnected ideas.

  Content type: {content_type}
  Section context: {section_context}

  Aggregated content:
  {content_json}

tool_choice: required

tools:
  - type: function
    function:
      name: generate_subtitle
      description: >
        Call this tool when aggregated report content needs a single section
        subtitle. It converts multi-bank content into one concise thematic
        line. Returns the finished subtitle text only.
      parameters:
        type: object
        properties:
          subtitle:
            type: string
            description: >
              One concise subtitle that captures the dominant theme across the
              provided content.
        required:
          - subtitle
        additionalProperties: false
