stage: qa_extraction
version: 1.2.0
description: >
  Extract capital-markets analyst questions from indexed Q&A conversations
  using transcript references only.

system_prompt: >
  You are a capital-markets Q&A analyst for bank earnings calls. Only identify
  analyst questions that are relevant to both an allowed category and the
  bank's capital-markets platform or business segment. Category fit alone is
  not enough. Exclude general bank questions and non-capital-markets
  businesses. Always use the provided tool.

user_prompt: |
  Analyze the indexed Q&A conversations for {bank_name} in {quarter} {fiscal_year} and extract capital-markets analyst questions.

  The input contains indexed conversations in transcript order. Analyst-question sentences are eligible finding sources. Management-answer sentences provide context only.

  Decision criteria:
  A valid question must pass both tests below.
  1. Category-fit test: the question must clearly match one of the allowed category descriptions.
  2. Capital-markets-platform test: the question must clearly concern the bank's capital-markets platform or segment, such as investment banking, capital markets issuance, advisory, underwriting, trading, client flows, sponsor activity, pipelines, deal conversion, or markets-related regulation affecting those businesses.

  Final guardrail:
  Before returning any question, ask whether it belongs in a capital-markets segment readthrough for peers and investors. If the answer is no or unclear, exclude it.

  Exclude any question that fails either test.
  In particular, exclude questions about wealth, retail, consumer, cards, deposits, mortgages, payments, treasury services, asset management, private banking, or other non-capital-markets businesses.
  Also exclude generic bank-level capital, balance-sheet, liquidity, reserve, or regulatory questions unless they are explicitly framed in terms of trading, underwriting, leverage for markets activity, capital-markets risk appetite, or the bank's ability to support capital-markets clients.
  Exclude generic commercial or corporate banking questions unless they are explicitly about issuance, syndication, sponsor finance, hedging, or another capital-markets activity.

  Rules:
  1. Use only the category indices listed below.
  2. Return only analyst-question sentence references and source block ids; do not return verbatim text.
  3. Do not cite management-answer sentences.
  4. Keep `source_sentence_ids` in transcript order and from a single analyst-question block.
  5. Only return a question if it is relevant to both the category and the capital-markets platform or segment.
  6. If a question fits a category description but is not specifically about the capital-markets platform or business segment, exclude it.
  7. If a question is about capital markets broadly but does not clearly fit an allowed category, exclude it.
  8. Prefer explicit business-line and platform questions over broad macro or bank-wide questions unless those questions are clearly tied to capital-markets activity, pipelines, issuance, trading, or client engagement.
  9. If the capital-markets business linkage is implied but not explicit, exclude the question.
  10. If the question could just as easily belong in a general bank earnings summary, exclude it.
  11. Set `has_content` to `false` and return an empty `questions` array when no substantive capital-markets analyst questions appear.
  12. Set `is_new_category` to `false` for every returned question.

  Inclusion examples:
  - An analyst asks about advisory pipelines, ECM or DCM issuance, trading client activity, market share, or sponsor-related demand.
  - An analyst asks how volatility, regulation, rates, or policy affects investment banking conversion, underwriting, or markets activity.
  - An analyst asks about leverage, capital, or risk appetite specifically in relation to trading inventory, underwriting capacity, or capital-markets client facilitation.

  Exclusion examples:
  - An analyst asks about wealth-management net flows, deposit beta, NIM, consumer credit, or card spend.
  - An analyst asks about enterprise capital return or CET1 with no explicit capital-markets business linkage.
  - An analyst asks about broad commercial lending growth without tying it to syndication, issuance, sponsor finance, or hedging.

  Allowed categories:
  {categories_list}

  Indexed Q&A:
  {qa_content}

tool_choice: required

tools:
  - type: function
    function:
      name: extract_analyst_questions
      description: >
        Call this tool when indexed Q&A conversations contain potential
        capital-markets analyst questions that are relevant to both an allowed
        category and the bank's capital-markets platform or business segment.
        It records each finding as category and transcript references instead
        of free-text quotes. Returns whether substantive question content
        exists and, when it does, one entry per question finding.
      parameters:
        type: object
        properties:
          has_content:
            type: boolean
            description: >
              True when the Q&A contains substantive capital-markets analyst
              questions.
          questions:
            type: array
            description: >
              Analyst-question findings sourced only from analyst-question
              sentences.
            items:
              type: object
              properties:
                category_index:
                  type: integer
                  description: >
                    Exact category index from the allowed categories list.
                source_block_id:
                  type: string
                  description: >
                    Exact analyst-question block id that owns the cited
                    sentences.
                source_sentence_ids:
                  type: array
                  description: >
                    Exact cited analyst-question sentence ids in transcript
                    order, all from the same source block.
                  items:
                    type: string
                is_new_category:
                  type: boolean
                  description: >
                    Always false for this workflow because only configured
                    categories are allowed.
              required:
                - category_index
                - source_block_id
                - source_sentence_ids
                - is_new_category
              additionalProperties: false
        required:
          - has_content
          - questions
        additionalProperties: false
