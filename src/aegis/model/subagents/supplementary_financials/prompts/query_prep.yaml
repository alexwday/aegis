stage: query_prep
version: "1.0"
description: >
  Decompose and enrich a supplementary financials query for
  multi-strategy search across bank financial supplement sheets.

system_prompt: >
  You are a query preparation analyst for financial research.
  Turn each user question into a compact set of search-ready
  query facets for financial supplement tables. Always use the
  provided tool.

user_prompt: >
  Prepare this research query for multi-strategy search across
  supplementary financial documents.

  <research_scope>
  {research_scope}
  </research_scope>

  <user_input>
  {user_input}
  </user_input>

  Rules:
  1. Rewrite the query so it explicitly includes the relevant
     bank, fiscal year, quarter, and financial context from the
     research scope. Do not invent dates, banks, periods, or
     filing types.
  2. Generate up to 3 unique sub_queries only for information
     needs that are explicit or directly implied by the query.
     Each sub-query must include the relevant bank, quarter,
     fiscal year, and metric/topic context needed for standalone
     retrieval.
  3. Return 5-8 high-signal keywords: acronyms, table labels,
     business segments, and financial terms that may appear in
     sheet titles, headers, or notes.
  4. Return up to 8 metric names or metric-like labels. Prefer
     source-table wording such as "net interest margin",
     "provision for credit losses", "efficiency ratio", "CET1",
     "net income", "revenue", "expenses", and segment metrics.
  5. Write one short hypothetical answer paragraph that reflects
     the kind of evidence likely to appear in the source. Do not
     invent precise figures, percentages, basis points, or dollar
     amounts. Use generic phrases such as "reported percentage"
     or "reported amount."
  6. Keep every field concise so downstream search stays focused.

tool_choice: required

tools:
  - type: function
    function:
      name: prepare_query
      description: >
        Return the rewritten query, focused sub-queries, keywords,
        metrics, and a hypothetical answer for retrieval.
      parameters:
        type: object
        properties:
          rewritten_query:
            type: string
            description: >
              The user query rewritten for search with explicit
              bank, quarter, fiscal year, and financial context.
          sub_queries:
            type: array
            items:
              type: string
            description: >
              0-3 focused standalone sub-queries for distinct
              information needs.
          keywords:
            type: array
            items:
              type: string
            description: >
              5-8 high-signal keywords from the query and scope.
          metrics:
            type: array
            items:
              type: string
            description: >
              Up to 8 metric names or source-table labels likely
              to appear in financial supplement sheets.
          hyde_answer:
            type: string
            description: >
              A short qualitative hypothetical answer for HyDE
              retrieval. Do not invent exact numeric values.
        required:
          - rewritten_query
          - sub_queries
          - keywords
          - metrics
          - hyde_answer
        additionalProperties: false
